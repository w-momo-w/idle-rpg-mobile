function renderLog(){
  const el=document.getElementById('event-log');el.innerHTML='';
  for(const l of G.logs.slice(0,30)){
    const p=document.createElement('p');p.className=l.cls||'';p.innerHTML=`<span style="color:var(--muted);margin-right:4px;font-size:10px">${l.time}</span>${l.msg}`;el.appendChild(p);
  }
}
function showItemModal(it,source,isEquipped,activeTab){
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');ov.classList.add('show');
  const eqIt=!isEquipped?G.equipped[it.slot]:null;
  const clsNames2={warrior:'战士',archer:'射手',mage:'法师',all:'通用'};
  const clsIconMap={warrior:'⚔️',archer:'🏹',mage:'🔮',all:''};
  const classBadge=it.classReq&&it.classReq!=='all'?`<span style="font-size:10px;color:var(--muted);margin-left:4px">${clsIconMap[it.classReq]}${clsNames2[it.classReq]}专属</span>`:'';
  const cantEquip=!isEquipped&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
  const levelTooLow=!isEquipped&&it.reqLv&&G.level<it.reqLv;
  const elv=isEquipped?(G.slotEnhance[source]||0):0;
  const enhTag=elv>0?` <span style="color:var(--orange);font-size:13px;font-weight:bold">+${elv}</span>`:'';
  const showPower=(it.power||0)+(isEquipped?getEnhancePower(source):0);
  const enhPowerDetail=isEquipped&&elv>0?` <span style="color:var(--orange);font-size:10px">(+${getEnhancePower(source)}强化)</span>`:'';
  let html=`<h3 class="${QCLASS[it.quality]}">${eqIcon(it.slot,it.classReq)} ${it.name}${enhTag}${classBadge}</h3><div style="margin-bottom:4px"><span style="background:${QCOLOR[it.quality]};color:#fff;padding:1px 8px;border-radius:10px;font-size:11px">${it.qName}</span> 战力：${showPower}${enhPowerDetail} · 需要Lv${it.reqLv||1}${cantEquip?' <span style="color:var(--red);font-size:10px">⚠️非本职业</span>':''}${levelTooLow?' <span style="color:var(--orange);font-size:10px">⚠️等级不足('+it.reqLv+')</span>':''}${elv>0?` · <span style="color:var(--orange);font-weight:bold">强化+${elv}</span>`:''}</div>`;
  if(it.setName){
    // 查找该装备所属套装的激活情况
    const setBo=G._activeSetBonuses.find(b=>b.setId===it.setId);
    const setCount=Object.values(G.equipped).filter(eq=>eq&&eq.setId===it.setId).length;
    html+=`<div style="background:rgba(219,39,119,0.1);border:1px solid var(--pink);border-radius:4px;padding:4px 6px;margin-bottom:6px;font-size:10px">
      <div style="color:var(--pink);font-weight:bold;margin-bottom:2px">🔗 ${it.setName} (${setCount}件${setBo?' · '+setBo.bonusLevel+'件套已激活':'未激活'})</div>`;
    // 显示套装各级效果
    const setDef=SETS.find(s=>s.id===it.setId);
    if(setDef){
      for(let lv=7;lv>=3;lv--){
        if(setDef.bonus[lv]){
          const active=setBo&&setBo.bonusLevel===lv;
          html+=`<div style="color:${active?'var(--pink)':'var(--muted)'};font-size:9px">${lv}件：`;
          const parts=[];
          const bo=setDef.bonus[lv];
          if(bo.atk)parts.push('攻击+'+bo.atk);
          if(bo.def)parts.push('防御+'+bo.def);
          if(bo.hp)parts.push('生命+'+bo.hp);
          if(bo.critRate)parts.push('暴击+'+bo.critRate+'%');
          if(bo.critDmg)parts.push('爆伤+'+bo.critDmg+'%');
          if(bo.atkSpd)parts.push('攻速+'+bo.atkSpd);
          html+=parts.join(' · ')+(active?' ✅':'')+'</div>';
        }
      }
    }
    html+=`</div>`;
  }
  // 如果有已装备的同部位装备，显示比对
  if(eqIt&&!isEquipped){
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
      <div style="border:1px solid var(--border);border-radius:5px;padding:6px;font-size:11px">
        <div style="font-weight:bold;margin-bottom:4px;color:var(--muted)">📊 当前装备</div>
        <div style="font-weight:bold;color:${QCOLOR[eqIt.quality]};margin-bottom:2px">${eqIt.name}${(G.slotEnhance[eqIt.slot]||0)>0?` <span style="color:var(--orange)">+${G.slotEnhance[eqIt.slot]}</span>`:''}</div>
        <div style="font-size:9px;margin-bottom:2px"><span style="background:${QCOLOR[eqIt.quality]};color:#fff;padding:0 4px;border-radius:3px">${eqIt.qName}</span> · Lv${eqIt.reqLv||1}</div>`;
    // 当前装备属性
    const eqBasicLbls={atk:'攻击力',def:'防御力',hp:'生命值',critRate:'暴击率%',critDmg:'暴击伤害%',atkSpd:'攻速',block:'格挡%',dodge:'闪避%'};
    const eqBasicKeys=['atk','def','hp','critRate','critDmg','atkSpd','block','dodge'];
    for(const k of eqBasicKeys){if(eqIt.stats[k]){const v=Math.round(eqIt.stats[k]*10)/10;const r=eqIt.statRanges&&eqIt.statRanges[k];html+=`<div class="stat-line"><span>${eqBasicLbls[k]||k}</span><span style="font-weight:bold">+${v}${r?` <span style="font-size:8px;color:var(--muted)">(${r.min}-${r.max})</span>`:''}</span></div>`;}}
    if(eqIt.specials&&eqIt.specials.length>0){html+=`<div style="font-size:10px;color:var(--teal);margin-top:3px">✨ 特殊：${eqIt.specials.map(sp=>sp.text).join(' ')}</div>`;}
    html+=`</div>`;
    // 新装备属性（带颜色比对）
    html+=`<div style="border:2px solid var(--purple);border-radius:5px;padding:6px;font-size:11px">
        <div style="font-weight:bold;margin-bottom:4px;color:var(--purple)">🆕 新装备</div>
        <div style="font-weight:bold;color:${QCOLOR[it.quality]};margin-bottom:2px">${it.name}</div>
        <div style="font-size:9px;margin-bottom:2px"><span style="background:${QCOLOR[it.quality]};color:#fff;padding:0 4px;border-radius:3px">${it.qName}</span> · Lv${it.reqLv||1}${it.reqLv&&G.level<it.reqLv?' <span style="color:var(--orange)">⚠️等级不足</span>':''}</div>`;
    for(const k of eqBasicKeys){if(it.stats[k]){const newV=it.stats[k]||0;const oldV=eqIt.stats[k]||0;const diff=newV-oldV;let cls='';if(diff>0.05)cls='color:var(--green)';else if(diff<-0.05)cls='color:var(--red)';const fmtDiff=Math.abs(diff)<0.01?'':(diff>0?'↑+':'↓')+Math.round(diff*10)/10;const nr=it.statRanges&&it.statRanges[k];html+=`<div class="stat-line"><span>${eqBasicLbls[k]||k}</span><span style="font-weight:bold">+${Math.round(newV*10)/10}${nr?` <span style="font-size:8px;color:var(--muted)">(${nr.min}-${nr.max})</span>`:''} <span style="${cls}">${fmtDiff}</span></span></div>`;}}
    if(it.specials&&it.specials.length>0){html+=`<div style="font-size:10px;color:var(--teal);margin-top:3px">✨ 特殊：${it.specials.map(sp=>sp.text).join(' ')}</div>`;}
    html+=`</div></div>`;
    // 战力对比（不含强化战力）
    const totalCur=eqIt.power||0;
    const totalNew=it.power||0;
    const pwDiff=totalNew-totalCur;
    html+=`<div style="text-align:center;margin-top:6px;font-size:12px;font-weight:bold;color:${pwDiff>=0?'var(--green)':'var(--red)'}">⚡ 战力对比：${totalCur} → ${totalNew} (${pwDiff>=0?'+':''}${pwDiff})</div>`;
  }else if(!isEquipped){
    // 无比对时显示装备属性
    const basicLbls={atk:'攻击力',def:'防御力',hp:'生命值',critRate:'暴击率%',critDmg:'暴击伤害%',atkSpd:'攻速',block:'格挡%',dodge:'闪避%'};
    const basicKeys=['atk','def','hp','critRate','critDmg','atkSpd','block','dodge'];
    for(const k of basicKeys){if(it.stats[k]){const v=Math.round(it.stats[k]*10)/10;const r=it.statRanges&&it.statRanges[k];html+=`<div class="stat-line"><span>${basicLbls[k]||k}</span><span style="color:var(--green)">+${v}${r?` <span style="font-size:8px;color:var(--muted)">(${r.min}-${r.max})</span>`:''}</span></div>`;}}
    if(it.specials&&it.specials.length>0){html+=`<div style="font-size:11px;color:var(--teal);margin-top:4px;font-weight:bold;border-top:1px solid var(--border);padding-top:4px">✨ 特殊属性</div>`;for(const sp of it.specials){const sr=it.statRanges&&it.statRanges[sp.id];html+=`<div class="stat-line"><span>${sp.name}</span><span style="color:var(--teal)">${sp.text}${sr?` <span style="font-size:8px;color:var(--muted)">(${sr.min}-${sr.max})</span>`:''}</span></div>`;}}
  }
  box.innerHTML=html;
  const acts=document.createElement('div');acts.className='modal-actions';acts.style.marginTop='8px';
  if(isEquipped){
    // ═══ 已装备：Tab栏（详情 | 洗炼） ═══
    const attrLbls2={atk:'攻击力',def:'防御力',hp:'生命值',critRate:'暴击率',critDmg:'暴击伤害',atkSpd:'攻速',block:'格挡',dodge:'闪避'};
    const attrOrder=['atk','def','hp','critRate','critDmg','atkSpd','block','dodge'];
    const refineAttrs=[];
    for(const k of attrOrder){if(it.stats[k])refineAttrs.push(k);}
    // 构建详情Tab内容
    let infoHtml='';
    const basicLbls={atk:'攻击力',def:'防御力',hp:'生命值',critRate:'暴击率%',critDmg:'暴击伤害%',atkSpd:'攻速',block:'格挡%',dodge:'闪避%'};
    const basicKeys=['atk','def','hp','critRate','critDmg','atkSpd','block','dodge'];
    for(const k of basicKeys){if(it.stats[k]){const v=Math.round(it.stats[k]*10)/10;const r=it.statRanges&&it.statRanges[k];infoHtml+=`<div class="stat-line"><span>${basicLbls[k]||k}</span><span style="color:var(--green)">+${v}${r?` <span style="font-size:8px;color:var(--muted)">(${r.min}-${r.max})</span>`:''}</span></div>`;}}
    if(it.specials&&it.specials.length>0){infoHtml+=`<div style="font-size:11px;color:var(--teal);margin-top:4px;font-weight:bold;border-top:1px solid var(--border);padding-top:4px">✨ 特殊属性</div>`;for(const sp of it.specials){const sr=it.statRanges&&it.statRanges[sp.id];infoHtml+=`<div class="stat-line"><span>${sp.name}</span><span style="color:var(--teal)">${sp.text}${sr?` <span style="font-size:8px;color:var(--muted)">(${sr.min}-${sr.max})</span>`:''}</span></div>`;}}
    const slotElv=G.slotEnhance[source]||0;
    if(ENHANCE_BONUS[source]){
      const eb=ENHANCE_BONUS[source];const nextParts=[];
      if(eb.atk)nextParts.push('攻击+'+Math.floor(eb.atk*(slotElv+1)));
      if(eb.def)nextParts.push('防御+'+Math.floor(eb.def*(slotElv+1)));
      if(eb.hp)nextParts.push('生命+'+Math.floor(eb.hp*(slotElv+1)));
      if(eb.critRate)nextParts.push('暴击+'+(eb.critRate*(slotElv+1)).toFixed(1)+'%');
      if(eb.critDmg)nextParts.push('爆伤+'+Math.floor(eb.critDmg*(slotElv+1)));
      if(eb.atkSpd)nextParts.push('攻速+'+Math.floor(eb.atkSpd*(slotElv+1)));
      if(eb.block)nextParts.push('格挡+'+(eb.block*(slotElv+1)).toFixed(1)+'%');
      if(eb.dodge)nextParts.push('闪避+'+(eb.dodge*(slotElv+1)).toFixed(1)+'%');
      infoHtml+=`<div style="font-size:10px;color:var(--orange);margin-top:4px">强化+${slotElv} → +${slotElv+1}：${nextParts.join(' · ')}</div>`;
    }
    // 构建洗炼Tab内容（逐条属性）
    const rm=REFINE_MATERIALS[source]||{material:'ironOre',baseCount:1};
    const md=MATERIALS[rm.material];
    let refineHtml='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">逐条洗炼属性词条，数值在范围内随机重roll</div>';
    for(const rk of refineAttrs){
      const isSp=SPECIAL_ATTRS.find(x=>x.id===rk);
      let lbl,curVal,range;
      if(isSp){lbl=isSp.name;curVal=isSp.fmt(it.stats[rk]);range=it.statRanges&&it.statRanges[rk];}
      else{
        lbl=attrLbls2[rk]||rk;
        const isPct=['critRate','dodge'].includes(rk);
        curVal=(isPct?Math.round(it.stats[rk]*10)/10:it.stats[rk])+(isPct?'%':'');
        range=it.statRanges&&it.statRanges[rk];
      }
      const rGold=Math.floor((REFINE_COST[it.quality]||500)/3);
      const rMat=rm.baseCount+it.quality;
      const canRef=G.gold>=rGold&&(G.materials[rm.material]||0)>=rMat;
      const rangeStr=range?` <span style="font-size:9px;color:var(--muted)">(${range.min}-${range.max})</span>`:'';
      refineHtml+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 4px;border-bottom:1px solid var(--border);gap:6px">
        <span style="flex:1;font-size:12px;font-weight:bold">${lbl}${rangeStr}</span>
        <span style="color:var(--teal);font-size:12px;min-width:36px;text-align:right">${curVal}</span>
        <button class="btn btn-purple btn-sm refine-attr-btn" data-key="${rk}" ${canRef?'':'disabled'} style="font-size:10px;padding:3px 6px;white-space:nowrap">🔄 💰${rGold}+${md.icon}${rMat}</button>
      </div>`;
    }
    if(refineAttrs.length===0)refineHtml='<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">该装备没有可洗炼的属性</div>';
    // 构建重铸Tab内容（逐条特殊属性）
    const recastAttrs=[];
    if(it.specials){for(const sp of it.specials)recastAttrs.push(sp.id);}
    let recastHtml='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">消耗♻️重铸石随机重roll特殊属性数值（当前：'+(G.materials.recastStone||0)+'个）</div>';
    for(const rk of recastAttrs){
      const sa=SPECIAL_ATTRS.find(x=>x.id===rk);
      if(!sa)continue;
      const curVal=sa.fmt(it.stats[rk]);
      const range=it.statRanges&&it.statRanges[rk];
      const rangeStr=range?` <span style="font-size:9px;color:var(--muted)">(${range.min}-${range.max})</span>`:'';
      const canRecast=(G.materials.recastStone||0)>0;
      recastHtml+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 4px;border-bottom:1px solid var(--border);gap:6px">
        <span style="flex:1;font-size:12px;font-weight:bold">${sa.name}${rangeStr}</span>
        <span style="color:var(--teal);font-size:12px;min-width:36px;text-align:right">${curVal}</span>
        <button class="btn btn-orange btn-sm recast-attr-btn" data-key="${rk}" ${canRecast?'':'disabled'} style="font-size:10px;padding:3px 6px;white-space:nowrap">♻️ 重铸</button>
      </div>`;
    }
    if(recastAttrs.length===0)recastHtml='<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">该装备没有可重铸的特殊属性</div>';
    // 插入Tab栏到modal-box
    const tabBlock=document.createElement('div');
    tabBlock.innerHTML=`<div class="tabs" style="margin-top:8px">
      <button class="tab-btn active" data-equiptab="info">📋 详情</button>
      <button class="tab-btn" data-equiptab="refine">🔄 洗炼</button>
      <button class="tab-btn" data-equiptab="recast">♻️ 重铸</button>
    </div>
    <div class="bag-tab-content active" id="equip-tab-info">${infoHtml}</div>
    <div class="bag-tab-content" id="equip-tab-refine">${refineHtml}</div>
    <div class="bag-tab-content" id="equip-tab-recast">${recastHtml}</div>`;
    box.appendChild(tabBlock);
    // Tab切换
    box.querySelectorAll('[data-equiptab]').forEach(btn=>{
      btn.addEventListener('click',function(){
        box.querySelectorAll('[data-equiptab]').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        const tn=this.dataset.equiptab;
        document.getElementById('equip-tab-info').classList.toggle('active',tn==='info');
        document.getElementById('equip-tab-refine').classList.toggle('active',tn==='refine');
        document.getElementById('equip-tab-recast').classList.toggle('active',tn==='recast');
      });
    });
    // 如果指定了激活Tab，切换到对应Tab
    if(activeTab&&activeTab!=='info'){
      const targetBtn=box.querySelector('[data-equiptab="'+activeTab+'"]');
      if(targetBtn)targetBtn.click();
    }
    // 逐条洗炼按钮事件
    box.querySelectorAll('.refine-attr-btn').forEach(btn=>{
      btn.addEventListener('click',function(){doRefineAttr(source,this.dataset.key);});
    });
    // 逐条重铸按钮事件
    box.querySelectorAll('.recast-attr-btn').forEach(btn=>{
      btn.addEventListener('click',function(){doRecastAttr(source,this.dataset.key);});
    });
    // 卸下按钮
    const ub=document.createElement('button');ub.className='btn btn-red btn-sm';ub.textContent='卸下装备';
    ub.addEventListener('click',()=>{if(G.inventory.length<G.maxInv){G.inventory.push(it);G.equipped[source]=null;addLog(`🔧 卸下装备：${it.name}`,'sys');}else addLog('⚠️ 背包已满','sys');closeModal();computeStats();renderAll();});
    acts.appendChild(ub);
    // 强化按钮
    const enhBtn=document.createElement('button');enhBtn.className='btn btn-gold btn-sm';
    const tier=Math.floor(slotElv/10);const inTier=(slotElv%10)+1;
    const enhGold=200+slotElv*150+tier*500;
    const enhOre=3+slotElv*2+tier*3;
    const enhRate=Math.max(5,100-(inTier-1)*10);
    enhBtn.innerHTML=`⚒️ 强化 (💰${enhGold}+🪨${enhOre}) ${enhRate}%`;
    enhBtn.disabled=G.gold<enhGold||(G.materials.ironOre||0)<enhOre;
    enhBtn.addEventListener('click',()=>{doEnhance(source);});
    acts.appendChild(enhBtn);
    box.appendChild(acts);
  }else{
    const eqb=document.createElement('button');eqb.className='btn btn-purple btn-sm';eqb.textContent='装备';
    if(levelTooLow){eqb.disabled=true;eqb.style.opacity='0.5';eqb.title='需要等级 '+it.reqLv+'（当前等级 '+G.level+'）';}
    else if(cantEquip){eqb.disabled=true;eqb.style.opacity='0.5';eqb.title='该装备需要「'+clsNames2[it.classReq]+'」职业';}
    eqb.addEventListener('click',()=>{const old=G.equipped[it.slot];G.equipped[it.slot]=it;G.inventory.splice(source,1);if(old)G.inventory.push(old);addLog(`🛡️ 装备：${it.name}`,'sys');closeModal();computeStats();renderAll();checkQuests();});
    acts.appendChild(eqb);
    const selb=document.createElement('button');selb.className='btn btn-red btn-sm';selb.textContent='出售（💰'+fmt(Math.floor(it.power*2))+')';
    selb.addEventListener('click',()=>{
      box.innerHTML=`<h3>💰 确认出售</h3><p style="font-size:12px;margin:8px 0">确定出售 <b style="color:${QCOLOR[it.quality]}">${it.name}</b> 获得 <b style="color:var(--gold)">${fmt(Math.floor(it.power*2))}金币</b> 吗？</p>
        <div style="display:flex;gap:8px"><button class="btn btn-red" style="flex:1" id="btn-sell-yes">✅ 出售</button><button class="btn btn-sm" style="flex:1" id="btn-sell-no">❌ 取消</button></div>`;
      document.getElementById('btn-sell-no').addEventListener('click',()=>{showItemModal(it,source,isEquipped);});
      document.getElementById('btn-sell-yes').addEventListener('click',()=>{G.gold+=Math.floor(it.power*2);G.inventory.splice(source,1);addLog(`💰 出售：${it.name}，获得${fmt(Math.floor(it.power*2))}金币`,'sys');closeModal();renderAll();checkQuests();});
    });
    acts.appendChild(selb);
  }
  box.appendChild(acts);
  const clb=document.createElement('button');clb.className='btn btn-sm';clb.style.cssText='width:100%;margin-top:6px';clb.textContent='关闭';
  clb.addEventListener('click',closeModal);box.appendChild(clb);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function doEnhance(slot){
  const it=G.equipped[slot];if(!it)return;
  const elv=G.slotEnhance[slot]||0;
  if(elv>=300){addLog('⚠️ 已达到强化上限(+300)','sys');return;}
  // 消耗随等级递增
  const tier=Math.floor(elv/10);
  const goldCost=200+elv*150+tier*500;
  const oreCost=3+elv*2+tier*3;
  // 成功率：每10级一个循环，+1=100%, +2=90%, ... +10=10%, +11重新从100%开始
  const inTier=(elv%10)+1; // 当前在1-10中的位置
  const successRate=Math.max(5,100-(inTier-1)*10);
  if(G.gold<goldCost){addLog('⚠️ 金币不足','sys');return;}
  if((G.materials.ironOre||0)<oreCost){addLog('⚠️ 铁矿石不足','sys');return;}
  G.gold-=goldCost;G.materials.ironOre-=oreCost;
  G.enhanceTotal=(G.enhanceTotal||0)+1; // 追踪强化次数（含成败）
  if(Math.random()*100<successRate){
    G.slotEnhance[slot]=(G.slotEnhance[slot]||0)+1;
    const ep=getEnhancePower(slot);

      else newVal=0;
      newVal=Math.floor(newVal);
    }else if(key==='hp'){

      else if(slot==='pants')newVal=randi(5,15)*mm;
      else if(slot==='pendant')newVal=randi(5,20)*mm;
      else newVal=0;
      newVal=Math.floor(newVal);
    }else if(key==='critRate'){
      if(slot==='mainHand')newVal=randf(0,1)*mm;

      if(slot==='boots')newVal=randi(2,8)*mm;

    }else{
      const sa=SPECIAL_ATTRS.find(x=>x.id===key);
      if(sa){const rf2=(1+((it.reqLv||1)-1)*0.005)*(0.7+q*0.10);newVal=randi(Math.floor(sa.min*rf2/sa.step),Math.floor(sa.max*rf2/sa.step))*sa.step;
        // 单件上限
        if(sa.id==='lifesteal')newVal=Math.min(newVal,10);

function doRecastAttr(slot,key){

function doRecastAttrInner(slot,key,it,sa,range){
  G.materials.recastStone--;

    newVal=randi(Math.floor(sa.min*rf/sa.step),Math.floor(sa.max*rf/sa.step))*sa.step;

const CONSUMABLE_NAMES={hpPotion:'小血瓶',hpLarge:'大血瓶',atkScroll:'攻击卷轴',defScroll:'防御卷轴',hpScroll:'生命卷轴'};

function gachaPull(count){
  const cost=count===10?90:10;
  if(G.diamond<cost)return addLog('⚠️ 钻石不足','sys');
  const needed=G.maxInv-G.inventory.length;
  if(count>needed)return addLog('⚠️ 背包空间不足（剩余'+needed+'格，需要'+count+'格），请先清理背包或使用扩容道具','sys');
  // 确认提示
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');
  ov.classList.add('show');
  box.innerHTML=`<h3>💎 确认抽奖</h3><p style="font-size:12px;margin:8px 0">确定使用 <b style="color:var(--purple)">💎${cost}钻石</b> 进行${count===10?'十连':'单次'}抽取吗？</p>
    <div style="display:flex;gap:8px"><button class="btn btn-pink" style="flex:1" id="btn-gacha-yes">✅ 确定抽取</button><button class="btn btn-sm" style="flex:1" id="btn-gacha-no">❌ 取消</button></div>`;
  document.getElementById('btn-gacha-no').addEventListener('click',closeModal);
  document.getElementById('btn-gacha-yes').addEventListener('click',()=>{
    closeModal();
    G.diamond-=cost;
  const equips=[];
  const consObtained=[];
  for(let i=0;i<count;i++){
    if(randi(1,100)<=30){
      const ct=randomConsumableType();
      consObtained.push(ct);
      G.consumables[ct]=(G.consumables[ct]||0)+1;
    }else{
      const q=rollGachaQuality();
      const slot=pick(Object.keys(EQ_NAMES));
      equips.push(genEquip(slot,q,q,G.level));
    }
  }
  const pityEquip=count===10?genEquip(pick(Object.keys(EQ_NAMES)),Math.max(4,rollGachaQuality()),8,G.level):null;
  if(pityEquip)equips.push(pityEquip);
  let lostCount=0;
  for(const it of equips){
    if(G.inventory.length<G.maxInv){G.inventory.push(it);autoEquipCheck(it);}
    else{lostCount++;}
  }
  const consMap={};
  for(const c of consObtained)consMap[c]=(consMap[c]||0)+1;
  // 结果弹窗

function useHpPotionSmall(isAuto){

  const n=now();const cdLeft=G._lastHpSmallUse?10000-(n-G._lastHpSmallUse):0;

function switchClass(newClassId){
  const clsNames={warrior:'战士',archer:'射手',mage:'法师'};
  if(newClassId===G.classId)return addLog('⚠️ 已是该职业','sys');
  const cost=G.switchCount===0?0:G.classSwitchCost+Math.floor(G.switchCount*100);
  if(G.diamond<cost)return addLog(`⚠️ 钻石不足，需要${cost}💎`,'sys');
  if(cost>0)G.diamond-=cost;
  G.switchCount++;G.classSwitchCost=cost+100;
  G.learnedSkills[G.classId]=G.skills.filter(s=>s.skillType==='passive').map(s=>({...s}));
  G.classId=newClassId;G.classTier=0;G.className=clsNames[newClassId]+'学徒';G.classIcon=null;G.classStatsAdv={};G.classAdvId=null;
  const savedSkills=G.learnedSkills[newClassId]||[];
  const defSkill=SKILLS[G.classId]&&SKILLS[G.classId].find(s=>s.unlockLv===0);
  G.skills=defSkill?[{...defSkill,lastUsed:0,gradeIdx:0,grade:'D',xp:0}]:[];
  for(const ss of savedSkills){if(!G.skills.find(s=>s.id===ss.id))G.skills.push({...ss,lastUsed:0});}
  G.skill2=G.level>=10?SKILLS[G.classId].find(sk=>sk.unlockLv===10):null;
  if(G.skill2&&!G.skills.find(s=>s.id===G.skill2.id))G.skills.push({...G.skill2,lastUsed:0,gradeIdx:0,grade:'D',xp:0});
  addLog(`🔄 转职为：${G.className}！${cost===0?'首次免费！':'消耗'+cost+'💎'}`,'sys');
  if(savedSkills.length>0)addLog(`📖 恢复了${savedSkills.length}个已学技能`,'sys');
  // 卸下非本职业的装备
  let unequipped=0;
  for(const slot in G.equipped){
    const eq=G.equipped[slot];
    if(eq&&eq.classReq&&eq.classReq!=='all'&&eq.classReq!==G.classId){
      if(G.inventory.length<G.maxInv){G.inventory.push(eq);}else{G.gold+=decomposeItem(eq);}
      G.equipped[slot]=null;unequipped++;
    }
  }
  if(unequipped>0)addLog(`🔧 卸下了${unequipped}件不匹配的装备`,'sys');
  closeModal();computeStats();renderAll();
}

function applySkillBuff(sk,gradeMult){
  const dur=10000; // 持续10秒
  const n=now();
  switch(sk.id){
    case 'berserk': G.buffs.atk={val:Math.floor(G.curAtk*0.30*gradeMult),until:n+dur}; break;
    case 'shield_wall': G.buffs.def={val:Math.floor(G.curDef*0.50*gradeMult),until:n+dur}; break;
    case 'blood_rage': G.buffs.atk={val:Math.floor(G.curAtk*0.40*gradeMult),until:n+dur}; break;
    case 'frenzy': G.buffs.atkSpd={val:Math.floor(30*gradeMult),until:n+dur}; break;

function gameTick(){
  if(G.dead){
    // 死亡倒计时提示
    if(now()>=G.deadUntil){
      G.dead=false;G.deadUntil=0;G.hp=Math.floor(G.maxHp*0.5);
      G.enemy=genMonster();G.killStreak=0;
      G._monsterSpawnTime=now(); // 复活后延迟1秒再战斗
      addLog('🔄 你复活了！怪物已刷新','sys');
    }
    // 更新死亡倒计时显示
    const remainSec=Math.ceil((G.deadUntil-now())/1000);
    document.getElementById('en-name').textContent=`💀 等待复活... ${remainSec}秒`;
    document.getElementById('en-hp').textContent=`0/${fmt(G.maxHp)}`;
    document.getElementById('en-hp-bar').style.width='0%';
    renderTopBar();renderLog();refreshQuestUI();renderBuffBar();refreshConsumableBtns();
    return;
  }
  // 怪物死亡后3秒刷新，等待时显示倒计时
  if(!G.enemy&&G._nextMonsterTime&&now()<G._nextMonsterTime){
    const remainSec=Math.ceil((G._nextMonsterTime-now())/1000);
    document.getElementById('en-name').textContent=`⏳ 怪物刷新中... ${remainSec}秒`;
    document.getElementById('en-hp').textContent='-/-';
    document.getElementById('en-hp-bar').style.width='0%';
  } else if(!G.enemy&&(!G._nextMonsterTime||now()>=G._nextMonsterTime)){
    G.enemy=genMonster();G._nextMonsterTime=0;
    G._monsterSpawnTime=now(); // 记录怪物刷新时间，用于1秒战斗延迟
  }
  // 装备恢复属性 — 战斗中/脱战每2秒回复一次
  if(G.curHpRegen&&G.hp<G.maxHp){
    G._regenTick=(G._regenTick||0)+1;
    if(G._regenTick>=2){G._regenTick=0;G.hp=Math.min(G.maxHp,G.hp+G.curHpRegen);}
  }
  // 小血瓶HoT处理
  if(G._hpSmallHoT&&now()<G._hpSmallHoT.until){
    const n=now();
    if(n-G._hpSmallHoT.lastTick>=G._hpSmallHoT.tickInterval){
      G._hpSmallHoT.lastTick=n;
      G.hp=Math.min(G.maxHp,G.hp+G._hpSmallHoT.perTick);
    }
  }else{G._hpSmallHoT=null;}
  // 自动用药检测（战斗中且HP低于阈值）
  const nAuto=now();
  if(G.enemy&&G.enemy.hp>0&&G.hp<G.maxHp){
    // 大血瓶：HP<35% 自动使用
    if(G.autoHpLarge&&G.consumables.hpLarge>0&&G.hp<G.maxHp*0.35&&nAuto-G._lastHpLargeUse>=10000){
      useHpPotionLarge(true);
    }
    // 小血瓶：HP<60% 自动使用（没有HoT时）
    else if(G.autoHpSmall&&G.consumables.hpPotion>0&&G.hp<G.maxHp*0.60&&!G._hpSmallHoT&&nAuto-G._lastHpSmallUse>=10000){
      useHpPotionSmall(true);
    }
  }
  // Out-of-combat regen + special regen
  if(G.hp<G.maxHp&&(!G.enemy||G.enemy.hp<=0)){
    G._oocRegenTick=(G._oocRegenTick||0)+1;
    if(G._oocRegenTick>=2){G._oocRegenTick=0;G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*0.02+(G.curHpRegen||0)));}
  }
  // Enemy regen (elite/boss special) — 改为每3秒恢复一次
  if(G.enemy&&G.enemy.hp>0&&G.enemy._regen&&!G._enemyRegenTick){
    G._enemyRegenTick=0;
  }
  if(G.enemy&&G.enemy.hp>0&&G.enemy._regen){
    G._enemyRegenTick=(G._enemyRegenTick||0)+1;
    if(G._enemyRegenTick>=3){
      G._enemyRegenTick=0;
      G.enemy.hp=Math.min(G.enemy.maxHp,G.enemy.hp+Math.floor(G.enemy.maxHp*G.enemy._regen));
    }
  }
  // DOT damage from enemy
  if(G.buffs.dot&&now()<G.buffs.dot.until){
    G.hp-=G.buffs.dot.dmg;
    if(G.hp<=0){G.hp=0;playerDie('💀 毒发身亡！5秒后复活...');}
  }
  // Slow debuff consumption
  if(G._slowUntil&&now()<G._slowUntil){G._slowed=true;}else{G._slowed=false;}
  if(G.autoAtk&&G.enemy&&G.enemy.hp>0){
    // 怪物刷新/复活后等待1秒再开始战斗，让玩家看清怪物
    if(G._monsterSpawnTime&&now()-G._monsterSpawnTime<1000)return;
    // 敌人汲取减益：降低攻速
    const atkSpdReduce=G.enemy._atkSpdReduce||0;
    const effectiveAtkSpd=Math.max(20,G.curAtkSpd+atkSpdReduce); // 攻速值越高越慢
    const spd=Math.max(800,(G._slowed?effectiveAtkSpd*1.5:effectiveAtkSpd)*10);
    if(!G._lastAutoAtk||now()-G._lastAutoAtk>=spd){G._lastAutoAtk=now();
      if(G.autoSkill){const sk=G.skills.find(s=>canUseSkill(s));playerAttack(!!sk);}
      else playerAttack(false);
    }
  }
  // Clean expired DOT / slow
  if(G.buffs.dot&&now()>=G.buffs.dot.until)delete G.buffs.dot;
  if(G._slowUntil&&now()>=G._slowUntil){G._slowUntil=0;G._slowed=false;}
  renderTopBar();renderEnemy();refreshSkillBtns();renderLog();refreshQuestUI();renderBuffBar();refreshConsumableBtns();
  const n2=now();const expiredKeys=[];for(const id in G.buffs){if(G.buffs[id].until<n2)expiredKeys.push(id);}for(const id of expiredKeys)delete G.buffs[id];
  if(Object.keys(G.buffs).length>0)computeStats();
}

// ═══ 离线收益计算 ═══
function calculateOfflineRewards(offlineSec){
  const MAX_OFFLINE = 8 * 3600; // 8小时上限
  offlineSec = Math.min(offlineSec, MAX_OFFLINE);
  
  const m = MAPS.find(x=>x.id===G.curMap)||MAPS[0];
  if(!m)return null;
  
  // 获取当前地图所有怪物
  const allMon = [...m.monsters];
  if(m.elite)allMon.push(m.elite);
  if(m.boss)allMon.push(m.boss);
  
  // 计算平均怪物属性
  let avgHp=0,avgDef=0,avgXp=0,avgGold=0,totalWeight=0;
  const weights = allMon.map(mo=>{
    const w = mo===m.boss ? 5 : mo===m.elite ? 15 : 80;
    totalWeight += w;
    return {mo,w};
  });
  for(const {mo,w} of weights){
    const typeMult = mo===m.boss ? 5 : mo===m.elite ? 2.5 : 1;
    avgHp += mo.hp * typeMult * w / totalWeight;
    avgDef += mo.def * typeMult * w / totalWeight;
    avgXp += mo.xp * w / totalWeight;
    avgGold += mo.gold * w / totalWeight;
  }
  avgHp = Math.floor(avgHp); avgDef = Math.floor(avgDef); avgXp = Math.floor(avgXp); avgGold = Math.floor(avgGold);
  
  // 计算平均伤害和击杀时间
  const avgDmg = Math.max(1, G.curAtk - Math.floor(avgDef * 0.3));
  const critBonus = 1 + (G.curCritRate / 100) * ((G.curCritDmg - 100) / 100);
  const effDmg = avgDmg * critBonus;
  const atkInterval = Math.max(800, G.curAtkSpd * 10);
  const hitsToKill = Math.ceil(avgHp / Math.max(1, effDmg));
  const avgKillTimeMs = hitsToKill * atkInterval;
  
  // 离线击杀数（全额击杀，装备/材料/技能书不打折）
  const offlineMs = offlineSec * 1000;
  let killCount = Math.floor(offlineMs / avgKillTimeMs);
  if(killCount < 1) killCount = 1;
  if(killCount > 100000) killCount = 100000;
  
  // 批量结算收益
  let totalXp = 0, totalGold = 0, totalSkillXp = 0;
  const equipDrops = [];
  const matDrops = {};
  const skillUpgrades = []; // 记录离线期间技能升级
  const levelBefore = G.level;
  let equipKept = 0; // 实际保留的装备数量
  
  // 经验、金币、技能经验按在线50%打折
  if(G.level < 300){
    totalXp = Math.floor(killCount * avgXp * (1 + G.curExpBonus / 100) * 0.5);
    G.xp += totalXp;
  } else {
    totalXp = 0;
  }
  // 离线升级：直接操作属性，避免触发转职弹窗
  while(G.xp >= xpForLevel(G.level) && G.level < 300){
    G.xp -= xpForLevel(G.level);
    G.level++;
    const growth=CLASS_GROWTH[G.classId];
    G.str+=growth.str;G.vit+=growth.vit;G.agi+=growth.agi;G.dex+=growth.dex;G.int+=growth.int;
    if(G.level===10&&!G.skill2){const sk2=SKILLS[G.classId].find(sk=>sk.unlockLv===10);if(sk2){G.skill2={...sk2,lastUsed:0,gradeIdx:0,grade:'D',xp:0};if(!G.skills.find(s=>s.id===sk2.id))G.skills.push({...sk2,lastUsed:0,gradeIdx:0,grade:'D',xp:0});}}
  }
  computeStats();G.hp=G.maxHp;
  const levelAfter = G.level;
  
  // 离线技能经验（在线50%效率）
  const offlineSkillUses = Math.floor(killCount * 0.5);
  for(const sk of G.skills){
    if(sk.gradeIdx >= 4) continue;
    let gained = 0;
    for(let u = 0; u < offlineSkillUses; u++){
      sk.xp = (sk.xp || 0) + 1; // 离线每次固定+1（在线是0~1随机，取上限的一半补偿）
      gained++;
      const nextXp = skillXpForGrade(sk.gradeIdx + 1);
      if(sk.xp >= nextXp && sk.gradeIdx < 4){
        sk.xp -= nextXp;
        sk.gradeIdx++;
        sk.grade = SKILL_GRADES[sk.gradeIdx];
        skillUpgrades.push({name:sk.name,icon:sk.icon,grade:sk.grade});
      }
    }
    totalSkillXp += gained;
  }
  
  totalGold = Math.floor(killCount * avgGold * (1 + G.curGoldBonus / 100) * 0.8);
  G.gold += totalGold;
  // 更新 collect_gold 任务离线进度
  for(const q of G.quests){
    if(!q.submitted && q.type==='collect_gold') q._goldCollected = (q._goldCollected||0) + totalGold;
  }
  
  // 装备掉落（期望批量产出）
  const typeBase = 0.06;
  const lvBonus = Math.min(G.level/200, 0.10);
  const mfBonus = G.curMagicFind / 200;
  const avgDropRate = Math.min(typeBase + lvBonus + mfBonus, 0.65);
  const equipCount = Math.floor(killCount * avgDropRate);
  // 离线装备等级：取人物等级±3范围随机，受地图上下限约束
  const mapMaxLv = m.maxLv || m.lv + 10;
  const mapMinLv = m.lv;
  const offlineMinLv = Math.max(mapMinLv, G.level - 3);
  const offlineMaxLv = Math.min(mapMaxLv, G.level + 3);
  const offlineMonLv = randi(Math.max(offlineMinLv, 1), Math.max(offlineMaxLv, 1));
  for(let i=0;i<Math.min(equipCount,50);i++){
    const slot = pick(Object.keys(EQ_NAMES));
    const it = genEquip(slot, 0, Math.min(8, Math.floor(G.level/20)+2), offlineMonLv);
    // 检查自动分解
    const nonClass=G.decomposeNonClass&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    if(nonClass||(G.autoDecompose&&it.quality<=G.decomposeThreshold)){
      const goldGot = decomposeItem(it);
      G.gold += goldGot;
      totalGold += goldGot;
      // 自动分解的装备不展示在列表
    }else if(G.inventory.length < G.maxInv){
      G.inventory.push(it);
      autoEquipCheck(it);
      equipKept++;
      if(equipDrops.length < 10) equipDrops.push(it);
    }else{
      const goldGot = decomposeItem(it);
      G.gold += goldGot;
      totalGold += goldGot;
    }
  }
  
  // 材料掉落
  for(const[mid,mdef] of Object.entries(MATERIALS)){
    if(mdef.dropSources.includes('normal')||mdef.dropSources.includes('elite')||mdef.dropSources.includes('boss')){
      const matCount = Math.floor(killCount * mdef.dropRate * 0.5);
      if(matCount > 0){
        G.materials[mid] = (G.materials[mid]||0) + matCount;
        matDrops[mid] = (matDrops[mid]||0) + matCount;
      }
    }
  }
  
  // 更新击杀计数（包含精英和Boss）
  G.killAnyCount = (G.killAnyCount||0) + killCount;
  const allMonKills = [...m.monsters];
  if(m.elite) allMonKills.push(m.elite);
  if(m.boss) allMonKills.push(m.boss);
  for(const mo of allMonKills){
    G.kills[mo.name] = (G.kills[mo.name]||0) + Math.max(1, Math.floor(killCount * 0.8 / allMonKills.length));
  }
  
  G.hp = G.maxHp;
  G.enemy = genMonster();
  checkQuests();
  
  return {
    offlineSec, killCount,
    totalXp, totalGold, totalSkillXp,
    levelBefore, levelAfter,
    equipDrops: equipDrops.slice(0, 10),
    equipTotal: equipKept,
    matDrops,
    skillUpgrades,
  };
}

// 同步加载（从localStorage，启动时不阻塞）
function loadGameSync(){
  try{
    const raw = localStorage.getItem('legend_idle_save');
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    parsed._rawTimestamp = parsed.timestamp || 0; // 保留原始时间戳
    return restoreGameData(parsed);
  }catch(e){console.error('Load failed:',e);return null;}
}

// 异步加载（从OPFS文件，后台尝试）
async function loadGame(){
  let raw = null;
  let source = 'localStorage';
  
  if(_useOPFS && _opfsRoot){
    try{
      raw = await readOPFS(SAVE_FILENAME);
      if(raw){
        source = '本地文件';
      } else {
        raw = await readOPFS(SAVE_BACKUP_FILENAME);
        if(raw) source = '备份文件';
      }
    }catch(e){}
  }
  
  if(!raw){
    raw = localStorage.getItem('legend_idle_save');
    source = 'localStorage';
  }
  
  if(!raw) return null;
  
  try{
    const d = JSON.parse(raw);
    if(!d || !d.version) return null;
    const restored = restoreGameData(d);
    if(restored) restored._saveSource = source;
    return restored;
  }catch(e){
    console.error('Load failed:', e);
    return null;
  }
}

// 从存档数据恢复游戏状态
function restoreGameData(d){
  const clsNames={warrior:'战士',archer:'射手',mage:'法师'};
  G.level = d.level; G.xp = d.xp; G.gold = d.gold; G.diamond = d.diamond;
  G.classId = d.classId; G.classTier = d.classTier; G.className = d.className || clsNames[G.classId]+'学徒';
  G.classSwitchCost = d.classSwitchCost; G.switchCount = d.switchCount;
  G.str = d.str; G.vit = d.vit; G.agi = d.agi; G.dex = d.dex; G.int = d.int;
  G.hp = d.hp; G.maxHp = d.maxHp;
  G.equipped = d.equipped || {}; G.inventory = d.inventory || []; G.maxInv = d.maxInv || 50;
  
  for(const k in G.equipped){if(G.equipped[k]&&!G.equipped[k].reqLv)G.equipped[k].reqLv=1;}
  for(const it of G.inventory){if(it&&!it.reqLv)it.reqLv=1;}
  
  G.curMap = d.curMap || 'village';
  G.kills = d.kills || {};
  G.consumables = d.consumables || {hpPotion:2,hpLarge:0,atkScroll:0,defScroll:0,hpScroll:0};
  G.autoAtk = !!d.autoAtk; G.autoSkill = !!d.autoSkill; G.autoEquip = !!d.autoEquip;
  G.autoDecompose = !!d.autoDecompose; G.decomposeThreshold = d.decomposeThreshold || 0; G.decomposeNonClass = !!d.decomposeNonClass;
  G.autoHpSmall = !!d.autoHpSmall; G.autoHpLarge = !!d.autoHpLarge;
  G.learnedSkills = d.learnedSkills || {};
  G.killAnyCount = d.killAnyCount || 0;
  G.enhanceTotal = d.enhanceTotal || 0;
  G._consumableUseHistory = d._consumableUseHistory || {};
  G.quests = d.quests || [];
  G.questRefreshTime = d.questRefreshTime || 0;
  G.skillBooks = d.skillBooks || [];
  G.materials = d.materials || {};
  G.bagExpansions = d.bagExpansions || 0;
  G.slotEnhance = d.slotEnhance || {};
  G.classStatsAdv = d.classStatsAdv || {};
  G.classIcon = d.classIcon || null;
  G.classAdvId = d.classAdvId || null;
  G.logs = d.logs || [];
  G._lastSaveTime = d.timestamp || 0; // 离线收益用
  
  for(const it of G.inventory){if(it.quality==null)it.quality=0;if(it.power==null)it.power=itemPower(it);}
  for(const k in G.equipped){const it=G.equipped[k];if(it){if(it.quality==null)it.quality=0;if(it.power==null)it.power=itemPower(it);}}
  G.dead = false; G.deadUntil = 0;
  
  G.skills = [];
  if(d.skillIds && d.skillIds.length > 0){
    const clsSkills = SKILLS[G.classId] || [];
    for(const sid of d.skillIds){
      const sk = clsSkills.find(s=>s.id===sid);
      if(sk){
        const savedGrade = (d.skillGrades||[]).find(g=>g.id===sid);
        G.skills.push({...sk, lastUsed: 0, gradeIdx:savedGrade?savedGrade.gradeIdx||0:0, grade:savedGrade?savedGrade.grade||'D':'D', xp:savedGrade?savedGrade.xp||0:0});
      }
    }
  }
  if(G.skills.length === 0 && SKILLS[G.classId]){
    const defSkill3=SKILLS[G.classId].find(s=>s.unlockLv===0);
    if(defSkill3) G.skills = [{...defSkill3, lastUsed: 0, gradeIdx:0, grade:'D', xp:0}];
  }
  if(d.skill2Id){
    const sk2 = (SKILLS[G.classId] || []).find(s=>s.id===d.skill2Id);
    if(sk2){
      const savedGrade2=(d.skillGrades||[]).find(g=>g.id===d.skill2Id);
      G.skill2 = {...sk2, lastUsed:0, gradeIdx:savedGrade2?savedGrade2.gradeIdx||0:0, grade:savedGrade2?savedGrade2.grade||'D':'D', xp:savedGrade2?savedGrade2.xp||0:0};
      if(!G.skills.find(s=>s.id===sk2.id)){
        G.skills.push({...G.skill2});
      }
    }
  }
  
  G.buffs = {};
  if(d._buffs){
    for(const [id, b] of Object.entries(d._buffs)){
      if(b.until > 0) G.buffs[id] = {...b, until: now() + b.until};
    }
  }
  
  setTimeout(()=>{
    const aa=document.getElementById('auto-atk');if(aa)aa.checked=G.autoAtk;
    const as=document.getElementById('auto-skill');if(as)as.checked=G.autoSkill;
    const ae=document.getElementById('auto-equip');if(ae)ae.checked=G.autoEquip;
    const ahs=document.getElementById('auto-hp-small');if(ahs)ahs.checked=G.autoHpSmall;
    const ahl=document.getElementById('auto-hp-large');if(ahl)ahl.checked=G.autoHpLarge;
    const ad=document.getElementById('auto-decompose');if(ad)ad.checked=G.autoDecompose;
    const dn=document.getElementById('decompose-nonclass');if(dn)dn.checked=G.decomposeNonClass;
    const dq2=document.getElementById('decompose-quality');if(dq2)dq2.value=G.decomposeThreshold;
  }, 100);
  
  G.enemy = null;
  return G;
}

// ═══ 本地文件存档系统 (OPFS) ═══
// 优先使用 Origin Private File System，降级使用 localStorage
const SAVE_FILENAME = 'legend_idle_save.json';
const SAVE_BACKUP_FILENAME = 'legend_idle_save_backup.json';
let _saveFileHandle = null; // 用于 File System Access API
let _opfsRoot = null;
let _useOPFS = false;

// 初始化OPFS
async function initOPFS(){
  try{
    _opfsRoot = await navigator.storage.getDirectory();
    _useOPFS = true;
    return true;
  }catch(e){
    _useOPFS = false;
    return false;
  }
}

// 从OPFS读取文件
async function readOPFS(filename){
  if(!_opfsRoot) return null;
  try{
    const fileHandle = await _opfsRoot.getFileHandle(filename);
    const file = await fileHandle.getFile();
    const text = await file.text();
    return text;
  }catch(e){
    return null;
  }
}

// 写入OPFS文件
async function writeOPFS(filename, content){
  if(!_opfsRoot) return false;
  try{
    const fileHandle = await _opfsRoot.getFileHandle(filename, {create: true});
    const writable = await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();
    return true;
  }catch(e){
    return false;
  }
}

// 自动保存到本地文件
async function autoSaveToFile(){
  const now_ = now();
  const saveData = buildSaveData(now_);
  const jsonStr = JSON.stringify(saveData);
  
  // 同时保存到 localStorage (快速回退)
  try{localStorage.setItem('legend_idle_save', jsonStr);}catch(e){}
  
  // 保存到OPFS本地文件
  if(_useOPFS && _opfsRoot){
    try{
      // 先写备份，再写主文件（防止写入中断导致数据损坏）
      await writeOPFS(SAVE_BACKUP_FILENAME, jsonStr);
      await writeOPFS(SAVE_FILENAME, jsonStr);
      // 更新保存指示器
      const si = document.getElementById('save-indicator');
      if(si && si.style.display !== 'inline'){
        si.style.display = 'inline';
        si.textContent = '💾 已自动保存(文件)';
        setTimeout(()=>{si.style.display = 'none';}, 2000);
      }
    }catch(e){
      // OPFS写入失败，仅依赖localStorage
      const si = document.getElementById('save-indicator');
      if(si && si.style.display !== 'inline'){
        si.style.display = 'inline';
        si.textContent = '💾 已自动保存';
        setTimeout(()=>{si.style.display = 'none';}, 2000);
      }
    }
  }
}

// 构建存档数据对象
function buildSaveData(now_){
  const saveData = {
    version: 2,
    timestamp: now_,
    level: G.level, xp: G.xp, gold: G.gold, diamond: G.diamond,
    classId: G.classId, classTier: G.classTier, className: G.className,
    classSwitchCost: G.classSwitchCost, switchCount: G.switchCount,
    str: G.str, vit: G.vit, agi: G.agi, dex: G.dex, int: G.int,
    hp: G.hp, maxHp: G.maxHp,
    equipped: G.equipped, inventory: G.inventory, maxInv: G.maxInv,
    skillIds: G.skills.map(s=>s.id),
    skillGrades: G.skills.map(s=>({id:s.id,gradeIdx:s.gradeIdx||0,grade:s.grade||'D',xp:s.xp||0})),
    skill2Id: G.skill2 ? G.skill2.id : null,
    curMap: G.curMap,
    kills: G.kills,
    consumables: G.consumables,
    autoAtk: G.autoAtk, autoSkill: G.autoSkill, autoEquip: G.autoEquip,
    autoDecompose: G.autoDecompose, decomposeThreshold: G.decomposeThreshold, decomposeNonClass: G.decomposeNonClass,
    autoHpSmall: G.autoHpSmall, autoHpLarge: G.autoHpLarge,
    learnedSkills: G.learnedSkills,
    killAnyCount: G.killAnyCount,
    enhanceTotal: G.enhanceTotal,
    _consumableUseHistory: G._consumableUseHistory,
    quests: G.quests,
    questRefreshTime: G.questRefreshTime,
    skillBooks: G.skillBooks,
    materials: G.materials,
    bagExpansions: G.bagExpansions,
    slotEnhance: G.slotEnhance,
    classStatsAdv: G.classStatsAdv || {},
    classIcon: G.classIcon || null,
    classAdvId: G.classAdvId || null,
    logs: G.logs.slice(0, 8),
  };
  const buffs = {};
  for(const [id, b] of Object.entries(G.buffs || {})){
    buffs[id] = {...b, until: Math.max(0, b.until - now_)};
  }
  saveData._buffs = buffs;
  return saveData;
}

function exportSave(){

  saveData._exportLevel = saveData.level;
  saveData._exportClassName = saveData.className;
  const jsonStr = JSON.stringify(saveData, null, 2);
  const blob = new Blob([jsonStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  const ts = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+'_'+d.getHours().toString().padStart(2,'0')+d.getMinutes().toString().padStart(2,'0');
  a.download = 'legend_idle_save_Lv'+saveData.level+'_'+ts+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);

}

    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=JSON.parse(e.target.result);
        if(!data.version||!data.level){
          addLog('⚠️ 无效的存档文件','sys');
          return;
        }
        // 显示导入确认

        addLog('⚠️ 存档文件解析失败：'+err.message,'sys');

    };
    reader.readAsText(file);
  });

}

    </div>

      <button class="btn btn-red" id="btn-reset-confirm">🗑️ 确认重置</button>
      <button class="btn btn-sm" id="btn-reset-cancel">取消</button>
    </div>`;
  document.getElementById('btn-export-before-reset').addEventListener('click',function(){closeModal();exportSave();});
  document.getElementById('btn-reset-confirm').addEventListener('click',function(){
    // 清除所有存储
    localStorage.removeItem('legend_idle_save');
    if(_useOPFS && _opfsRoot){
      writeOPFS(SAVE_FILENAME, '').catch(()=>{});
      writeOPFS(SAVE_BACKUP_FILENAME, '').catch(()=>{});
    }
    location.reload();
  });
  document.getElementById('btn-reset-cancel').addEventListener('click',closeModal);
}

// ═══ 分解系统事件 ═══
// 对背包中已有装备执行自动分解扫描
function autoDecomposeExisting(){
  if(!G.autoDecompose)return;
  let decomposed=0,totalGold=0;
  for(let i=G.inventory.length-1;i>=0;i--){
    const it=G.inventory[i];
    const matchQuality=it.quality<=G.decomposeThreshold;
    const matchNonClass=G.decomposeNonClass&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    const shouldDecompose=matchQuality||matchNonClass;
    if(shouldDecompose){
      totalGold+=decomposeItem(it);
      G.inventory.splice(i,1);
      decomposed++;
    }
  }
  if(decomposed>0){
    G.gold+=totalGold;
    addLog(`⚡ 自动分解 ${decomposed} 件装备，获得 💰${fmt(totalGold)} 金币`,'sys');
  }
}

});
