function exportSave(){
  const now_ = now();
  const saveData = buildSaveData(now_);
  saveData._exportTime = Date.now();
  saveData._exportLevel = saveData.level;
  saveData._exportClassName = saveData.className;
  const jsonStr = JSON.stringify(saveData, null, 2);
  const blob = new Blob([jsonStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  const ts = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+'_'+d.getHours().toString().padStart(2,'0')+d.getMinutes().toString().padStart(2,'0');
  a.download = 'legend_idle_save_Lv'+saveData.level+'_'+ts+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  addLog('📥 存档已导出到下载文件夹！','sys');
}

function importSave(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.addEventListener('change',function(){
    const file=this.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=JSON.parse(e.target.result);
        if(!data.version||!data.level){
          addLog('⚠️ 无效的存档文件','sys');
          return;
        }
        // 显示导入确认
        showImportConfirmModal(data);
      }catch(err){
        addLog('⚠️ 存档文件解析失败：'+err.message,'sys');
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

function showImportConfirmModal(data){
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');
  ov.classList.add('show');
  const clsNames={warrior:'战士',archer:'射手',mage:'法师'};
  const saveTime=data._exportTime?new Date(data._exportTime).toLocaleString():new Date(data.timestamp).toLocaleString();
  const saveLv=data._exportLevel||data.level;
  const saveClass=data._exportClassName||data.className||clsNames[data.classId]||'未知';
  box.innerHTML=`
    <h3>📥 导入存档确认</h3>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="font-size:13px;margin-bottom:4px"><b>等级：</b>Lv.${saveLv}</div>
      <div style="font-size:13px;margin-bottom:4px"><b>职业：</b>${saveClass}</div>
      <div style="font-size:13px;margin-bottom:4px"><b>金币：</b>${fmt(data.gold||0)} | <b>钻石：</b>${fmt(data.diamond||0)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">保存时间：${saveTime}</div>
    </div>
    <p style="font-size:12px;color:var(--red);margin-bottom:8px">⚠️ 导入将覆盖当前游戏进度！</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-green" id="btn-import-confirm">✅ 确认导入</button>
      <button class="btn btn-red" id="btn-import-cancel">❌ 取消</button>
    </div>`;
  document.getElementById('btn-import-confirm').addEventListener('click',function(){
    // 同时写入localStorage和OPFS文件
    const jsonStr = JSON.stringify(data);
    localStorage.setItem('legend_idle_save', jsonStr);
    if(_useOPFS && _opfsRoot){
      writeOPFS(SAVE_FILENAME, jsonStr).then(()=>{
        addLog('📥 存档已导入到本地文件，即将刷新...','sys');
        setTimeout(()=>location.reload(),500);
      }).catch(()=>{
        addLog('📥 存档已导入，即将刷新...','sys');
        setTimeout(()=>location.reload(),500);
      });
    } else {
      addLog('📥 存档已导入，即将刷新...','sys');
      setTimeout(()=>location.reload(),500);
    }
  });
  document.getElementById('btn-import-cancel').addEventListener('click',closeModal);
}

function showResetConfirmModal(){
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');
  ov.classList.add('show');
  box.innerHTML=`
    <h3>🗑️ 重置确认</h3>
    <p style="font-size:13px;color:var(--red);margin-bottom:8px">⚠️ 此操作将删除所有游戏数据且不可恢复！</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">建议先导出存档备份。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <button class="btn btn-green" id="btn-export-before-reset">📥 先导出存档</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-red" id="btn-reset-confirm">🗑️ 确认重置</button>
      <button class="btn btn-sm" id="btn-reset-cancel">取消</button>
    </div>`;
  document.getElementById('btn-export-before-reset').addEventListener('click',function(){closeModal();exportSave();});
  document.getElementById('btn-reset-confirm').addEventListener('click',function(){
    // 清除所有存储
    localStorage.removeItem('legend_idle_save');
    if(_useOPFS && _opfsRoot){
      writeOPFS(SAVE_FILENAME, '').catch(()=>{});
      writeOPFS(SAVE_BACKUP_FILENAME, '').catch(()=>{});
    }
    location.reload();
  });
  document.getElementById('btn-reset-cancel').addEventListener('click',closeModal);
}
