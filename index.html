<!-- 添加引导提示 -->
<style>
#install-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: #fff;
  padding: 12px 16px;
  z-index: 300;
  font-size: 14px;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(124,58,237,.4);
  animation: slideDown .3s ease;
}
#install-banner.show { display: flex; }
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
#install-banner .ib-text { flex: 1; font-size: 13px; }
#install-banner .ib-title { font-weight: bold; font-size: 15px; }
#install-banner button {
  background: rgba(255,255,255,.25);
  border: 1px solid rgba(255,255,255,.4);
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
}
#install-banner button:active { background: rgba(255,255,255,.4); }
#install-banner .ib-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.7);
  font-size: 20px;
  padding: 4px;
  cursor: pointer;
  line-height: 1;
}
</style>
<title>⚔️ 传奇放置 — 手机版</title>
<style>
/* ═══════════════════════════════════════════
   传奇放置 — 手机适配版 CSS
   ═══════════════════════════════════════════ */
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --card:#f8f9fc;
  --card2:#eef0f8;
  --border:#e0e4ec;
  --text:#1a1a2e;
  --muted:#8892b0;
  --gold:#f0a500;
  --red:#ef4444;
  --green:#10b981;
  --blue:#3b82f6;
  --purple:#a78bfa;
  --orange:#f97316;
  --pink:#ec4899;
  --teal:#14b8a6;
  --elite:#e65100;
  --boss:#dc2626;
  --r:10px;
  --nav-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  min-height:100vh;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* 滚动条 */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═══ 顶部状态栏 ═══ */
#topbar{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:8px 10px;
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:6px;
}

#topbar .top-row1{
  display:flex;
  align-items:center;
  gap:8px;
}

#topbar .char-icon{font-size:28px;min-width:36px;text-align:center}

#topbar .char-info{flex:1;min-width:0}
#topbar .char-info .name{font-size:15px;font-weight:bold;line-height:1.3}
#topbar .char-info .sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}

.top-stats-row{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}

.top-stat{
  flex:1;
  min-width:40px;
  text-align:center;
  background:var(--card);
  border-radius:6px;
  padding:4px 2px;
}
.top-stat .val{font-size:13px;font-weight:bold;line-height:1.2}
.top-stat .lbl{font-size:9px;color:var(--muted)}
.top-stat .gold-val{color:var(--gold)}
.top-stat .diamond-val{color:var(--pink)}

#xp-bar-wrap{width:100%}
#xp-bar-wrap .lbl-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px}
#xp-bar-outer{height:6px;background:#2a3560;border-radius:3px;overflow:hidden}
#xp-bar-inner{height:100%;background:linear-gradient(90deg,#3b82f6,#a78bfa);border-radius:3px;transition:width .3s;width:0%}

#death-indicator{color:var(--red);font-size:10px;display:none}

/* ═══ 主内容区 ═══ */
#main{
  padding:0;
  min-height:0;
}

.tab-page{display:none}
.tab-page.active{display:block}

.panel{
  background:var(--panel);
  margin:6px 8px;
  border-radius:var(--r);
  overflow:hidden;
  border:1px solid var(--border);
}

.panel-hd{
  font-size:13px;
  font-weight:bold;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  gap:6px;
}
.panel-hd .ph-icon{font-size:16px}

.panel-bd{padding:8px 10px;overflow-y:auto}

/* 属性面板折叠 */
.stat-collapse{margin:4px 8px 80px}
.stat-collapse .toggle-stat-panel{cursor:pointer;display:flex;justify-content:space-between}
.stat-collapse .toggle-arrow{font-size:12px;transition:transform .2s;color:var(--muted)}
.stat-collapse.collapsed .stat-panel-bd{display:none}
.stat-collapse.collapsed .toggle-arrow{transform:rotate(-90deg)}
.sub-hd{margin:0 -10px;border-radius:0;font-size:12px}

/* ═══ 装备网格 ═══ */
.eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px 0}
.eq-slot{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px;
  cursor:pointer;
  min-height:52px;
  position:relative;
  font-size:12px;
  transition:all .15s;
}
.eq-slot:active{border-color:var(--purple);background:var(--card2);transform:scale(.97)}
.eq-slot .eq-label{font-size:10px;color:var(--muted)}
.eq-slot .eq-name{font-weight:bold;font-size:12px;line-height:1.3}
.eq-slot .eq-sub{font-size:9px;color:var(--muted)}
.eq-slot.empty .eq-name{color:var(--muted);font-weight:normal}
.eq-unequip{
  position:absolute;top:4px;right:4px;
  background:rgba(239,68,68,.2);border:1px solid var(--red);color:var(--red);
  border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;
}
.eq-enhance-badge{
  position:absolute;top:3px;right:3px;
  background:linear-gradient(135deg,#ea580c,#f97316);
  color:#fff;font-size:9px;font-weight:bold;
  padding:1px 5px;border-radius:3px;z-index:3;
}

/* ═══ 战斗区 ═══ */
#enemy-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px;
  margin-bottom:8px;
}
#enemy-card.elite{border-color:var(--elite);background:rgba(230,81,0,.1)}
#enemy-card.boss{border-color:var(--boss);background:rgba(220,38,38,.1)}

#enemy-name{font-size:16px;font-weight:bold;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.enemy-type-tag{
  font-size:11px;padding:2px 8px;border-radius:12px;color:#fff;font-weight:bold;
}
.enemy-type-tag.elite{background:var(--elite)}
.enemy-type-tag.boss{background:var(--boss)}

.enemy-hp-outer{height:12px;background:rgba(239,68,68,.2);border-radius:6px;overflow:hidden;margin-bottom:6px}
.enemy-hp-inner{height:100%;background:linear-gradient(90deg,#dc2626,#ea580c);border-radius:6px;transition:width .3s;width:100%}

.enemy-info{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}

/* 操作按钮 */
.act-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.act-btns-sm{gap:4px}

/* 自动战斗设置条 */
.auto-battle-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:6px 10px;margin-bottom:8px;
  background:var(--card);border-radius:8px;
  border:1px solid var(--border);
  align-items:center;
}
.auto-label{
  font-size:12px;display:flex;align-items:center;gap:3px;
  padding:3px 6px;cursor:pointer;white-space:nowrap;
  color:var(--text);background:rgba(124,58,237,.08);
  border-radius:6px;border:1px solid rgba(124,58,237,.15);
}
.auto-label input[type="checkbox"]{accent-color:var(--purple);width:14px;height:14px;margin-right:2px}
.auto-label:has(input:checked){background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:var(--text);font-weight:500}

/* 存档按钮条 */
.save-btns-bar{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
  padding:4px 8px;margin-bottom:8px;
  background:var(--card);border-radius:8px;
  border:1px solid var(--border);
}
.save-btns-bar .btn{min-height:32px;padding:5px 10px;font-size:12px}
#save-indicator{font-size:11px;color:var(--muted);margin-right:4px;white-space:nowrap}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:6px 10px;border-radius:8px;border:1px solid transparent;
  cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s;
  white-space:nowrap;min-height:32px;font-weight:500;
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;pointer-events:none}

.btn-lg{padding:8px 14px;font-size:13px;min-height:36px}

.btn-red{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.btn-red:active{background:rgba(239,68,68,.3)}
.btn-blue{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.btn-blue:active{background:rgba(59,130,246,.3)}
.btn-blue2{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.btn-purple{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
.btn-purple:active{background:rgba(167,139,250,.3)}
.btn-green{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.btn-green:active{background:rgba(16,185,129,.3)}
.btn-gold{background:rgba(240,165,0,.15);border-color:var(--gold);color:var(--gold)}
.btn-gold:active{background:rgba(240,165,0,.3)}
.btn-pink{background:rgba(236,72,153,.15);border-color:var(--pink);color:var(--pink)}
.btn-pink:active{background:rgba(236,72,153,.3)}
.btn-orange{background:rgba(249,115,22,.15);border-color:var(--orange);color:var(--orange)}
.btn-red2{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}

.btn-sm{padding:6px 10px;font-size:12px;min-height:34px}
.btn-xs{padding:3px 7px;font-size:10px;min-height:28px}

.btn-decompose{background:linear-gradient(135deg,#f97316,#ef4444)!important;color:#fff!important;border:none!important}
.btn-decompose:active{filter:brightness(1.15)}

/* 战斗日志 */
#combat-log{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  max-height:180px;
  overflow-y:auto;
  font-size:12px;
}
#combat-log p{line-height:1.5;border-bottom:1px solid var(--border);padding:2px 0}
#combat-log .hit{color:var(--red)}
#combat-log .crit{color:var(--orange);font-weight:bold}
#combat-log .drop{color:var(--gold)}
#combat-log .sys{color:var(--purple)}
#combat-log .skill{color:var(--blue)}
#combat-log .die{color:var(--red);font-weight:bold}
#combat-log .heal{color:var(--green)}
#combat-log .quest{color:var(--pink)}

/* ═══ 底部Tab导航 ═══ */
#bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--panel);
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  padding-bottom:var(--safe-bottom);
  height:var(--nav-h);
}

.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:none;
  border:none;
  color:var(--muted);
  font-size:10px;
  cursor:pointer;
  transition:all .15s;
  font-family:inherit;
  padding:4px 0;
  min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn .nav-label{font-size:10px}
.nav-btn.active{color:var(--purple)}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn:active{background:rgba(167,139,250,.1)}

/* ═══ 存档管理浮动按钮 (FAB) ═══ */
#save-fab{
  position:fixed;
  bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);
  right:12px;
  z-index:190;
}
#fab-save-btn{
  width:48px;height:48px;
  border-radius:50%;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);
  color:#fff;
  border:none;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(124,58,237,.4);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#fab-save-btn:active{transform:scale(.9)}

#fab-menu{
  display:none;
  position:absolute;
  bottom:56px;
  right:0;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:6px;
  min-width:140px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  flex-direction:column;
  gap:2px;
}
#fab-menu.show{display:flex}

.fab-item{
  display:flex;align-items:center;gap:6px;
  padding:10px 14px;
  border:none;background:none;
  color:var(--text);font-size:13px;
  cursor:pointer;border-radius:8px;
  font-family:inherit;text-align:left;
  transition:all .12s;white-space:nowrap;
}
.fab-item:active{background:var(--card2)}
.fab-item.fab-danger{color:var(--red)}
.fab-item.fab-danger:active{background:rgba(239,68,68,.1)}

/* ═══ 背包 ═══ */
.full-panel{margin:4px 4px 80px;min-height:calc(100vh - 280px)}

#bag-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;margin-bottom:8px;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
#bag-header .bag-info{font-size:12px;color:var(--muted);font-weight:bold}
#bag-header .bag-acts{display:flex;gap:4px;align-items:center}

#decompose-panel{
  display:none;flex-wrap:wrap;align-items:center;gap:4px;
  padding:8px;margin-bottom:6px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  font-size:12px;
}
#decompose-panel select{
  padding:4px 6px;border:1px solid var(--border);border-radius:4px;
  font-size:12px;background:var(--panel);color:var(--text);
}
#decompose-panel label{
  cursor:pointer;display:flex;align-items:center;gap:3px;
  font-size:11px;color:var(--muted);
}
#decompose-panel label input{margin:0}

.tabs{display:flex;gap:2px;padding:4px 0;flex-wrap:wrap}
.tab-btn{
  padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;
  font-size:12px;color:var(--muted);border:1px solid transparent;
  border-bottom:none;background:transparent;transition:all .12s;
  min-height:36px;font-family:inherit;
}
.tab-btn.active{background:var(--panel);border-color:var(--border);color:var(--purple);font-weight:bold}
.tab-btn:active{background:var(--card2)}

.bag-count-badge{font-size:9px;color:var(--purple);margin-left:2px}
.bag-tab-content{display:none;padding:6px 0}
.bag-tab-content.active{display:flex;flex-direction:column}
#bag-collapsible{overflow-y:auto}

/* 物品网格 */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.inv-cell{
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;aspect-ratio:1;cursor:pointer;
  font-size:10px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.3;position:relative;transition:all .12s;
}
.inv-cell:active{transform:scale(.95);border-color:var(--purple)}
.inv-cell.empty{opacity:.3;pointer-events:none}
.inv-cell .inv-q{font-size:7px;padding:0 3px;border-radius:2px;margin-top:1px}
.inv-cell-dim{opacity:.45}

/* 技能 */
.skill-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all .12s;
}
.skill-item:active{border-color:var(--purple)}
.skill-icon{font-size:24px;min-width:36px;text-align:center}
.skill-info{flex:1}
.skill-name{font-size:14px;font-weight:bold}
.skill-desc{font-size:12px;color:var(--muted)}
.skill-cd{font-size:11px;color:var(--red)}

/* 任务 */
.quest-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
}
.quest-title{font-size:13px;font-weight:bold;display:flex;align-items:center;gap:4px}
.quest-progress{font-size:11px;color:var(--muted);margin-top:4px}
.quest-reward{font-size:11px;color:var(--gold);margin-top:4px}
.quest-done{border-color:var(--green);background:rgba(16,185,129,.1)}

/* 地图 */
.map-list{display:flex;flex-direction:column;gap:4px}
.map-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all .12s;
}
.map-item:active{border-color:var(--purple)}
.map-item.active{border-color:var(--purple);background:rgba(167,139,250,.1)}
.map-item.locked{opacity:.4;pointer-events:none}
.map-icon{font-size:22px;min-width:30px;text-align:center}
.map-info{flex:1}
.map-name{font-size:13px;font-weight:bold}
.map-desc{font-size:11px;color:var(--muted)}

.map-monsters{font-size:10px;color:var(--muted);display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.map-monsters span{background:var(--card2);padding:1px 5px;border-radius:3px}
.map-boss{color:var(--boss);font-weight:bold}
.map-elite{color:var(--elite)}
.map-normal{color:var(--muted)}

/* 商店 */
.shop-section{margin-bottom:12px}
.shop-section h4{font-size:13px;margin-bottom:6px;color:var(--text)}
.shop-item-row{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;transition:all .12s;
}
.shop-item-row:active{border-color:var(--purple)}
.shop-item-icon{font-size:24px;min-width:32px;text-align:center}
.shop-item-info{flex:1}
.shop-item-name{font-size:13px;font-weight:bold}
.shop-item-desc{font-size:11px;color:var(--muted);margin-top:2px}
.shop-item-price{font-size:11px;margin-top:2px}
.gacha-rate{font-size:11px;color:var(--muted);margin:4px 0;line-height:1.5}

/* ═══ 底部区域 ═══ */
#bottom{
  display:flex;flex-direction:column;
  margin:0 8px calc(var(--nav-h) + var(--safe-bottom) + 12px);
  gap:4px;
}
#event-log{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:8px 10px;
  max-height:120px;
  overflow-y:auto;
  font-size:11px;
}
#event-log p{padding:1px 0;border-bottom:1px solid var(--border);line-height:1.5}

<script>
// ═══ PWA安装横幅 ═══
(function(){
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('ib-install-btn');
  const closeBtn = document.getElementById('ib-close-btn');
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    if(banner) banner.classList.add('show');
  });

  if(installBtn) {
    installBtn.addEventListener('click', function() {
      if(deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if(result.outcome === 'accepted') {
            if(banner) banner.classList.remove('show');
          }
          deferredPrompt = null;
        });
      } else {
        showInstallGuide();
      }
    });
  }

  if(closeBtn) {
    closeBtn.addEventListener('click', function() {
      if(banner) banner.classList.remove('show');
    });
  }

  if(window.matchMedia('(display-mode: standalone)').matches) {
    if(banner) banner.classList.remove('show');
  }

  function showInstallGuide() {
    const ov = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-box');
    if(!ov || !box) return;
    ov.classList.add('show');
    box.innerHTML = '<h3>添加到桌面</h3><div style="font-size:13px;line-height:1.8;margin-bottom:12px"><p style="margin-bottom:8px">不同设备添加方法：</p><p><b>iPhone/iPad：</b>Safari 浏览器中点击底部 分享按钮 → 选择「添加到主屏幕」</p><p style="margin-top:6px"><b>Android Chrome：</b>点击右上角 ⋮ 菜单 → 选择「添加到主屏幕」</p><p style="margin-top:6px"><b>电脑 Chrome/Edge：</b>地址栏右侧 ⊕ 图标 → 点击安装</p></div><button class="btn btn-purple" style="width:100%" id="ib-guide-close">知道了</button>';
    document.getElementById('ib-guide-close').addEventListener('click', function() {
      ov.classList.remove('show');
    });
  }

  window.addEventListener('appinstalled', function() {
    if(banner) banner.classList.remove('show');
  });
})();

// ═══ 底部导航切换 ═══
(function(){
  const navBtns = document.querySelectorAll('#bottom-nav .nav-btn');
  const tabPages = document.querySelectorAll('.tab-page');
  const bottomEl = document.getElementById('bottom');
  
  function switchTab(pageName) {
    navBtns.forEach(b => b.classList.remove('active'));
    const activeBtn = document.querySelector('#bottom-nav .nav-btn[data-page="' + pageName + '"]');
    if(activeBtn) activeBtn.classList.add('active');
    tabPages.forEach(p => p.classList.remove('active'));
    const target = document.getElementById('tab-page-' + pageName);
    if(target) target.classList.add('active');
    if(pageName === 'battle') { if(bottomEl) bottomEl.style.display = ''; }
    else { if(bottomEl) bottomEl.style.display = 'none'; }
    if(pageName === 'shop' && typeof renderShop === 'function') renderShop();
    if(pageName === 'bag' && typeof renderBag === 'function') renderBag();
    if(pageName === 'quests' && typeof renderQuests === 'function') renderQuests();
    if(pageName === 'skills' && typeof renderSkills === 'function') renderSkills();
  }
  
  navBtns.forEach(btn => {
    btn.addEventListener('click', function() { switchTab(this.dataset.page); });
  });
  
  // 属性面板折叠
  const statPanel = document.querySelector('.stat-collapse');
  const toggleBtn = document.querySelector('.toggle-stat-panel');
  if(statPanel && toggleBtn && window.innerWidth <= 768) {
    toggleBtn.addEventListener('click', function() { statPanel.classList.toggle('collapsed'); });
  }
  
  // FAB存档按钮
  const fabBtn = document.getElementById('fab-save-btn');
  const fabMenu = document.getElementById('fab-menu');
  if(fabBtn && fabMenu) {
    fabBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      fabMenu.classList.toggle('show');
    });
    document.addEventListener('click', function(e) {
      if(!fabBtn.contains(e.target) && !fabMenu.contains(e.target)) {
        fabMenu.classList.remove('show');
      }
    });
  }
})();
</script>

function genQuestReward(G,base){
  const rew={...base};
  // ~55%概率随机给1~4颗钻石（独立于其他奖励）
  if(Math.random()<0.55){rew.diamond=randi(1,4);}
  const r=Math.random();
  // 30%概率给装备
  if(r<0.30){rew.equipQ=Math.min(randi(0,Math.floor(G.level/20)),7);}
  // 30%概率给药水
  else if(r<0.60){const potions=['hpPotion','atkScroll','defScroll','hpScroll'];rew.potion=pick(potions);rew.potionCount=randi(1,2);}
  // 25%概率给材料
  else if(r<0.85){const mids=Object.keys(MATERIALS);rew.material=pick(mids);rew.materialCount=randi(2,6);}
  // 其余只给基础奖励
  return rew;
}

function gachaProb(){
  const lv=G.level;
  if(lv<=25)return[{q:0,pct:40},{q:1,pct:30},{q:2,pct:20},{q:3,pct:8},{q:4,pct:2}];
  if(lv<=75)return[{q:0,pct:20},{q:1,pct:30},{q:2,pct:25},{q:3,pct:18},{q:4,pct:6},{q:5,pct:1}];
  if(lv<=150)return[{q:1,pct:20},{q:2,pct:28},{q:3,pct:25},{q:4,pct:18},{q:5,pct:7},{q:6,pct:2}];
  if(lv<=250)return[{q:2,pct:22},{q:3,pct:28},{q:4,pct:25},{q:5,pct:15},{q:6,pct:8},{q:7,pct:2}];
  return[{q:3,pct:20},{q:4,pct:28},{q:5,pct:25},{q:6,pct:18},{q:7,pct:7},{q:8,pct:2}];
}
function rollGachaQuality(){const probs=gachaProb();const r=randi(1,100);let cum=0;for(const p of probs){cum+=p.pct;if(r<=cum)return p.q;}return probs[probs.length-1].q;}

function rollWeightedQ(minQ,maxQ){
  // 从可用品质范围中按权重随机，高品质概率极低
  const pool=[];const totalW=100;
  for(let q=minQ;q<=maxQ;q++){pool.push({q,w:Q_WEIGHT[q]||1});}
  const sumW=pool.reduce((s,p)=>s+p.w,0);
  let r=randi(1,sumW),cum=0;
  for(const p of pool){cum+=p.w;if(r<=cum)return p.q;}
  return pool[pool.length-1].q;
}

function classBaseStats(){
  if(G.classId==='warrior')return{str:10,vit:8,agi:4,dex:3,int:1};
  if(G.classId==='archer')return{str:5,vit:6,agi:10,dex:6,int:1};
  return{str:2,vit:5,agi:5,dex:4,int:12};
}

function computeStats(){
  const cb=classBaseStats();
  let ST=cb.str+G.str, VT=cb.vit+G.vit, AG=cb.agi+G.agi, DX=cb.dex+G.dex, IN=cb.int+G.int;
  // Str→ATK, Vit→HP(法师/射手额外加成), Agi→ATK_SPD+Dodge, Dex→CritRate, Int→ATK(mage only)
  const vitHpMult = G.classId==='warrior'?15:G.classId==='archer'?18:20;
  let a=ST*2, d=VT*1.2, h=VT*vitHpMult, cr=DX*0.5+5, cd=150, sp=100-AG*1.5;
  if(G.classId==='mage')a+=IN*3;
  let dodge=AG*0.3, block=0, lifesteal=0, thorns=0, magicFind=0, expBonus=0, goldBonus=0, hpRegen=0, doubleAtk=0, armorPierce=0, siphon=0;

  // equipment stats
  for(const k in G.equipped){
    const it=G.equipped[k];if(!it)continue;
    if(it.stats.atk)a+=it.stats.atk;if(it.stats.def)d+=it.stats.def;
    if(it.stats.hp)h+=it.stats.hp;if(it.stats.critRate)cr+=it.stats.critRate;
    if(it.stats.critDmg)cd+=it.stats.critDmg;if(it.stats.atkSpd)sp=Math.max(30,sp-it.stats.atkSpd);
    if(it.stats.lifesteal)lifesteal+=it.stats.lifesteal;
    if(it.stats.thorns)thorns+=it.stats.thorns;
    if(it.stats.magicFind)magicFind+=it.stats.magicFind;
    if(it.stats.expBonus)expBonus+=it.stats.expBonus;
    if(it.stats.goldBonus)goldBonus+=it.stats.goldBonus;
    if(it.stats.block)block+=it.stats.block;
    if(it.stats.dodge)dodge+=it.stats.dodge;
    if(it.stats.hpRegen)hpRegen+=it.stats.hpRegen;
    if(it.stats.doubleAtk)doubleAtk+=it.stats.doubleAtk;
    if(it.stats.armorPierce)armorPierce+=it.stats.armorPierce;
    if(it.stats.siphon)siphon+=it.stats.siphon;
  }
  // enhancement bonuses (per-slot)
  for(const slot in G.equipped){
    const it=G.equipped[slot];const elv=G.slotEnhance[slot]||0;
    if(!it||elv<=0)continue;
    const eb=ENHANCE_BONUS[slot];if(!eb)continue;
    if(eb.atk)a+=Math.floor(eb.atk*elv);
    if(eb.def)d+=Math.floor(eb.def*elv);
    if(eb.hp)h+=Math.floor(eb.hp*elv);
    if(eb.critRate)cr+=Math.round(eb.critRate*elv*10)/10;
    if(eb.critDmg)cd+=Math.floor(eb.critDmg*elv);
    if(eb.atkSpd)sp=Math.max(20,sp-eb.atkSpd*elv);
    if(eb.block)block+=Math.round(eb.block*elv*10)/10;
    if(eb.dodge)dodge+=Math.round(eb.dodge*elv*10)/10;
  }
  // set bonuses
  const setCounts={};
  for(const k in G.equipped){const it=G.equipped[k];if(it&&it.setId)setCounts[it.setId]=(setCounts[it.setId]||0)+1;}
  G._activeSetBonuses=[]; // 重置套装显示
  for(const s of SETS){
    const cnt=setCounts[s.id]||0;
    for(let need=7;need>=3;need--){
      if(cnt>=need&&s.bonus[need]){
        const bo=s.bonus[need];
        if(bo.atk)a+=bo.atk;if(bo.def)d+=bo.def;if(bo.hp)h+=bo.hp;
        if(bo.critRate)cr+=bo.critRate;if(bo.critDmg)cd+=bo.critDmg;if(bo.atkSpd)sp=Math.max(20,sp-bo.atkSpd);
        G._activeSetBonuses.push({setName:s.name,setId:s.id,pieceCount:cnt,bonusLevel:need,bonus:{...bo}});
        break;
      }
    }
  }
  // class advancement bonuses
  if(G.classStatsAdv){const ba=G.classStatsAdv;if(ba.atk)a+=ba.atk;if(ba.def)d+=ba.def;if(ba.hp)h+=ba.hp;if(ba.critRate)cr+=ba.critRate;}

  G.maxHp=h;G.curAtk=Math.max(1,a);G.curDef=d;G.curCritRate=Math.min(cr,80);G.curCritDmg=cd;G.curAtkSpd=Math.max(20,sp);
  G.curDodge=Math.min(dodge,50);G.curBlock=Math.min(block,40);G.curLifesteal=Math.min(lifesteal,50);
  G.curThorns=Math.min(thorns,50);G.curMagicFind=Math.min(magicFind,80);G.curExpBonus=Math.min(expBonus,200);
  G.curGoldBonus=Math.min(goldBonus,200);G.curHpRegen=hpRegen;G.curDoubleAtk=Math.min(doubleAtk,40);
  G.curArmorPierce=Math.min(armorPierce,50);G.curSiphon=Math.min(siphon,30);
  // store raw stats for display
  G.rawST=ST;G.rawVT=VT;G.rawAG=AG;G.rawDX=DX;G.rawIN=IN;

  const n=now();
  for(const id in G.buffs){if(G.buffs[id].until<n){delete G.buffs[id];continue;}if(id==='atk')G.curAtk+=G.buffs[id].val;else if(id==='def')G.curDef+=G.buffs[id].val;else if(id==='maxhp_cd')G.maxHp+=G.buffs[id].val;}
  if(G.hp>G.maxHp)G.hp=G.maxHp;
}

function xpForLevel(lv){return Math.floor(100*Math.pow(lv,2.2)+50*lv);}

function getEnhancePower(slot){
  const elv=G.slotEnhance[slot]||0;if(elv<=0)return 0;
  const eb=ENHANCE_BONUS[slot];if(!eb)return 0;
  let p=0;
  if(eb.atk)p+=eb.atk*elv*3;if(eb.def)p+=eb.def*elv*2;if(eb.hp)p+=eb.hp*elv*0.5;
  if(eb.critRate)p+=eb.critRate*elv*5;if(eb.critDmg)p+=eb.critDmg*elv*0.5;
  if(eb.atkSpd)p+=eb.atkSpd*elv*0.3;if(eb.block)p+=eb.block*elv*4;if(eb.dodge)p+=eb.dodge*elv*4;
  return Math.floor(p);
}

function itemPower(it){
  let p=0;const s=it.stats;
  if(s.atk)p+=s.atk*3;if(s.def)p+=s.def*2;if(s.hp)p+=s.hp*0.5;
  if(s.critRate)p+=s.critRate*5;if(s.critDmg)p+=(s.critDmg-150)*0.5;if(s.atkSpd)p+=s.atkSpd*0.3;
  for(const sa of SPECIAL_ATTRS){if(s[sa.id])p+=s[sa.id]*4;}
  return Math.floor(p);
}

function genEquip(slot,minQ,maxQ,monsterLv){
  const q=rollWeightedQ(minQ,maxQ);
  const setInfo=Math.random()<0.12?pick(SETS):null;
  // 职业限制：20%通用，80%随机分给三职业
  let classReq;const cr=Math.random();
  if(cr<0.2)classReq='all';
  else if(cr<0.47)classReq='warrior';
  else if(cr<0.73)classReq='archer';
  else classReq='mage';
  const baseName=eqNamePick(slot,classReq);
  const s={};
  const m=QMULT[q];
  if(slot==='mainHand'){s.atk=randi(2,6)*m;s.critRate=randf(0,1)*m;}
  else if(slot==='offHand'){s.def=randi(1,4)*m;s.block=randi(1,3)*m;}
  else if(slot==='armor'){s.def=randi(2,5)*m;s.hp=randi(5,20)*m;}
  else if(slot==='helmet'){s.hp=randi(5,15)*m;s.def=randi(1,3)*m;}
  else if(slot==='bracer'){s.atk=randi(1,4)*m;s.critRate=randf(0,2)*m;}
  else if(slot==='pants'){s.def=randi(2,4)*m;s.hp=randi(5,15)*m;}
  else if(slot==='boots'){s.atkSpd=randi(2,8)*m;s.dodge=randf(0.5,2)*m;}
  else if(slot==='necklace'){s.critDmg=randi(5,20)*m;s.atk=randi(1,3)*m;}
  else if(slot==='ring1'||slot==='ring2'){s.atk=randi(1,4)*m;s.critRate=randf(0.5,2)*m;}
  else if(slot==='pendant'){s.atk=randi(1,5)*m;s.hp=randi(5,20)*m;s.def=randi(1,3)*m;}
  // round all basic stats
  for(const k in s){if(typeof s[k]==='number')s[k]=Math.round(s[k]*10)/10;}
  s.atk=Math.floor(s.atk||0);s.def=Math.floor(s.def||0);s.hp=Math.floor(s.hp||0);
  s.critRate=Math.round((s.critRate||0)*10)/10;s.critDmg=Math.floor(s.critDmg||0);s.atkSpd=Math.floor(s.atkSpd||0);
  s.block=Math.floor(s.block||0);s.dodge=Math.round((s.dodge||0)*10)/10;

  // special attributes: bronze(q=1)+ gets q special attr slots
  const specials=[];
  if(q>=1){
    const numSpecials=q; // 青铜1个，白银2个，黄金3个...
    const pool=SPECIAL_ATTRS.filter(sa=>!s[sa.id]); // filter out already-on stats
    const chosen=[];
    const shuffled=[...pool].sort(()=>Math.random()-0.5);
    for(let i=0;i<Math.min(numSpecials,shuffled.length);i++){
      const sa=shuffled[i];
      const val=randi(sa.min/sa.step,sa.max/sa.step)*sa.step;
      s[sa.id]=val;chosen.push({...sa,val,text:sa.fmt(val)});
    }
    specials.push(...chosen);
  }
  const name=(setInfo?`[${setInfo.name}] `:'')+Q_PREFIX[q]+baseName;
  const reqLv=monsterLv||1;
  const it={id:'eq_'+Date.now()+'_'+randi(1000,9999),slot,name,quality:q,qName:QUALITY[q],qClass:QCLASS[q],stats:s,setId:setInfo?setInfo.id:null,setName:setInfo?setInfo.name:null,classReq,specials,reqLv,power:0};
  it.power=itemPower(it);return it;
}

// Monster generation — random from map pool, with elite/boss chance
function genMonster(){
  const m=MAPS.find(x=>x.id===G.curMap)||MAPS[0];
  // Roll for monster type: 80% normal, 15% elite, 5% boss
  const roll=Math.random();
  let template,type='normal';
  if(roll<0.05&&m.boss){template=m.boss;type='boss';}
  else if(roll<0.20&&m.elite){template=m.elite;type='elite';}
  else{template=pick(m.monsters);}
  // Monster level: character level ±3, lower bound min 1, upper bound map max level
  const maxLv = m.maxLv || m.lv + 10;
  const minLv = Math.max(1, G.level - 3);
  const upperLv = Math.min(maxLv, G.level + 3);
  const monLv = randi(minLv, upperLv);
  // Scale by monster type, NO killStreak scaling
  const typeMult=type==='boss'?5:type==='elite'?2.5:1;
  const mName=type==='boss'?template.name:(type==='elite'?'精英·'+template.name:template.name);
  const mIcon=template.icon;
  const hp=Math.floor(template.hp*typeMult);
  const atk=Math.floor(template.atk*typeMult);
  const def=Math.floor(template.def*typeMult);
  const xp=Math.floor(template.xp*typeMult);const gold=Math.floor(template.gold*typeMult);
  const dropQ=[template.dropQ[0],Math.min(8,template.dropQ[1]+(type==='boss'?1:0))];

  const enemy={name:mName,icon:mIcon,type,level:monLv,hp,maxHp:hp,atk,def,xp,gold,dropQ,originalName:template.name,specials:[],skill:null,skillLastUsed:0,dotDmg:0,dotUntil:0};

  // Elite/Boss get special attributes
  if(type==='elite'){
    const sp=pick(ENEMY_SPECIALS);
    enemy.specials.push({...sp});
    if(sp.apply)sp.apply(enemy);
    if(sp.isRegen)enemy._regen=sp.regenPct;
    if(sp.dodge)enemy._dodge=sp.dodge;
    if(sp.thorns)enemy._thorns=sp.thorns;
    if(sp.lifesteal)enemy._lifesteal=sp.lifesteal;
  }
  if(type==='boss'){
    const shuffled=[...ENEMY_SPECIALS].sort(()=>Math.random()-0.5);
    for(let i=0;i<2;i++){
      const sp=shuffled[i];
      enemy.specials.push({...sp});
      if(sp.apply)sp.apply(enemy);
      if(sp.isRegen)enemy._regen=(enemy._regen||0)+sp.regenPct;
      if(sp.dodge)enemy._dodge=(enemy._dodge||0)+sp.dodge;
      if(sp.thorns)enemy._thorns=(enemy._thorns||0)+sp.thorns;
      if(sp.lifesteal)enemy._lifesteal=(enemy._lifesteal||0)+sp.lifesteal;
    }
    // Boss gets one skill
    enemy.skill={...pick(ENEMY_SKILLS)};
  }
  return enemy;
}
function canUseSkill(s){return !s.lastUsed||(now()-s.lastUsed>=s.cdMs);}

function addLog(msg,cls=''){G.logs.unshift({msg,cls,time:new Date().toLocaleTimeString()});if(G.logs.length>G.maxLogs)G.logs.pop();}
function gainXp(amt){
  if(!G.enemy)return;
  // XP penalty if enemy level is lower than player level
  const eLv=G.enemy.level||1;const pLv=G.level;
  let lvMult=1;
  if(eLv<pLv){lvMult=Math.max(0.1,1-(pLv-eLv)*0.15);}
  const bonus=1+G.curExpBonus/100;
  G.xp+=Math.floor(amt*bonus*lvMult);
  while(G.xp>=xpForLevel(G.level)&&G.level<300){G.xp-=xpForLevel(G.level);levelUp();}
}
function gainGold(amt){const bonus=1+G.curGoldBonus/100;const actualAmt=Math.floor(amt*bonus);G.gold+=actualAmt;
  // 更新收集金币类型任务的累计进度
  for(const q of G.quests){if(!q.submitted&&q.type==='collect_gold')q._goldCollected=(q._goldCollected||0)+actualAmt;}
  checkQuests();}
function levelUp(){
  G.level++;
  // Auto-allocate 5 stat points based on class
  const growth=CLASS_GROWTH[G.classId];
  G.str+=growth.str;G.vit+=growth.vit;G.agi+=growth.agi;G.dex+=growth.dex;G.int+=growth.int;
  G.hp=G.maxHp;
  if(G.level===10){G.skill2=SKILLS[G.classId].find(sk=>sk.unlockLv===10);addLog(`📖 学会新技能：${G.skill2.name}`,'sys');refreshSkillBtns();}
  const adv=CLASS_ADV.find(a=>a.lv===G.level);
  if(adv){const opts=adv[G.classId];if(opts&&opts.length>0)showAdvModal(opts);}
  if(G.level===50&&!G.classTier){G.classTier=1;addLog('🌟 达到50级！已解锁一转资格','sys');}
  else if(G.level===150&&G.classTier===1){G.classTier=2;addLog('🌟 达到150级！已解锁二转资格','sys');}
  addLog(`🎉 升级！达到 Lv.${G.level}，属性自动分配`,'sys');
  computeStats();renderAll();
}
function doAdvance(opt){
  G.classStatsAdv=G.classStatsAdv||{};
  for(const k in opt.bonus){G.classStatsAdv[k]=(G.classStatsAdv[k]||0)+opt.bonus[k];}
  G.className=opt.name;G.classIcon=opt.icon;
  if(G.level>=150)G.classTier=2;else G.classTier=1;
  addLog(`🌟 转职成功！成为${opt.name}`,'sys');
  closeModal();computeStats();renderAll();
}
function playerAttack(useSkill){
  if(!G.enemy||G.dead)return;
  // enemy dodge check
  const e=G.enemy;
  if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了你的攻击！`,'sys');enemyAttack();renderAll();return;}
  const sk=useSkill?G.skills.find(s=>canUseSkill(s)):null;
  if(useSkill&&!sk){addLog('⏳ 技能冷却中...','sys');return;}
  let dmg,isCrit=false;
  if(sk){
    dmg=Math.floor(G.curAtk*sk.mult);
    if(sk.ignoreDef===1)dmg=Math.max(1,dmg); // 完全无视防御
    else if(sk.ignoreDef)dmg=Math.floor(dmg*(1-sk.ignoreDef)); // 部分无视防御
    else{
      let defReduction=0.3;
      if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)defReduction=0.1;
      dmg=Math.max(1,dmg-Math.floor(G.enemy.def*defReduction));
    }
    if(sk.hits){let td=0;for(let i=0;i<sk.hits;i++){const sub=Math.floor(G.curAtk*sk.mult);td+=Math.max(1,sub-Math.floor(G.enemy.def*0.3));}dmg=td;}
    sk.lastUsed=now();
    // 技能经验
    if(sk.gradeIdx<4){
      sk.xp=(sk.xp||0)+randi(1,3);
      const nextXp=skillXpForGrade(sk.gradeIdx+1);
      if(sk.xp>=nextXp){
        sk.xp-=nextXp;
        sk.gradeIdx++;
        sk.grade=SKILL_GRADES[sk.gradeIdx];
        addLog(`⭐ ${sk.name} 升级为 <span style="color:${SKILL_GRADE_COLOR[sk.grade]}">${sk.grade}级</span>！`,'skill');
      }
    }
    if(sk.type==='buff'){addLog(`✨ ${sk.icon} 使用 ${sk.name}！`,'skill');renderAll();return;}
    addLog(`✨ ${sk.icon} ${sk.name}！造成 ${dmg} 点伤害`,'skill');
  }else{
    isCrit=Math.random()*100<G.curCritRate;
    dmg=Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5));
    if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)dmg=Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.1));
    if(isCrit){dmg=Math.floor(dmg*G.curCritDmg/100);addLog(`💥 暴击！造成 ${dmg} 点伤害`,'crit');}
    else addLog(`⚔️ 普通攻击造成 ${dmg} 点伤害`,'hit');
    // double attack
    if(G.curDoubleAtk&&Math.random()*100<G.curDoubleAtk){
      // 连击单独检查敌人闪避
      if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了连击！`,'sys');}
      else{
        const d2=isCrit?Math.floor((Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5)))*G.curCritDmg/100):Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5));
        G.enemy.hp-=d2;addLog(`🔁 连击！追加 ${d2} 点伤害`,'skill');
        // 连击触发吸血
        if(G.curLifesteal&&d2>0){const heal2=Math.floor(d2*G.curLifesteal/100);if(heal2>0){G.hp=Math.min(G.maxHp,G.hp+heal2);}}
        // 连击触发敌人荆棘
        if(G.enemy&&G.enemy._thorns&&d2>0){const etDmg2=Math.floor(d2*G.enemy._thorns/100);G.hp-=etDmg2;if(G.hp<=0){G.hp=0;G.dead=true;G.deadUntil=now()+3000;addLog('💀 被荆棘反弹致死！','die');}}
        if(G.enemy&&G.enemy.hp<=0){onKill();return;}
      }
    }
  }
  // lifesteal
  if(G.curLifesteal&&dmg>0){const heal=Math.floor(dmg*G.curLifesteal/100);if(heal>0){G.hp=Math.min(G.maxHp,G.hp+heal);} }
  G.enemy.hp-=dmg;
  // Enemy thorns (reflect damage back to player)
  if(G.enemy&&G.enemy._thorns&&dmg>0){const etDmg=Math.floor(dmg*G.enemy._thorns/100);G.hp-=etDmg;if(G.hp>0)addLog(`🌵 ${G.enemy.name}的荆棘反弹 ${etDmg} 点伤害`,'hit');if(G.hp<=0){G.hp=0;G.dead=true;G.deadUntil=now()+3000;addLog('💀 被荆棘反弹致死！3秒后复活...','die');}}
  if(G.enemy&&G.enemy.hp<=0){onKill();return;}
  enemyAttack();renderAll();
}
// 使用指定技能攻击（skill2专用），复用playerAttack核心逻辑

function enemyAttack(){
  const e=G.enemy;if(!e)return;
  // Enemy boss skill usage
  let useEnemySkill=false,enemySkillDmg=0,enemySkillName='';
  if(e.skill&&(!e.skillLastUsed||now()-e.skillLastUsed>=e.skill.cdMs)){
    e.skillLastUsed=now();useEnemySkill=true;enemySkillName=e.skill.name;
    enemySkillDmg=Math.floor(e.atk*e.skill.mult);
    if(e.skill.ignoreDef)enemySkillDmg=Math.max(1,enemySkillDmg);
    else enemySkillDmg=Math.max(1,enemySkillDmg-Math.floor(G.curDef*0.3));
    if(e.skill.dotDmg&&e.skill.dotDur){
      G.buffs.dot={dmg:Math.floor(G.maxHp*e.skill.dotDmg),until:now()+e.skill.dotDur*1000,icon:'☠️'};
    }
    if(e.skill.slow&&e.skill.slowDur){
      G.buffs.slow={slow:e.skill.slow,until:now()+e.skill.slowDur*1000,icon:'❄️'};
    }
  }
  // player dodge/block
  if(!useEnemySkill&&G.curDodge&&Math.random()*100<G.curDodge){addLog(`🌀 闪避！躲过了${e.name}的攻击`,'sys');return;}
  if(!useEnemySkill&&G.curBlock&&Math.random()*100<G.curBlock){addLog(`🛡️ 格挡！${e.name}的攻击被格挡`,'sys');return;}
  const dmg=useEnemySkill?enemySkillDmg:Math.max(1,e.atk-Math.floor(G.curDef*0.3));
  // slow debuff
  if(useEnemySkill&&e.skill&&e.skill.slow)G._slowUntil=now()+e.skill.slowDur*1000;
  G.hp-=dmg;
  if(useEnemySkill)addLog(`${e.icon} ${e.name} 使用 ${e.skill.icon}${enemySkillName}！造成 ${dmg} 点伤害`,'boss');
  else addLog(`${e.icon} ${e.name} 对你造成 ${dmg} 点伤害`,'hit');
  // enemy lifesteal
  if(e._lifesteal&&G.enemy){const eh=Math.floor(dmg*e._lifesteal/100);e.hp=Math.min(e.maxHp,e.hp+eh);}
  // thorns
  if(G.curThorns&&G.enemy){const tDmg=Math.floor(dmg*G.curThorns/100);G.enemy.hp-=tDmg;if(G.enemy.hp<=0){addLog(`🛡️ 荆棘反弹！击杀 ${e.name}`,'die');onKill();return;}addLog(`⚡ 荆棘反弹 ${tDmg} 点伤害`,'skill');}

  if(G.hp<=0){
    G.hp=0;G.dead=true;G.deadUntil=now()+3000;
    addLog('💀 你被击败了！3秒后复活...','die');
  }
}
function onKill(){
  const e=G.enemy;addLog(`🎉 击杀 ${e.name}！获得 ${e.xp} 经验、${e.gold} 金币`,'die');
  G.killStreak++;
  G.kills[e.originalName||e.name]=(G.kills[e.originalName||e.name]||0)+1;G.killAnyCount++;
  gainXp(e.xp);gainGold(e.gold);
  if(G.curHpRegen)G.hp=Math.min(G.maxHp,G.hp+G.curHpRegen);
  if(G.curSiphon)G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*G.curSiphon/100));
  // 装备掉落 — 按怪物类型区分基础概率（已下调）
  const monLv=G.enemy.level||1;
  const typeBase=G.enemy.type==='boss'?0.35:G.enemy.type==='elite'?0.20:0.06;
  const lvBonus=Math.min(G.level/200,0.10);
  const mfBonus=G.enemy.type==='boss'?G.curMagicFind/100:(G.enemy.type==='elite'?G.curMagicFind/100:G.curMagicFind/200);
  const dropRate=Math.min(typeBase+lvBonus+mfBonus,0.65);
  if(Math.random()<dropRate){
    const slot=pick(Object.keys(EQ_NAMES));
    const it=genEquip(slot,e.dropQ[0],e.dropQ[1],monLv);
    const nonClass=G.decomposeNonClass&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    if(nonClass||(G.autoDecompose&&it.quality<=G.decomposeThreshold)){
      const goldGot=decomposeItem(it);
      G.gold+=goldGot;
      addLog(`⚡ 自动分解：${it.name} → 💰${fmt(goldGot)} 金币`,'drop');
    }else{
      if(G.inventory.length<G.maxInv){G.inventory.push(it);addLog(`🎁 掉落：${it.name}`,'drop');autoEquipCheck(it);}
      else addLog('⚠️ 背包已满，装备丢失！','sys');
    }
  }
  // 技能书掉落：10级后怪物可掉落，普通1%/精英5%/Boss10%，随机种类
  if(monLv>10){
    const bookRate = G.enemy.type==='boss'?0.10:G.enemy.type==='elite'?0.05:0.01;
    if(Math.random()<bookRate){
      // 随机所有职业的技能书
      const allClasses=['warrior','archer','mage'];
      const allBooks=[];
      for(const cls of allClasses){
        const clsSkills=SKILLS[cls];
        for(const s of clsSkills){
          if(s.skillType==='passive'){
            allBooks.push({...s,classReq:cls});
          }
        }
      }
      if(allBooks.length>0){
        const sb=pick(allBooks);
        const sbit={type:'skillBook',skillId:sb.id,name:sb.name,icon:sb.icon,desc:sb.desc,classReq:sb.classReq,reqLv:10};
        G.skillBooks.push(sbit);
        addLog(`📖 掉落技能书：【${sb.name}】已放入背包`,'drop');
      }
    }
  }
  // 材料掉落
  for(const[mid,mdef] of Object.entries(MATERIALS)){
    const typeMatch=mdef.dropSources.includes(G.enemy.type);
    if(typeMatch&&Math.random()<mdef.dropRate){
      const dropAmt=randi(1,mid==='dragonScale'?1:3);
      G.materials[mid]=(G.materials[mid]||0)+dropAmt;
      addLog(`📦 掉落材料：${mdef.icon}${mdef.name}×${dropAmt} (共${G.materials[mid]})`,'drop');
    }
  }
  G.enemy=genMonster();checkQuests();renderAll();
}
function autoEquipCheck(it){
  if(!G.autoEquip)return;
  if(it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId)return;
  if(it.reqLv&&G.level<it.reqLv)return;
  const cur=G.equipped[it.slot];if(!cur||(it.power||0)>(cur.power||0)){G.equipped[it.slot]=it;G.inventory.splice(G.inventory.indexOf(it),1);addLog(`🔄 自动装备：${it.name}`,'sys');computeStats();}
}
function changeMap(mapId){
  const m=MAPS.find(x=>x.id===mapId);if(!m||m.lv>G.level)return;
  G.curMap=mapId;G.enemy=genMonster();G.killStreak=0;addLog(`🗺️ 进入：${m.name}`,'sys');
  closeModal();
  renderAll();
}

// quests
function refreshQuests(){
  G.quests=[];for(let i=0;i<3;i++){const t=pick(QUEST_TEMPLATES);G.quests.push(t.gen(G));}
  G.questRefreshTime=now();addLog('📋 任务已刷新','sys');
}
function checkQuests(){
  // 仅更新任务进度，不自动完成
  for(const q of G.quests){
    if(q.submitted)continue;
    if(q.type==='kill'){q.progress=Math.min(Math.max(0,(G.kills[q.monster]||0)-(q._startCount||0)),q.target);}
    else if(q.type==='kill_any'){q.progress=Math.min(Math.max(0,(G.killAnyCount||0)-(q._startCount||0)),q.target);}
    else if(q.type==='collect_gold'){q.progress=Math.min(q._goldCollected||0,q.target);}
    else if(q.type==='collect_material'){q.progress=Math.min((G.materials[q.materialId]||0)-(q._startMatCount||0),q.target);}
  }
}

function submitQuest(qIndex){
  const q=G.quests[qIndex];if(!q||q.submitted||q.progress<q.target)return;
  // collect_material: 直接提交材料
  if(q.type==='collect_material'){
    if((G.materials[q.materialId]||0)>=q.target){
      G.materials[q.materialId]-=q.target;
    }else{return;}
  }
  q.submitted=true;
  // 发放奖励
  if(q.reward.gold)G.gold+=q.reward.gold;
  if(q.reward.diamond)G.diamond+=q.reward.diamond;
  if(q.reward.xp){G.xp+=q.reward.xp;while(G.xp>=xpForLevel(G.level)&&G.level<300){G.xp-=xpForLevel(G.level);levelUp();}}
  if(q.reward.equipQ!==undefined){const slot=pick(Object.keys(EQ_NAMES));const it=genEquip(slot,q.reward.equipQ,Math.min(8,q.reward.equipQ+2),G.level);if(G.inventory.length<G.maxInv)G.inventory.push(it);else addLog('⚠️ 背包已满，装备奖励丢失','sys');}
  if(q.reward.potion){const key=q.reward.potion;G.consumables[key]=(G.consumables[key]||0)+q.reward.potionCount;}
  if(q.reward.material){const mk=q.reward.material;G.materials[mk]=(G.materials[mk]||0)+q.reward.materialCount;}
  const rewardText=[];
  if(q.reward.gold)rewardText.push('💰'+fmt(q.reward.gold));
  if(q.reward.diamond)rewardText.push('💎'+q.reward.diamond);
  if(q.reward.xp)rewardText.push('✨'+fmt(q.reward.xp)+'XP');
  if(q.reward.equipQ!==undefined)rewardText.push('🎁'+QUALITY[q.reward.equipQ]+'+装备');
  if(q.reward.potion){const pn={hpPotion:'🧪小血瓶',hpLarge:'💉大血瓶',atkScroll:'📜攻击卷轴',defScroll:'🛡️防御卷轴',hpScroll:'❤️生命卷轴'};rewardText.push(pn[q.reward.potion]+'×'+q.reward.potionCount);}
  if(q.reward.material){const md=MATERIALS[q.reward.material];rewardText.push(md.icon+md.name+'×'+q.reward.materialCount);}
  addLog(`✅ 任务完成：【${q.text}】获得 ${rewardText.join(' ')}`,'quest');
  // 替换已完成任务
  replaceQuest(qIndex);
  computeStats();renderAll();
}

function replaceQuest(qIndex){
  G.quests.splice(qIndex,1);
  const t=pick(QUEST_TEMPLATES);G.quests.push(t.gen(G));
}

function decomposeItem(it){
  // 分解装备获得金币（品质越高越多）
  const baseGold={0:3,1:8,2:20,3:50,4:120,5:300,6:800,7:2000,8:5000}[it.quality]||3;
  const extra=Math.floor(it.power*1.5);
  return baseGold+extra;
}
function doDecompose(threshold,nonClassOnly){
  let decomposed=0,totalGold=0;
  for(let i=G.inventory.length-1;i>=0;i--){
    const it=G.inventory[i];
    const matchQuality=it.quality<=threshold;
    const matchNonClass=nonClassOnly&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    if(matchNonClass||matchQuality){
      totalGold+=decomposeItem(it);
      G.inventory.splice(i,1);
      decomposed++;
    }
  }
  if(decomposed>0){
    G.gold+=totalGold;
    addLog(`⚡ 一键分解 ${decomposed} 件装备，获得 💰${fmt(totalGold)} 金币`,'sys');
  }else{
    addLog('⚡ 没有符合条件的装备可分解','sys');
  }
  document.getElementById('decompose-panel').style.display='none';
  renderAll();
}
function toggleDecomposePanel(){
  const p=document.getElementById('decompose-panel');

}

function useMaterial(mid){
  const md=MATERIALS[mid];const count=G.materials[mid]||0;
  if(md.id==='ironOre'){
    showEnhanceSelectModal();
    return;
  }
  if(count<md.use.count){addLog(`⚠️ 材料不足，需要${md.use.count}个${md.name}`,'sys');return;}
  // 确认提示
  let desc='';
  if(md.use.gold)desc=`使用${md.use.count}个${md.name}兑换 ${md.use.gold}金币，确定吗？`;
  else if(md.use.diamond)desc=`使用${md.use.count}个${md.name}兑换 ${md.use.diamond}钻石，确定吗？`;
  else if(md.use.potion)desc=`使用${md.use.count}个${md.name}合成1个${md.use.potion==='hpPotion'?'小血瓶':'大血瓶'}，确定吗？`;
  else if(md.use.atkBoost)desc=`使用${md.use.count}个${md.name}随机强化已装备武器攻击力+1~3，确定吗？`;
  else if(md.use.equipMinQ!==undefined)desc=`使用${md.use.count}个${md.name}兑换随机装备，确定吗？`;
  else desc=`使用${md.use.count}个${md.name}，确定吗？`;
  confirmAction('使用材料',desc,()=>{
    G.materials[mid]-=md.use.count;
    if(md.use.gold){G.gold+=md.use.gold;addLog(`💰 使用${md.use.count}个${md.name}兑换${md.use.gold}金币`,'sys');}
    else if(md.use.diamond){G.diamond+=md.use.diamond;addLog(`💎 使用${md.use.count}个${md.name}兑换${md.use.diamond}钻石`,'sys');}
    else if(md.use.potion){G.consumables[md.use.potion]=(G.consumables[md.use.potion]||0)+1;addLog(`🧪 使用${md.use.count}个${md.name}合成1个${md.use.potion==='hpPotion'?'小血瓶':'大血瓶'}`,'sys');}
    else if(md.use.atkBoost){
      const eqSlots=Object.keys(G.equipped).filter(k=>G.equipped[k]);
      if(eqSlots.length===0){addLog('⚠️ 没有可强化的装备','sys');G.materials[mid]+=md.use.count;return;}
      const slot=pick(eqSlots);const boost=randi(1,3);
      if(!G.equipped[slot].stats.atk)G.equipped[slot].stats.atk=0;
      G.equipped[slot].stats.atk+=boost;
      G.equipped[slot].power=itemPower(G.equipped[slot]);
      addLog(`⚒️ 使用${md.use.count}个${md.name}强化${G.equipped[slot].name}，攻击力+${boost}`,'sys');
      computeStats();
    }
    else if(md.use.equipMinQ!==undefined){
      const q=rollWeightedQ(md.use.equipMinQ,8);const slot=pick(Object.keys(EQ_NAMES));
      const it=genEquip(slot,q,8,G.level);
      if(G.inventory.length<G.maxInv){G.inventory.push(it);addLog(`🎁 使用${md.use.count}个${md.name}兑换获得：${it.name}`,'drop');autoEquipCheck(it);}
      else{addLog('⚠️ 背包已满','sys');G.materials[mid]+=md.use.count;return;}
    }
    computeStats();renderAll();renderBag();
  });
}
// ═══ 材料合成装备 ═══
const CLASS_NAMES={warrior:'战士',archer:'射手',mage:'法师',all:'通用'};
function craftEquip(craftIndex){
  const recipe=MATERIAL_CRAFT[craftIndex];
  if(!recipe)return;
  for(const[mid,count] of Object.entries(recipe.costs)){
    if((G.materials[mid]||0)<count){
      addLog(`⚠️ 材料不足：需要${MATERIALS[mid].name}×${count}，当前${G.materials[mid]||0}`,'sys');
      return;
    }
  }
  if(G.inventory.length>=G.maxInv){
    addLog('⚠️ 背包已满，无法合成','sys');
    return;
  }
  // 确认提示
  const costDesc=Object.entries(recipe.costs).map(([mid,count])=>`${MATERIALS[mid].icon}${MATERIALS[mid].name}×${count}`).join('、');
  confirmAction('合成装备',`🔨 消耗 ${costDesc} 合成${recipe.name}，确定吗？`,()=>{
    for(const[mid,count] of Object.entries(recipe.costs)){
      G.materials[mid]-=count;
    }
    const q=rollWeightedQ(recipe.minQ,recipe.maxQ);
    const it=genEquip(recipe.slot,q,recipe.maxQ,G.level);
    it.reqLv=G.level;
    G.inventory.push(it);autoEquipCheck(it);
    let logMsg=`🔨 合成${recipe.name}：<span style="color:${QCOLOR[it.quality]}">${it.name}</span>`;
    logMsg+=` | ${it.qName} · Lv${it.reqLv} · ${CLASS_NAMES[it.classReq]}`;
    logMsg+=` | 战力${it.power}`;
    if(it.specials&&it.specials.length>0){logMsg+=' | '+it.specials.map(s=>s.text).join(' ');}
    addLog(logMsg,'drop');
    computeStats();renderAll();renderBag();
  });
}

function buildSkillItem(sk){
  const cdLeft=sk.lastUsed?Math.max(0,sk.cdMs-(now()-sk.lastUsed)):0;const ready=cdLeft===0;
  const grade=sk.grade||'D';const gradeIdx=sk.gradeIdx||0;
  const nextXp=skillXpForGrade(gradeIdx+1);
  const gradeColor=SKILL_GRADE_COLOR[grade]||'#9ca3af';
  const xpPct=gradeIdx<4?Math.min(100,Math.floor((sk.xp||0)/nextXp*100)):100;
  const typeTag=sk.skillType==='passive'?'<span style="font-size:8px;background:#374151;color:#9ca3af;padding:1px 3px;border-radius:3px;margin-left:4px">被动</span>':'<span style="font-size:8px;background:#1e3a5f;color:#60a5fa;padding:1px 3px;border-radius:3px;margin-left:4px">主动</span>';
  const div=document.createElement('div');div.className='skill-item';
  div.innerHTML=`<div class="skill-icon">${sk.icon}</div><div class="skill-info"><div class="skill-name">${sk.name}${typeTag} <span style="font-size:9px;color:${gradeColor};font-weight:bold">${grade}</span></div><div class="skill-desc">${sk.desc}${gradeIdx<4?` · 升级进度 ${sk.xp||0}/${nextXp} (${xpPct}%)`:''}</div></div><div class="skill-cd">${ready?'就绪':(cdLeft/1000).toFixed(1)+'s'}</div>`;
  return div;
}
function refreshSkillBtns(){
  const container=document.getElementById('skill-btns');
  if(!container)return;
  // 保留攻击按钮
  const attackBtn=document.getElementById('btn-attack');
  // 清除除攻击按钮外的所有技能按钮
  container.querySelectorAll('.skill-dyn-btn').forEach(b=>b.remove());
  // 过滤主动技能
  const activeSkills=G.skills.filter(s=>s.skillType==='active');
  // 同时也添加 skill2
  if(G.skill2&&G.skill2.skillType==='active')activeSkills.push(G.skill2);
  // 按 id 去重
  const seen=new Set();const uniqueSkills=[];
  for(const sk of activeSkills){
    if(!seen.has(sk.id)){seen.add(sk.id);uniqueSkills.push(sk);}
  }
  for(const sk of uniqueSkills){
    const cdLeft=sk.lastUsed?Math.max(0,sk.cdMs-(now()-sk.lastUsed)):0;const ready=cdLeft===0;
    const grade=sk.grade||'D';const gradeMult=SKILL_GRADE_MULT[grade]||1.0;
    const btn=document.createElement('button');
    btn.className='btn btn-purple skill-dyn-btn btn-sm';
    btn.textContent=sk.icon+' '+sk.name+(ready?'':` (${(cdLeft/1000).toFixed(1)}s)`);
    btn.disabled=!ready;
    btn.addEventListener('click',()=>{
      if(!G.enemy||G.dead)return;
      playerAttackWithSkill(sk);
    });
    container.appendChild(btn);
  }
}

function renderQuests(){
  const el=document.getElementById('quest-list');
  if(G.quests.length===0||G.quests.every(q=>q.submitted)){el.innerHTML='<span style="color:var(--muted);font-size:12px">暂无进行中的任务，击杀怪物刷新</span>';return;}
  el.innerHTML='';
  for(let qi=0;qi<G.quests.length;qi++){
    const q=G.quests[qi];if(q.submitted)continue;
    const div=document.createElement('div');div.className='quest-item'+(q.progress>=q.target?' quest-done':'');
    const pct=q.target>0?Math.min(100,Math.floor(q.progress/q.target*100)):0;
    const canSubmit=q.progress>=q.target;
    // 生成奖励文本
    const rw=[];
    if(q.reward.gold)rw.push('💰'+fmt(q.reward.gold));
    if(q.reward.diamond)rw.push('💎'+q.reward.diamond);
    if(q.reward.xp)rw.push('✨'+fmt(q.reward.xp)+'XP');
    if(q.reward.equipQ!==undefined)rw.push('🎁'+QUALITY[q.reward.equipQ]+'+装备');
    if(q.reward.potion){const pn={hpPotion:'🧪小血瓶',hpLarge:'💉大血瓶',atkScroll:'📜攻击卷轴',defScroll:'🛡️防御卷轴',hpScroll:'❤️生命卷轴'};rw.push(pn[q.reward.potion]+'×'+q.reward.potionCount);}
    if(q.reward.material){const md=MATERIALS[q.reward.material];rw.push(md.icon+md.name+'×'+q.reward.materialCount);}
    div.innerHTML=`<div class="quest-title">${q.type==='kill'?'🗡️':q.type==='kill_any'?'⚔️':q.type==='collect_gold'?'💰':q.type==='collect_material'?'📦':'🎒'} ${q.text}</div><div class="quest-progress">进度：<span style="font-weight:bold;color:${canSubmit?'var(--green)':'var(--purple)'}">${q.progress}/${q.target}</span> (${pct}%)${canSubmit?' ✅ 可提交':''}</div><div class="quest-reward">奖励：${rw.join(' ')}</div>`;
    if(canSubmit){
      const sbtn=document.createElement('button');
      sbtn.className='btn btn-green btn-xs';
      sbtn.textContent='✅ 提交任务';
      sbtn.style.cssText='margin-top:4px';
      sbtn.addEventListener('click',(function(idx){return function(){submitQuest(idx);};})(qi));
      div.appendChild(sbtn);
    }
    el.appendChild(div);
  }
}
function renderLog(){
  const el=document.getElementById('event-log');el.innerHTML='';
  for(const l of G.logs.slice(0,30)){
    const p=document.createElement('p');p.className=l.cls||'';p.innerHTML=`<span style="color:var(--muted);margin-right:4px;font-size:10px">${l.time}</span>${l.msg}`;el.appendChild(p);
  }
}

  box.innerHTML=html;
  const acts=document.createElement('div');acts.className='modal-actions';acts.style.marginTop='8px';
  if(isEquipped){
    const b=document.createElement('button');b.className='btn btn-red btn-sm';b.textContent='卸下装备';
    b.addEventListener('click',()=>{if(G.inventory.length<G.maxInv){G.inventory.push(it);G.equipped[source]=null;addLog(`🔧 卸下装备：${it.name}`,'sys');}else addLog('⚠️ 背包已满','sys');closeModal();computeStats();renderAll();});
    acts.appendChild(b);
    // 强化按钮
    const enhBtn=document.createElement('button');enhBtn.className='btn btn-gold btn-sm';

        <div style="display:flex;gap:8px"><button class="btn btn-red" style="flex:1" id="btn-sell-yes">✅ 出售</button><button class="btn btn-sm" style="flex:1" id="btn-sell-no">❌ 取消</button></div>`;
      document.getElementById('btn-sell-no').addEventListener('click',()=>{showItemModal(it,source,isEquipped);});
      document.getElementById('btn-sell-yes').addEventListener('click',()=>{G.gold+=Math.floor(it.power*2);G.inventory.splice(source,1);addLog(`💰 出售：${it.name}，获得${fmt(Math.floor(it.power*2))}金币`,'sys');closeModal();renderAll();checkQuests();});
    });
    acts.appendChild(selb);

  box.appendChild(acts);
  const clb=document.createElement('button');clb.className='btn btn-sm';clb.style.cssText='width:100%;margin-top:6px';clb.textContent='关闭';
  clb.addEventListener('click',closeModal);box.appendChild(clb);

function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function doEnhance(slot){
  const it=G.equipped[slot];if(!it)return;
  const elv=G.slotEnhance[slot]||0;
  const goldCost=200+elv*200;
  const oreCost=3+elv*2;
  const successRate=Math.max(5,100-elv*7);
  if(G.gold<goldCost){addLog('⚠️ 金币不足','sys');return;}
  if((G.materials.ironOre||0)<oreCost){addLog('⚠️ 铁矿石不足','sys');return;}
  G.gold-=goldCost;G.materials.ironOre-=oreCost;
  if(Math.random()*100<successRate){
    G.slotEnhance[slot]=(G.slotEnhance[slot]||0)+1;
    const ep=getEnhancePower(slot);
    addLog(`⚒️ 强化成功！${it.name} → +${G.slotEnhance[slot]}（战力${it.power+ep}）`,'sys');
  }else{
    addLog(`💔 强化失败！${it.name} 仍为 +${elv}`,'sys');
  }
  computeStats();renderAll();
  closeModal();showItemModal(it,slot,true);
}
function showEnhanceSelectModal(){

  const slotNames={mainHand:'主手武器',offHand:'副手',armor:'铠甲',helmet:'头盔',bracer:'护腕',pants:'护腿',boots:'战靴',necklace:'项链',ring1:'戒指1',ring2:'戒指2',pendant:'吊坠'};

      <div class="shop-item-icon">${eqIcon(slot,G.equipped[slot]?.classReq||'all')}</div>

        <div class="shop-item-name">${slotNames[slot]}：<span style="color:${QCOLOR[it.quality]}">${it.name}</span>${elv>0?` <span style="color:var(--orange)">+${elv}</span>`:''}</div>
        <div class="shop-item-desc" style="font-size:10px">
          💰${goldCost} + 🪨${oreCost} | 成功率${successRate}% → +${elv+1}
          ${!hasOre?'<span style="color:var(--red)"> 铁矿石不足</span>':''}
          ${!hasGold?'<span style="color:var(--red)"> 金币不足</span>':''}
        </div>
      </div>
    </div>`;
    // Actual interactivity is done below via click event
  }
  html+='</div>';
  if(!hasItems)html+='<p style="color:var(--muted);font-size:12px">没有可强化的装备</p>';
  box.innerHTML=html;
  // Add click handlers
  setTimeout(()=>{
    const rows=box.querySelectorAll('.shop-item-row');
    let idx=0;
    for(const slot in G.equipped){
      const it=G.equipped[slot];if(!it)continue;
      const elv=G.slotEnhance[slot]||0;
      const goldCost=200+elv*200;const oreCost=3+elv*2;
      const hasOre=(G.materials.ironOre||0)>=oreCost;const hasGold=G.gold>=goldCost;
      if(hasOre&&hasGold&&rows[idx]){
        rows[idx].addEventListener('click',(function(s){return function(){closeModal();doEnhance(s);};})(slot));

    // close button
    if(!hasItems){

      cb.addEventListener('click',closeModal);box.appendChild(cb);
    }
  },0);
}
// 收集装备任务——选择装备提交弹窗
function showEquipSubmitModal(qIndex){
  const q=G.quests[qIndex];if(!q||q.submitted)return;
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');ov.classList.add('show');
  // 筛选符合条件的装备（只显示任务要求品质范围的装备）
  const eligible=[];
  for(let i=0;i<G.inventory.length;i++){
    if(getQuality(G.inventory[i])>=(q.quality??0))eligible.push(i);
  }
  const selected=new Set();
  let html=`<h3>📦 提交装备完成任务</h3><p style="font-size:11px;color:var(--muted);margin-bottom:4px">任务：${q.text}</p><p style="font-size:11px;color:var(--purple);margin-bottom:8px">需要提交 <b>${q.target}</b> 件 ${QUALITY[q.quality]} 及以上品质装备（已选 <b id="eq-submit-count">0</b>/${q.target}）</p>
    <div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px" id="eq-submit-list">`;
  if(eligible.length===0){
    html+='<p style="color:var(--muted);font-size:12px">背包中没有符合条件的装备</p>';
  }else{
    for(const idx of eligible){
      const it=G.inventory[idx];
      html+=`<div class="shop-item-row" data-eqidx="${idx}" style="cursor:pointer">
        <div class="shop-item-icon">${eqIcon(it.slot,it.classReq)}</div>
        <div class="shop-item-info">
          <div class="shop-item-name" style="color:${QCOLOR[it.quality]}">${it.name}</div>
          <div class="shop-item-desc">${it.qName} · 战力${it.power} · Lv${it.reqLv||1}</div>
        </div>
        <div class="eq-submit-check" style="font-size:18px;margin-right:6px;color:var(--muted)">⬜</div>
      </div>`;
    }
  }
  html+='</div><div style="margin-top:8px">';
  html+='<button class="btn btn-green btn-sm" id="btn-eq-submit-confirm" disabled>📦 确认提交</button> ';
  html+='<button class="btn btn-sm" id="btn-eq-submit-cancel">取消</button></div>';
  box.innerHTML=html;
  // 点击选择/取消选择
  const countEl=document.getElementById('eq-submit-count');
  const confirmBtn=document.getElementById('btn-eq-submit-confirm');
  box.querySelectorAll('.shop-item-row').forEach(row=>{
    row.addEventListener('click',function(){
      const idx=parseInt(row.dataset.eqidx);
      const check=row.querySelector('.eq-submit-check');
      if(selected.has(idx)){selected.delete(idx);check.textContent='⬜';check.style.color='var(--muted)';row.style.background='';}
      else if(selected.size<q.target){selected.add(idx);check.textContent='✅';check.style.color='var(--green)';row.style.background='rgba(34,197,94,0.1)';}
      if(countEl)countEl.textContent=''+selected.size;
      if(confirmBtn)confirmBtn.disabled=selected.size<q.target;
    });
  });
  document.getElementById('btn-eq-submit-cancel').addEventListener('click',closeModal);
  confirmBtn.addEventListener('click',function(){
    if(selected.size<q.target)return;
    // 从背包中移除选中的装备（从大到小排序避免索引错乱）
    const sorted=[...selected].sort((a,b)=>b-a);
    for(const idx of sorted)G.inventory.splice(idx,1);
    q.submitted=true;
    // 发放奖励
    if(q.reward.gold)G.gold+=q.reward.gold;
    if(q.reward.diamond)G.diamond+=q.reward.diamond;
    if(q.reward.xp){G.xp+=q.reward.xp;while(G.xp>=xpForLevel(G.level)&&G.level<300){G.xp-=xpForLevel(G.level);levelUp();}}
    if(q.reward.equipQ!==undefined){const slot=pick(Object.keys(EQ_NAMES));const it=genEquip(slot,q.reward.equipQ,Math.min(8,q.reward.equipQ+2),G.level);if(G.inventory.length<G.maxInv)G.inventory.push(it);else addLog('⚠️ 背包已满，装备奖励丢失','sys');}
    if(q.reward.potion){const key=q.reward.potion;G.consumables[key]=(G.consumables[key]||0)+q.reward.potionCount;}
    if(q.reward.material){const mk=q.reward.material;G.materials[mk]=(G.materials[mk]||0)+q.reward.materialCount;}
    const rewardText=[];
    if(q.reward.gold)rewardText.push('💰'+fmt(q.reward.gold));
    if(q.reward.diamond)rewardText.push('💎'+q.reward.diamond);
    if(q.reward.xp)rewardText.push('✨'+fmt(q.reward.xp)+'XP');
    if(q.reward.equipQ!==undefined)rewardText.push('🎁'+QUALITY[q.reward.equipQ]+'+装备');
    if(q.reward.potion){const pn={hpPotion:'🧪小血瓶',hpLarge:'💉大血瓶',atkScroll:'📜攻击卷轴',defScroll:'🛡️防御卷轴',hpScroll:'❤️生命卷轴'};rewardText.push(pn[q.reward.potion]+'×'+q.reward.potionCount);}
    if(q.reward.material){const md=MATERIALS[q.reward.material];rewardText.push(md.icon+md.name+'×'+q.reward.materialCount);}
    addLog(`✅ 任务完成：【${q.text}】获得 ${rewardText.join(' ')}`,'quest');
    replaceQuest(qIndex);
    closeModal();
    computeStats();renderAll();
  });
}

const CONSUMABLE_NAMES={hpPotion:'小血瓶',hpLarge:'大血瓶',atkScroll:'攻击卷轴',defScroll:'防御卷轴',hpScroll:'生命卷轴'};
const CONSUMABLE_ICONS={hpPotion:'🧪',hpLarge:'💉',atkScroll:'📜',defScroll:'🛡️',hpScroll:'❤️'};
function randomConsumableType(){
  const r=randi(1,100);
  if(r<=30)return 'hpPotion';
  if(r<=45)return 'hpLarge';
  if(r<=65)return 'atkScroll';
  if(r<=85)return 'defScroll';
  return 'hpScroll';

function gachaPull(count){
  const cost=count===10?45:5;
  if(G.diamond<cost)return addLog('⚠️ 钻石不足','sys');
  const needed=G.maxInv-G.inventory.length;
  if(count>needed)return addLog('⚠️ 背包空间不足（剩余'+needed+'格，需要'+count+'格），请先清理背包或使用扩容道具','sys');
  // 确认提示
  const ov=document.getElementById('modal-overlay'),box=document.getElementById('modal-box');
  ov.classList.add('show');
  box.innerHTML=`<h3>💎 确认抽奖</h3><p style="font-size:12px;margin:8px 0">确定使用 <b style="color:var(--purple)">💎${cost}钻石</b> 进行${count===10?'十连':'单次'}抽取吗？</p>
    <div style="display:flex;gap:8px"><button class="btn btn-pink" style="flex:1" id="btn-gacha-yes">✅ 确定抽取</button><button class="btn btn-sm" style="flex:1" id="btn-gacha-no">❌ 取消</button></div>`;
  document.getElementById('btn-gacha-no').addEventListener('click',closeModal);
  document.getElementById('btn-gacha-yes').addEventListener('click',()=>{
    closeModal();
    G.diamond-=cost;
  const equips=[];
  const consObtained=[];
  for(let i=0;i<count;i++){
    if(randi(1,100)<=30){
      const ct=randomConsumableType();
      consObtained.push(ct);
      G.consumables[ct]=(G.consumables[ct]||0)+1;
    }else{
      const q=rollGachaQuality();
      const slot=pick(Object.keys(EQ_NAMES));
      equips.push(genEquip(slot,q,q,G.level));
    }
  }
  if(count===10&&equips.length>0){equips[randi(0,equips.length-1)]=genEquip(pick(Object.keys(EQ_NAMES)),Math.max(4,rollGachaQuality()),8,G.level);}
  for(const it of equips){
    if(G.inventory.length<G.maxInv){G.inventory.push(it);autoEquipCheck(it);}
    else{addLog('⚠️ 背包已满，部分装备丢失','sys');break;}
  }
  const parts=[];
  if(equips.length>0)parts.push(equips.length+'件装备');
  const consMap={};
  for(const c of consObtained)consMap[c]=(consMap[c]||0)+1;
  for(const[c,num]of Object.entries(consMap)){
    parts.push(CONSUMABLE_ICONS[c]+CONSUMABLE_NAMES[c]+'×'+num);
  }
  addLog('💎 '+count+'连抽！获得：'+parts.join('、'),'drop');
  renderAll();renderShop();
  });
}
function useHpPotion(isAuto){
  if(!G.consumables.hpPotion&&!G.consumables.hpLarge)return addLog('⚠️ 没有血瓶','sys');
  if(G.hp>=G.maxHp)return addLog('⚠️ 生命值已满','sys');
  const n=now();
  // 手动使用也共享冷却：手动用了，自动10秒内也不会再用
  // 优先使用大血瓶
  if(G.consumables.hpLarge&&(!isAuto||(G.autoHpLarge&&n-G._lastHpLargeUse>=10000))){
    G.consumables.hpLarge--;
    G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*0.4));
    G._lastHpLargeUse=n; // 手动和自动共享冷却
    addLog('💉 使用大血瓶！瞬间恢复40%'+(isAuto?'（自动）':''),'heal');
  }
  else if(G.consumables.hpPotion&&(!isAuto||(G.autoHpSmall&&n-G._lastHpSmallUse>=10000))){
    G.consumables.hpPotion--;
    const perTick=Math.floor(G.maxHp*0.05);
    G._hpSmallHoT={until:n+5000,perTick,totalTicks:5,tickInterval:1000,lastTick:n};
    G._lastHpSmallUse=n; // 手动和自动共享冷却
    addLog('🧪 使用小血瓶！每秒恢复5%生命值，持续5秒'+(isAuto?'（自动）':''),'heal');
  }
    else if(!isAuto){addLog('⚠️ 正在冷却中或有其他限制，稍后再试','sys');return;}
  renderAll();
}

function switchClass(newClassId){
  const clsNames={warrior:'战士',archer:'射手',mage:'法师'};
  if(newClassId===G.classId)return addLog('⚠️ 已是该职业','sys');
  const cost=G.switchCount===0?0:G.classSwitchCost+Math.floor(G.switchCount*10);
  if(G.diamond<cost)return addLog(`⚠️ 钻石不足，需要${cost}💎`,'sys');
  if(cost>0)G.diamond-=cost;
  G.switchCount++;G.classSwitchCost=cost+10;
  G.learnedSkills[G.classId]=G.skills.filter(s=>s.bookOnly).map(s=>({...s}));
  G.classId=newClassId;G.classTier=0;G.className=clsNames[newClassId]+'学徒';G.classIcon=null;G.classStatsAdv={};
  const savedSkills=G.learnedSkills[newClassId]||[];
  G.skills=[{...SKILLS[G.classId].find(s=>s.unlockLv===0),lastUsed:0,gradeIdx:0,grade:'D',xp:0}];
  for(const ss of savedSkills){if(!G.skills.find(s=>s.id===ss.id))G.skills.push({...ss,lastUsed:0});}
  G.skill2=G.level>=10?SKILLS[G.classId].find(sk=>sk.unlockLv===10):null;
  addLog(`🔄 转职为：${G.className}！${cost===0?'首次免费！':'消耗'+cost+'💎'}`,'sys');
  if(savedSkills.length>0)addLog(`📖 恢复了${savedSkills.length}个已学技能`,'sys');
  // 卸下非本职业的装备
  let unequipped=0;
  for(const slot in G.equipped){
    const eq=G.equipped[slot];
    if(eq&&eq.classReq&&eq.classReq!=='all'&&eq.classReq!==G.classId){
      if(G.inventory.length<G.maxInv){G.inventory.push(eq);}else{G.gold+=decomposeItem(eq);}
      G.equipped[slot]=null;unequipped++;
    }
  }
  if(unequipped>0)addLog(`🔧 卸下了${unequipped}件不匹配的装备`,'sys');
  closeModal();computeStats();renderAll();
}

function gameTick(){
  if(G.dead){
    // Count down death timer
    if(now()>=G.deadUntil){
      G.dead=false;G.deadUntil=0;G.hp=Math.floor(G.maxHp*0.5);
      G.enemy=genMonster();G.killStreak=0;
      addLog('🔄 你复活了！怪物已刷新','sys');
    }
    renderTopBar();renderEnemy();renderLog();refreshQuestUI();renderBuffBar();refreshConsumableBtns();
    return; // dead — no auto actions
  }
  if(!G.enemy)G.enemy=genMonster();
  // 小血瓶HoT处理
  if(G._hpSmallHoT&&now()<G._hpSmallHoT.until){
    const n=now();
    if(n-G._hpSmallHoT.lastTick>=G._hpSmallHoT.tickInterval){
      G._hpSmallHoT.lastTick=n;
      G.hp=Math.min(G.maxHp,G.hp+G._hpSmallHoT.perTick);
    }
  }else{G._hpSmallHoT=null;}
  // 自动用药检测（战斗中且HP低于阈值）
  const nAuto=now();
  if(G.enemy&&G.enemy.hp>0&&G.hp<G.maxHp){
    // 大血瓶：HP<35% 自动使用
    if(G.autoHpLarge&&G.consumables.hpLarge>0&&G.hp<G.maxHp*0.35&&nAuto-G._lastHpLargeUse>=10000){
      useHpPotionLarge(true);
    }
    // 小血瓶：HP<60% 自动使用（没有HoT时）
    else if(G.autoHpSmall&&G.consumables.hpPotion>0&&G.hp<G.maxHp*0.60&&!G._hpSmallHoT&&nAuto-G._lastHpSmallUse>=10000){
      useHpPotionSmall(true);
    }
  }
  // Out-of-combat regen + special regen
  if(G.hp<G.maxHp&&(!G.enemy||G.enemy.hp<=0)){
    G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*0.02+(G.curHpRegen||0)));
  }
  // Enemy regen (elite/boss special)
  if(G.enemy&&G.enemy.hp>0&&G.enemy._regen){
    G.enemy.hp=Math.min(G.enemy.maxHp,G.enemy.hp+Math.floor(G.enemy.maxHp*G.enemy._regen));
  }
  // DOT damage from enemy
  if(G.buffs.dot&&now()<G.buffs.dot.until){
    G.hp-=G.buffs.dot.dmg;
    if(G.hp<=0){G.hp=0;G.dead=true;G.deadUntil=now()+3000;addLog('💀 毒发身亡！3秒后复活...','die');}
  }
  // Slow debuff consumption
  if(G._slowUntil&&now()<G._slowUntil){G._slowed=true;}else{G._slowed=false;}
  if(G.autoAtk&&G.enemy&&G.enemy.hp>0){
    const spd=Math.max(800,(G._slowed?G.curAtkSpd*1.5:G.curAtkSpd)*10);
    if(!G._lastAutoAtk||now()-G._lastAutoAtk>=spd){G._lastAutoAtk=now();
      if(G.autoSkill){const sk=G.skills.find(s=>canUseSkill(s));playerAttack(!!sk);}
      else playerAttack(false);
    }
  }
  // Clean expired DOT / slow
  if(G.buffs.dot&&now()>=G.buffs.dot.until)delete G.buffs.dot;
  if(G._slowUntil&&now()>=G._slowUntil){G._slowUntil=0;G._slowed=false;}
  renderTopBar();renderEnemy();refreshSkillBtns();renderLog();refreshQuestUI();renderBuffBar();refreshConsumableBtns();
  const n=now();for(const id in G.buffs){if(G.buffs[id].until<n)delete G.buffs[id];}
  if(Object.keys(G.buffs).length>0)computeStats();
}

// ═══ 离线收益计算 ═══
function calculateOfflineRewards(offlineSec){
  const MAX_OFFLINE = 8 * 3600; // 8小时上限
  offlineSec = Math.min(offlineSec, MAX_OFFLINE);
  
  const m = MAPS.find(x=>x.id===G.curMap)||MAPS[0];
  if(!m)return null;
  
  // 获取当前地图所有怪物
  const allMon = [...m.monsters];
  if(m.elite)allMon.push(m.elite);
  if(m.boss)allMon.push(m.boss);
  
  // 计算平均怪物属性
  let avgHp=0,avgDef=0,avgXp=0,avgGold=0,totalWeight=0;
  const weights = allMon.map(mo=>{
    const w = mo===m.boss ? 5 : mo===m.elite ? 15 : 80;
    totalWeight += w;
    return {mo,w};
  });
  for(const {mo,w} of weights){
    const typeMult = mo===m.boss ? 5 : mo===m.elite ? 2.5 : 1;
    avgHp += mo.hp * typeMult * w / totalWeight;
    avgDef += mo.def * typeMult * w / totalWeight;
    avgXp += mo.xp * w / totalWeight;
    avgGold += mo.gold * w / totalWeight;
  }
  avgHp = Math.floor(avgHp); avgDef = Math.floor(avgDef); avgXp = Math.floor(avgXp); avgGold = Math.floor(avgGold);
  
  // 计算平均伤害和击杀时间
  const avgDmg = Math.max(1, G.curAtk - Math.floor(avgDef * 0.3));
  const critBonus = 1 + (G.curCritRate / 100) * ((G.curCritDmg - 100) / 100);
  const effDmg = avgDmg * critBonus;
  const atkInterval = Math.max(800, G.curAtkSpd * 10);
  const hitsToKill = Math.ceil(avgHp / Math.max(1, effDmg));
  const avgKillTimeMs = hitsToKill * atkInterval;
  
  // 离线击杀数（效率50%）
  const offlineMs = offlineSec * 1000;
  let killCount = Math.floor(offlineMs / avgKillTimeMs * 0.5);
  if(killCount < 1) killCount = 1;
  if(killCount > 100000) killCount = 100000;
  
  // 批量结算收益
  let totalXp = 0, totalGold = 0;
  const equipDrops = [];
  const matDrops = {};
  const levelBefore = G.level;
  
  totalXp = Math.floor(killCount * avgXp * (1 + G.curExpBonus / 100));
  G.xp += totalXp;
  while(G.xp >= xpForLevel(G.level) && G.level < 300){
    G.xp -= xpForLevel(G.level);
    levelUp();
  }
  const levelAfter = G.level;
  
  totalGold = Math.floor(killCount * avgGold * (1 + G.curGoldBonus / 100));
  G.gold += totalGold;
  
  // 装备掉落（期望批量产出）
  const typeBase = 0.06;
  const lvBonus = Math.min(G.level/200, 0.10);
  const mfBonus = G.curMagicFind / 200;
  const avgDropRate = Math.min(typeBase + lvBonus + mfBonus, 0.65);
  const equipCount = Math.floor(killCount * avgDropRate);
  const monLv = Math.max(1, G.level - 3);
  for(let i=0;i<Math.min(equipCount,50);i++){
    const slot = pick(Object.keys(EQ_NAMES));
    const it = genEquip(slot, 0, Math.min(8, Math.floor(G.level/20)+2), monLv);
    if(G.inventory.length < G.maxInv){
      G.inventory.push(it);
      autoEquipCheck(it);
    }else{
      const goldGot = decomposeItem(it);
      G.gold += goldGot;
      totalGold += goldGot;
    }
    if(equipDrops.length < 20) equipDrops.push(it);
  }
  
  // 材料掉落
  for(const[mid,mdef] of Object.entries(MATERIALS)){
    if(mdef.dropSources.includes('normal')||mdef.dropSources.includes('elite')||mdef.dropSources.includes('boss')){
      const matCount = Math.floor(killCount * mdef.dropRate * 0.5);
      if(matCount > 0){
        G.materials[mid] = (G.materials[mid]||0) + matCount;
        matDrops[mid] = (matDrops[mid]||0) + matCount;
      }
    }
  }
  
  // 更新击杀计数
  G.killAnyCount = (G.killAnyCount||0) + killCount;
  for(const mo of m.monsters){
    G.kills[mo.name] = (G.kills[mo.name]||0) + Math.floor(killCount * 0.8 / m.monsters.length);
  }
  
  G.hp = G.maxHp;
  G.enemy = genMonster();
  checkQuests();
  
  return {
    offlineSec, killCount,
    totalXp, totalGold,
    levelBefore, levelAfter,
    equipDrops: equipDrops.slice(0, 10),
    equipTotal: equipDrops.length,
    matDrops,
  };
}

// 同步加载（从localStorage，启动时不阻塞）
function loadGameSync(){

    const parsed = JSON.parse(raw);
    parsed._rawTimestamp = parsed.timestamp || 0; // 保留原始时间戳

  }catch(e){console.error('Load failed:',e);return null;}

// 异步加载（从OPFS文件，后台尝试）
async function loadGame(){
  let raw = null;
  let source = 'localStorage';
  
  if(_useOPFS && _opfsRoot){
    try{
      raw = await readOPFS(SAVE_FILENAME);
      if(raw){
        source = '本地文件';
      } else {
        raw = await readOPFS(SAVE_BACKUP_FILENAME);
        if(raw) source = '备份文件';
      }
    }catch(e){}
  }
  
  if(!raw){
    raw = localStorage.getItem('legend_idle_save');
    source = 'localStorage';
  }
  
  if(!raw) return null;
  
  try{
    const d = JSON.parse(raw);
    if(!d || !d.version) return null;
    const restored = restoreGameData(d);
    if(restored) restored._saveSource = source;
    return restored;
  }catch(e){
    console.error('Load failed:', e);
    return null;
  }
}

  G.str = d.str; G.vit = d.vit; G.agi = d.agi; G.dex = d.dex; G.int = d.int;
  G.hp = d.hp; G.maxHp = d.maxHp;
  G.equipped = d.equipped || {}; G.inventory = d.inventory || []; G.maxInv = d.maxInv || 50;

  G.learnedSkills = d.learnedSkills || {};

  G.materials = d.materials || {};

  G.slotEnhance = d.slotEnhance || {};

  G.classIcon = d.classIcon || null;
  G.logs = d.logs || [];
  G._lastSaveTime = d.timestamp || 0; // 离线收益用
  
  for(const it of G.inventory){if(it.quality==null)it.quality=0;if(it.power==null)it.power=itemPower(it);}
  for(const k in G.equipped){const it=G.equipped[k];if(it){if(it.quality==null)it.quality=0;if(it.power==null)it.power=itemPower(it);}}
  G.dead = false; G.deadUntil = 0;
  
  G.skills = [];
  if(d.skillIds && d.skillIds.length > 0){
    const clsSkills = SKILLS[G.classId] || [];
    for(const sid of d.skillIds){

      }
    }
  }
  if(G.skills.length === 0 && SKILLS[G.classId]){
    G.skills = [{...SKILLS[G.classId].find(s=>s.unlockLv===0), lastUsed: 0, gradeIdx:0, grade:'D', xp:0}];
  }
  if(d.skill2Id){
    G.skill2 = (SKILLS[G.classId] || []).find(s=>s.id===d.skill2Id) || null;
  }
  
  G.buffs = {};
  if(d._buffs){
    for(const [id, b] of Object.entries(d._buffs)){
      if(b.until > 0) G.buffs[id] = {...b, until: now() + b.until};

  }
  
  setTimeout(()=>{

    const dq2=document.getElementById('decompose-quality');if(dq2)dq2.value=G.decomposeThreshold;

  G.enemy = null;
  return G;
}

// ═══ 本地文件存档系统 (OPFS) ═══
// 优先使用 Origin Private File System，降级使用 localStorage
const SAVE_FILENAME = 'legend_idle_save.json';
const SAVE_BACKUP_FILENAME = 'legend_idle_save_backup.json';
let _saveFileHandle = null; // 用于 File System Access API
let _opfsRoot = null;
let _useOPFS = false;

// 初始化OPFS
async function initOPFS(){
  try{
    _opfsRoot = await navigator.storage.getDirectory();
    _useOPFS = true;
    return true;
  }catch(e){
    _useOPFS = false;
    return false;
  }
}

// 从OPFS读取文件
async function readOPFS(filename){
  if(!_opfsRoot) return null;
  try{
    const fileHandle = await _opfsRoot.getFileHandle(filename);
    const file = await fileHandle.getFile();
    const text = await file.text();
    return text;
  }catch(e){
    return null;
  }
}

// 写入OPFS文件
async function writeOPFS(filename, content){
  if(!_opfsRoot) return false;
  try{
    const fileHandle = await _opfsRoot.getFileHandle(filename, {create: true});
    const writable = await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();
    return true;
  }catch(e){
    return false;
  }
}

// 自动保存到本地文件
async function autoSaveToFile(){
  const now_ = now();
  const saveData = buildSaveData(now_);
  const jsonStr = JSON.stringify(saveData);
  
  // 同时保存到 localStorage (快速回退)
  try{localStorage.setItem('legend_idle_save', jsonStr);}catch(e){}
  
  // 保存到OPFS本地文件
  if(_useOPFS && _opfsRoot){
    try{
      // 先写备份，再写主文件（防止写入中断导致数据损坏）
      await writeOPFS(SAVE_BACKUP_FILENAME, jsonStr);
      await writeOPFS(SAVE_FILENAME, jsonStr);
      // 更新保存指示器
      const si = document.getElementById('save-indicator');
      if(si && si.style.display !== 'inline'){
        si.style.display = 'inline';
        si.textContent = '💾 已自动保存(文件)';
        setTimeout(()=>{si.style.display = 'none';}, 2000);
      }
    }catch(e){
      // OPFS写入失败，仅依赖localStorage
      const si = document.getElementById('save-indicator');
      if(si && si.style.display !== 'inline'){
        si.style.display = 'inline';
        si.textContent = '💾 已自动保存';
        setTimeout(()=>{si.style.display = 'none';}, 2000);
      }
    }
  }
}

// 构建存档数据对象
function buildSaveData(now_){
  const saveData = {
    version: 2,
    timestamp: Date.now(),
    level: G.level, xp: G.xp, gold: G.gold, diamond: G.diamond,
    classId: G.classId, classTier: G.classTier, className: G.className,
    classSwitchCost: G.classSwitchCost, switchCount: G.switchCount,
    str: G.str, vit: G.vit, agi: G.agi, dex: G.dex, int: G.int,
    hp: G.hp, maxHp: G.maxHp,
    equipped: G.equipped, inventory: G.inventory, maxInv: G.maxInv,
    skillIds: G.skills.map(s=>s.id),
    skillGrades: G.skills.map(s=>({id:s.id,gradeIdx:s.gradeIdx||0,grade:s.grade||'D',xp:s.xp||0})),
    skill2Id: G.skill2 ? G.skill2.id : null,
    curMap: G.curMap,
    kills: G.kills,
    consumables: G.consumables,
    autoAtk: G.autoAtk, autoSkill: G.autoSkill, autoEquip: G.autoEquip,
    autoDecompose: G.autoDecompose, decomposeThreshold: G.decomposeThreshold, decomposeNonClass: G.decomposeNonClass,
    autoHpSmall: G.autoHpSmall, autoHpLarge: G.autoHpLarge,
    learnedSkills: G.learnedSkills,
    killAnyCount: G.killAnyCount,
    quests: G.quests,
    skillBooks: G.skillBooks,
    materials: G.materials,
    bagExpansions: G.bagExpansions,
    slotEnhance: G.slotEnhance,
    classStatsAdv: G.classStatsAdv || {},
    classIcon: G.classIcon || null,
    logs: G.logs.slice(0, 8),
  };
  const buffs = {};
  for(const [id, b] of Object.entries(G.buffs || {})){
    buffs[id] = {...b, until: Math.max(0, b.until - now_)};
  }
  saveData._buffs = buffs;
  return saveData;
}

// ═══ 存档系统 (兼容旧接口) ═══
function saveGame(){
  const now_ = now();
  const saveData = buildSaveData(now_);
  const jsonStr = JSON.stringify(saveData);
  
  // 保存到localStorage（同步，立即生效）
  try{localStorage.setItem('legend_idle_save', jsonStr);}catch(e){}
  
  // 异步保存到OPFS文件
  if(_useOPFS && _opfsRoot){
    writeOPFS(SAVE_FILENAME, jsonStr).catch(()=>{});
  }
  
  const si = document.getElementById('save-indicator');
  if(si){si.style.display='inline';setTimeout(()=>{si.style.display='none';},1500);}
}

function manualSave(){
