<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<!-- PWA / 添加到桌面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="传奇放置">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="传奇放置">
<meta name="theme-color" content="#ffffff">

<!-- 图标 (通过内联 SVG 生成 favicon + apple-touch-icon) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text x='50' y='68' text-anchor='middle' font-size='55'>⚔️</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%237c3aed'/><text x='90' y='125' text-anchor='middle' font-size='100'>⚔️</text></svg>">

<!-- 添加引导提示 -->
<style>
#install-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: #fff;
  padding: 12px 16px;
  z-index: 300;
  font-size: 14px;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(124,58,237,.4);
  animation: slideDown .3s ease;
}
#install-banner.show { display: flex; }
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
#install-banner .ib-text { flex: 1; font-size: 13px; }
#install-banner .ib-title { font-weight: bold; font-size: 15px; }
#install-banner button {
  background: rgba(255,255,255,.25);
  border: 1px solid rgba(255,255,255,.4);
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
}
#install-banner button:active { background: rgba(255,255,255,.4); }
#install-banner .ib-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.7);
  font-size: 20px;
  padding: 4px;
  cursor: pointer;
  line-height: 1;
}
</style>
<title>⚔️ 传奇放置 — 手机版</title>
<style>
/* ═══════════════════════════════════════════
   传奇放置 — 手机适配版 CSS
   ═══════════════════════════════════════════ */
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --card:#f8f9fc;
  --card2:#eef0f8;
  --border:#e0e4ec;
  --text:#1a1a2e;
  --muted:#8892b0;
  --gold:#f0a500;
  --red:#ef4444;
  --green:#10b981;
  --blue:#3b82f6;
  --purple:#a78bfa;
  --orange:#f97316;
  --pink:#ec4899;
  --teal:#14b8a6;
  --elite:#e65100;
  --boss:#dc2626;
  --r:10px;
  --nav-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  min-height:100vh;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* 滚动条 */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═══ 顶部状态栏 ═══ */
#topbar{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:8px 10px;
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:6px;
}

#topbar .top-row1{
  display:flex;
  align-items:center;
  gap:8px;
}

#topbar .char-icon{font-size:28px;min-width:36px;text-align:center}

#topbar .char-info{flex:1;min-width:0}
#topbar .char-info .name{font-size:15px;font-weight:bold;line-height:1.3}
#topbar .char-info .sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}

.top-stats-row{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}

.top-stat{
  flex:1;
  min-width:40px;
  text-align:center;
  background:var(--card);
  border-radius:6px;
  padding:4px 2px;
}
.top-stat .val{font-size:13px;font-weight:bold;line-height:1.2}
.top-stat .lbl{font-size:9px;color:var(--muted)}
.top-stat .gold-val{color:var(--gold)}
.top-stat .diamond-val{color:var(--pink)}

#xp-bar-wrap{width:100%}
#xp-bar-wrap .lbl-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px}
#xp-bar-outer{height:6px;background:#2a3560;border-radius:3px;overflow:hidden}
#xp-bar-inner{height:100%;background:linear-gradient(90deg,#3b82f6,#a78bfa);border-radius:3px;transition:width .3s;width:0%}

#death-indicator{color:var(--red);font-size:10px;display:none}

/* ═══ 主内容区 ═══ */
#main{
  padding:0;
  min-height:0;
}

.tab-page{display:none}
.tab-page.active{display:block}

.panel{
  background:var(--panel);
  margin:6px 8px;
  border-radius:var(--r);
  overflow:hidden;
  border:1px solid var(--border);
}

.panel-hd{
  font-size:13px;
  font-weight:bold;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  gap:6px;
}
.panel-hd .ph-icon{font-size:16px}

.panel-bd{padding:8px 10px;overflow-y:auto}

/* 属性面板折叠 */
.stat-collapse{margin:4px 8px 80px}
.stat-collapse .toggle-stat-panel{cursor:pointer;display:flex;justify-content:space-between}
.stat-collapse .toggle-arrow{font-size:12px;transition:transform .2s;color:var(--muted)}
.stat-collapse.collapsed .stat-panel-bd{display:none}
.stat-collapse.collapsed .toggle-arrow{transform:rotate(-90deg)}
.sub-hd{margin:0 -10px;border-radius:0;font-size:12px}

/* ═══ 装备网格 ═══ */
.eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px 0}
.eq-slot{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px;
  cursor:pointer;
  min-height:52px;
  position:relative;
  font-size:12px;
  transition:all .15s;
}
.eq-slot:active{border-color:var(--purple);background:var(--card2);transform:scale(.97)}
.eq-slot .eq-label{font-size:10px;color:var(--muted)}
.eq-slot .eq-name{font-weight:bold;font-size:12px;line-height:1.3}
.eq-slot .eq-sub{font-size:9px;color:var(--muted)}
.eq-slot.empty .eq-name{color:var(--muted);font-weight:normal}
.eq-unequip{
  position:absolute;top:4px;right:4px;
  background:rgba(239,68,68,.2);border:1px solid var(--red);color:var(--red);
  border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;
}
.eq-enhance-badge{
  position:absolute;top:3px;right:3px;
  background:linear-gradient(135deg,#ea580c,#f97316);
  color:#fff;font-size:9px;font-weight:bold;
  padding:1px 5px;border-radius:3px;z-index:3;
}

/* ═══ 战斗区 ═══ */
#enemy-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px;
  margin-bottom:8px;
}
#enemy-card.elite{border-color:var(--elite);background:rgba(230,81,0,.1)}
#enemy-card.boss{border-color:var(--boss);background:rgba(220,38,38,.1)}

#enemy-name{font-size:16px;font-weight:bold;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.enemy-type-tag{
  font-size:11px;padding:2px 8px;border-radius:12px;color:#fff;font-weight:bold;
}
.enemy-type-tag.elite{background:var(--elite)}
.enemy-type-tag.boss{background:var(--boss)}

.enemy-hp-outer{height:12px;background:rgba(239,68,68,.2);border-radius:6px;overflow:hidden;margin-bottom:6px}
.enemy-hp-inner{height:100%;background:linear-gradient(90deg,#dc2626,#ea580c);border-radius:6px;transition:width .3s;width:100%}

.enemy-info{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}

/* 操作按钮 */
.act-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.act-btns-sm{gap:4px}

/* 自动战斗设置条 */
.auto-battle-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:6px 10px;margin-bottom:8px;
  background:var(--card);border-radius:8px;
  border:1px solid var(--border);
  align-items:center;
}
.auto-label{
  font-size:12px;display:flex;align-items:center;gap:3px;
  padding:3px 6px;cursor:pointer;white-space:nowrap;
  color:var(--text);background:rgba(124,58,237,.08);
  border-radius:6px;border:1px solid rgba(124,58,237,.15);
}
.auto-label input[type="checkbox"]{accent-color:var(--purple);width:14px;height:14px;margin-right:2px}
.auto-label:has(input:checked){background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:var(--text);font-weight:500}

/* 存档按钮条 */
.save-btns-bar{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
  padding:4px 8px;margin-bottom:8px;
  background:var(--card);border-radius:8px;
  border:1px solid var(--border);
}
.save-btns-bar .btn{min-height:32px;padding:5px 10px;font-size:12px}
#save-indicator{font-size:11px;color:var(--green);margin-right:4px;white-space:nowrap;display:none}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:2px;
  padding:3px 7px;border-radius:6px;border:1px solid transparent;
  cursor:pointer;font-size:10px;font-family:inherit;transition:all .12s;
  white-space:nowrap;min-height:26px;font-weight:500;
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;pointer-events:none}

.btn-lg{padding:5px 10px;font-size:11px;min-height:28px}

.btn-red{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.btn-red:active{background:rgba(239,68,68,.3)}
.btn-blue{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.btn-blue:active{background:rgba(59,130,246,.3)}
.btn-blue2{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.btn-purple{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
.btn-purple:active{background:rgba(167,139,250,.3)}
.btn-green{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.btn-green:active{background:rgba(16,185,129,.3)}
.btn-gold{background:rgba(240,165,0,.15);border-color:var(--gold);color:var(--gold)}
.btn-gold:active{background:rgba(240,165,0,.3)}
.btn-pink{background:rgba(236,72,153,.15);border-color:var(--pink);color:var(--pink)}
.btn-pink:active{background:rgba(236,72,153,.3)}
.btn-orange{background:rgba(249,115,22,.15);border-color:var(--orange);color:var(--orange)}
.btn-red2{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}

.btn-sm{padding:6px 10px;font-size:12px;min-height:34px}
.btn-xs{padding:3px 7px;font-size:10px;min-height:28px}

.btn-decompose{background:linear-gradient(135deg,#f97316,#ef4444)!important;color:#fff!important;border:none!important}
.btn-decompose:active{filter:brightness(1.15)}

/* 战斗日志 */
#combat-log{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  max-height:120px;
  overflow-y:auto;
  font-size:11px;
  margin-top:6px;
}
#combat-log p{line-height:1.5;border-bottom:1px solid var(--border);padding:2px 0}
#combat-log .hit{color:var(--red)}
#combat-log .crit{color:var(--orange);font-weight:bold}
#combat-log .drop{color:var(--gold)}
#combat-log .sys{color:var(--purple)}
#combat-log .skill{color:var(--blue)}
#combat-log .die{color:var(--red);font-weight:bold}
#combat-log .heal{color:var(--green)}
#combat-log .quest{color:var(--pink)}

/* ═══ 底部Tab导航 ═══ */
#bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--panel);
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  padding-bottom:var(--safe-bottom);
  height:var(--nav-h);
}

.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:none;
  border:none;
  color:var(--muted);
  font-size:10px;
  cursor:pointer;
  transition:all .15s;
  font-family:inherit;
  padding:4px 0;
  min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn .nav-label{font-size:10px}
.nav-btn.active{color:var(--purple)}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn:active{background:rgba(167,139,250,.1)}

/* ═══ 存档管理浮动按钮 (FAB) ═══ */
#save-fab{
  position:fixed;
  bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);
  right:12px;
  z-index:190;
}
#fab-save-btn{
  width:48px;height:48px;
  border-radius:50%;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);
  color:#fff;
  border:none;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(124,58,237,.4);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#fab-save-btn:active{transform:scale(.9)}

#fab-menu{
  display:none;
  position:absolute;
  bottom:56px;
  right:0;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:6px;
  min-width:140px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  flex-direction:column;
  gap:2px;
}
#fab-menu.show{display:flex}

.fab-item{
  display:flex;align-items:center;gap:6px;
  padding:10px 14px;
  border:none;background:none;
  color:var(--text);font-size:13px;
  cursor:pointer;border-radius:8px;
  font-family:inherit;text-align:left;
  transition:all .12s;white-space:nowrap;
}
.fab-item:active{background:var(--card2)}
.fab-item.fab-danger{color:var(--red)}
.fab-item.fab-danger:active{background:rgba(239,68,68,.1)}

/* ═══ 背包 ═══ */
.full-panel{margin:4px 4px 80px;min-height:calc(100vh - 280px)}

#bag-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;margin-bottom:8px;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
#bag-header .bag-info{font-size:12px;color:var(--muted);font-weight:bold}
#bag-header .bag-acts{display:flex;gap:4px;align-items:center}

#decompose-panel{
  display:none;flex-wrap:wrap;align-items:center;gap:4px;
  padding:8px;margin-bottom:6px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  font-size:12px;
}
#decompose-panel select{
  padding:4px 6px;border:1px solid var(--border);border-radius:4px;
  font-size:12px;background:var(--panel);color:var(--text);
}
#decompose-panel label{
  cursor:pointer;display:flex;align-items:center;gap:3px;
  font-size:11px;color:var(--muted);
}
#decompose-panel label input{margin:0}

.tabs{display:flex;gap:2px;padding:4px 0;flex-wrap:wrap}
.tab-btn{
  padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;
  font-size:12px;color:var(--muted);border:1px solid transparent;
  border-bottom:none;background:transparent;transition:all .12s;
  min-height:36px;font-family:inherit;
}
.tab-btn.active{background:var(--panel);border-color:var(--border);color:var(--purple);font-weight:bold}
.tab-btn:active{background:var(--card2)}

.bag-count-badge{font-size:9px;color:var(--purple);margin-left:2px}
.bag-tab-content{display:none;padding:6px 0}
.bag-tab-content.active{display:flex;flex-direction:column}
#bag-collapsible{overflow-y:auto}

/* 物品网格 */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.inv-cell{
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;aspect-ratio:1;cursor:pointer;
  font-size:10px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.3;position:relative;transition:all .12s;
}
.inv-cell:active{transform:scale(.95);border-color:var(--purple)}
.inv-cell.empty{opacity:.3;pointer-events:none}
.inv-cell .inv-q{font-size:7px;padding:0 3px;border-radius:2px;margin-top:1px}
.inv-cell-dim{opacity:.45}

/* 技能 */
.skill-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all .12s;
}
.skill-item:active{border-color:var(--purple)}
.skill-icon{font-size:24px;min-width:36px;text-align:center}
.skill-info{flex:1}
.skill-name{font-size:14px;font-weight:bold}
.skill-desc{font-size:12px;color:var(--muted)}
.skill-cd{font-size:11px;color:var(--red)}

/* 任务 */
.quest-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
}
.quest-title{font-size:13px;font-weight:bold;display:flex;align-items:center;gap:4px}
.quest-progress{font-size:11px;color:var(--muted);margin-top:4px}
.quest-reward{font-size:11px;color:var(--gold);margin-top:4px}
.quest-done{border-color:var(--green);background:rgba(16,185,129,.1)}

/* 地图 */
.map-list{display:flex;flex-direction:column;gap:4px}
.map-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:all .12s;
}
.map-item:active{border-color:var(--purple)}
.map-item.active{border-color:var(--purple);background:rgba(167,139,250,.1)}
.map-item.locked{opacity:.4;pointer-events:none}
.map-icon{font-size:22px;min-width:30px;text-align:center}
.map-info{flex:1}
.map-name{font-size:13px;font-weight:bold}
.map-lv{font-size:10px;color:var(--purple);font-weight:normal;background:rgba(167,139,250,.15);padding:1px 5px;border-radius:3px}
.map-desc{font-size:11px;color:var(--muted)}

.map-monsters{font-size:10px;color:var(--muted);display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.map-monsters span{background:var(--card2);padding:1px 5px;border-radius:3px}
.map-boss{color:var(--boss);font-weight:bold}
.map-elite{color:var(--elite)}
.map-normal{color:var(--muted)}

/* 商店 */
.shop-section{margin-bottom:12px}
.shop-section h4{font-size:13px;margin-bottom:6px;color:var(--text)}
.shop-item-row{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;transition:all .12s;
}
.shop-item-row:active{border-color:var(--purple)}
.shop-item-icon{font-size:24px;min-width:32px;text-align:center}
.shop-item-info{flex:1}
.shop-item-name{font-size:13px;font-weight:bold}
.shop-item-desc{font-size:11px;color:var(--muted);margin-top:2px}
.shop-item-price{font-size:11px;margin-top:2px}
.gacha-rate{font-size:11px;color:var(--muted);margin:4px 0;line-height:1.5}

/* ═══ 底部区域 ═══ */
#bottom{
  display:flex;flex-direction:column;
  margin:0 8px calc(var(--nav-h) + var(--safe-bottom) + 12px);
  gap:4px;
}
#event-log{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:8px 10px;
  max-height:120px;
  overflow-y:auto;
  font-size:11px;
}
#event-log p{padding:1px 0;border-bottom:1px solid var(--border);line-height:1.5}



/* ═══ Buff ═══ */
#buff-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;min-height:20px}
.buff-tag{
  font-size:10px;padding:2px 8px;border-radius:12px;
  background:rgba(236,72,153,.15);border:1px solid var(--pink);color:var(--pink);
  display:flex;align-items:center;gap:2px;
}

/* ═══ 弹窗 ═══ */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:999;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.show{display:flex}

/* 合成成功提示 Toast */
.craft-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
  background:rgba(0,0,0,.9);color:#fff;border-radius:16px;
  padding:20px 32px;text-align:center;z-index:2000;
  font-size:15px;line-height:1.6;pointer-events:none;
  opacity:0;transition:opacity .3s,transform .3s;
}
.craft-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.craft-toast.success{border:2px solid var(--green)}
.craft-toast.error{border:2px solid var(--red)}

/* 地图切换过渡 */
#map-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(255,255,255,.4);z-index:3000;pointer-events:none;
  opacity:0;transition:opacity .08s;
}
#map-flash.show{opacity:1;transition:opacity 0s}
#map-flash .flash-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:48px;animation:mapFlashPop .35s ease;
}
@keyframes mapFlashPop{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

#modal-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:16px;
  width:100%;
  max-width:100%;
  max-height:80vh;
  overflow-y:auto;
  box-shadow:0 -4px 20px rgba(0,0,0,.3);
}
#modal-box h3{font-size:16px;margin-bottom:10px}
#modal-box .stat-line{
  display:flex;justify-content:space-between;
  padding:3px 0;font-size:13px;
  border-bottom:1px solid var(--border);
}
#modal-box .modal-actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
#modal-box .modal-hd{font-size:16px;font-weight:bold;margin-bottom:10px;color:var(--gold,#f0a500)}
#modal-box .modal-bd{max-height:50vh;overflow-y:auto;padding:4px 0}

/* ═══ 品质颜色 ═══ */
.q0{color:#888}.q1{color:#10b981}.q2{color:#3b82f6}.q3{color:#f0a500}
.q4{color:#a78bfa}.q5{color:#14b8a6}.q6{color:#ec4899}.q7{color:#f97316}.q8{color:#ef4444}
.qbg0{border-left:3px solid #888}.qbg1{border-left:3px solid #10b981}
.qbg2{border-left:3px solid #3b82f6}.qbg3{border-left:3px solid #f0a500}
.qbg4{border-left:3px solid #a78bfa}.qbg5{border-left:3px solid #14b8a6}
.qbg6{border-left:3px solid #ec4899}.qbg7{border-left:3px solid #f97316}.qbg8{border-left:3px solid #ef4444}
.special-attr{font-size:10px;color:var(--teal);margin-top:2px}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px dotted var(--border)}
.stat-row .sr-label{color:var(--muted)}
.stat-row .sr-val{font-weight:bold}
.stat-row .sr-bonus{color:var(--green);font-size:10px}
.pts-bar{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 0;color:var(--pink)}
.diamond{color:var(--pink)}

/* ═══ 统计面板 ═══ */
#stat-panel{font-size:12px;margin-bottom:8px}
#stat-panel > div{margin-bottom:3px;line-height:1.4}
#free-pts-badge{font-size:10px;color:var(--pink);font-weight:normal;margin-left:auto}

/* ═══ 桌面端 ═══ */
@media(min-width:769px){
  body{padding-bottom:0;background:#f0f2f5}

  #topbar{

  }
  #topbar .top-stats-row{flex:1}

  #xp-bar-wrap{max-width:220px}

  #bottom-nav{display:none}

  #main{
    display:grid;grid-template-columns:240px 1fr 280px;

  }
  .tab-page{display:block!important}

  .panel{margin:0;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.07)}

  .skill-desc{font-size:10px}
  .quest-item{padding:6px 8px;margin-bottom:4px}

  .shop-item-row{padding:7px 9px;margin-bottom:5px}

  #stat-panel{font-size:11px}
  #event-log{font-size:11px}
  body{font-size:13px}
}
</style>
</head>

<script>
// ═══ PWA安装横幅 ═══
(function(){
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('ib-install-btn');
  const closeBtn = document.getElementById('ib-close-btn');
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    if(banner) banner.classList.add('show');
  });

  if(installBtn) {
    installBtn.addEventListener('click', function() {
      if(deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if(result.outcome === 'accepted') {
            if(banner) banner.classList.remove('show');
          }
          deferredPrompt = null;
        });
      } else {
        showInstallGuide();
      }
    });
  }

  if(closeBtn) {
    closeBtn.addEventListener('click', function() {
      if(banner) banner.classList.remove('show');
    });
  }

  if(window.matchMedia('(display-mode: standalone)').matches) {
    if(banner) banner.classList.remove('show');
  }

  function showInstallGuide() {
    const ov = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-box');
    if(!ov || !box) return;
    ov.classList.add('show');
    box.innerHTML = '<h3>添加到桌面</h3><div style="font-size:13px;line-height:1.8;margin-bottom:12px"><p style="margin-bottom:8px">不同设备添加方法：</p><p><b>iPhone/iPad：</b>Safari 浏览器中点击底部 分享按钮 → 选择「添加到主屏幕」</p><p style="margin-top:6px"><b>Android Chrome：</b>点击右上角 ⋮ 菜单 → 选择「添加到主屏幕」</p><p style="margin-top:6px"><b>电脑 Chrome/Edge：</b>地址栏右侧 ⊕ 图标 → 点击安装</p></div><button class="btn btn-purple" style="width:100%" id="ib-guide-close">知道了</button>';
    document.getElementById('ib-guide-close').addEventListener('click', function() {
      ov.classList.remove('show');
    });
  }

  window.addEventListener('appinstalled', function() {
    if(banner) banner.classList.remove('show');
  });
})();

// ═══ 底部导航切换 ═══
(function(){
  const navBtns = document.querySelectorAll('#bottom-nav .nav-btn');
  const tabPages = document.querySelectorAll('.tab-page');
  const bottomEl = document.getElementById('bottom');
  
  function switchTab(pageName) {
    navBtns.forEach(b => b.classList.remove('active'));
    const activeBtn = document.querySelector('#bottom-nav .nav-btn[data-page="' + pageName + '"]');
    if(activeBtn) activeBtn.classList.add('active');
    tabPages.forEach(p => p.classList.remove('active'));
    const target = document.getElementById('tab-page-' + pageName);
    if(target) target.classList.add('active');
    if(pageName === 'battle') { if(bottomEl) bottomEl.style.display = ''; }
    else { if(bottomEl) bottomEl.style.display = 'none'; }
    if(pageName === 'shop' && typeof renderShop === 'function') renderShop();
    if(pageName === 'bag' && typeof renderBag === 'function') renderBag();
    if(pageName === 'quests' && typeof renderQuests === 'function') renderQuests();
    if(pageName === 'skills' && typeof renderSkills === 'function') renderSkills();
  }
  
  navBtns.forEach(btn => {
    btn.addEventListener('click', function() { switchTab(this.dataset.page); });
  });
  
  // 属性面板折叠
  const statPanel = document.querySelector('.stat-collapse');
  const toggleBtn = document.querySelector('.toggle-stat-panel');
  if(statPanel && toggleBtn && window.innerWidth <= 768) {

function genQuestReward(G,base){
  const rew={...base};
  // 5%概率随机给1~3颗钻石（独立于其他奖励）
  if(Math.random()<0.05){rew.diamond=randi(1,3);}
  // 1%概率给1~2个重铸石
  if(Math.random()<0.01){rew.material='recastStone';rew.materialCount=randi(1,2);}
  else{
    const r=Math.random();
    // 10%概率给装备
    if(r<0.10){rew.equipQ=Math.min(randi(1, Math.floor(G.level/10)+1), 7);}
    // 30%概率给药水
    else if(r<0.40){const potions=['hpPotion','atkScroll','defScroll','hpScroll'];rew.potion=pick(potions);rew.potionCount=randi(1,2);}
    // 25%概率给材料（排除重铸石）
    else if(r<0.65){const mids=Object.keys(MATERIALS).filter(k=>k!=='recastStone');rew.material=pick(mids);rew.materialCount=randi(2,6);}
  }
  // 其余只给基础奖励
  return rew;
}

function gachaProb(){
  const lv=G.level;
  if(lv<=25)return[{q:0,pct:40},{q:1,pct:30},{q:2,pct:20},{q:3,pct:8},{q:4,pct:2}];

  if(lv<=150)return[{q:1,pct:20},{q:2,pct:28},{q:3,pct:25},{q:4,pct:18},{q:5,pct:7},{q:6,pct:2}];
  if(lv<=250)return[{q:2,pct:22},{q:3,pct:28},{q:4,pct:25},{q:5,pct:15},{q:6,pct:8},{q:7,pct:2}];

}
function rollGachaQuality(){const probs=gachaProb();const r=randi(1,100);let cum=0;for(const p of probs){cum+=p.pct;if(r<=cum)return p.q;}return probs[probs.length-1].q;}

function fmtStat(raw,cur,max,unit,suffix){
  const u=unit||'';const s=suffix||'';
  if(raw>max){
    return `<span style="color:var(--muted);text-decoration:line-through">${typeof raw==='number'&&raw%1!==0?raw.toFixed(1):raw}${u}</span> <span style="color:var(--red);font-size:9px">→${typeof cur==='number'&&cur%1!==0?cur.toFixed(1):cur}${u}${s}</span>`;
  }

}

function rollWeightedQ(minQ,maxQ){
  // 从可用品质范围中按权重随机，高品质概率极低
  const pool=[];
  for(let q=minQ;q<=maxQ;q++){pool.push({q,w:Q_WEIGHT[q]||1});}
  const sumW=pool.reduce((s,p)=>s+p.w,0);
  let r=Math.random()*sumW,cum=0;
  for(const p of pool){cum+=p.w;if(r<=cum)return p.q;}
  return pool[pool.length-1].q;
}

function classBaseStats(){
  if(G.classId==='warrior')return{str:10,vit:8,agi:4,dex:3,int:1};
  if(G.classId==='archer')return{str:5,vit:6,agi:10,dex:6,int:1};
  return{str:2,vit:5,agi:5,dex:4,int:12};
}

function computeStats(){
  const cb=classBaseStats();
  let ST=cb.str+G.str, VT=cb.vit+G.vit, AG=cb.agi+G.agi, DX=cb.dex+G.dex, IN=cb.int+G.int;
  // Str→ATK, Vit→HP(法师/射手额外加成), Agi→ATK_SPD+Dodge, Dex→CritRate, Int→ATK(mage only)
  const vitHpMult = G.classId==='warrior'?15:G.classId==='archer'?18:20;
  let a=ST*2, d=VT*1.2, h=VT*vitHpMult, cr=DX*0.5+5, cd=150, sp=Math.max(20, 100 - Math.pow(AG, 0.7) * 2.5);
  if(G.classId==='mage')a+=IN*3;
  let dodge=AG*0.3, block=0, lifesteal=0, thorns=0, magicFind=0, expBonus=0, goldBonus=0, hpRegen=0, doubleAtk=0, armorPierce=0, siphon=0;

  // equipment stats
  for(const k in G.equipped){
    const it=G.equipped[k];if(!it)continue;
    if(it.stats.atk)a+=it.stats.atk;if(it.stats.def)d+=it.stats.def;
    if(it.stats.hp)h+=it.stats.hp;if(it.stats.critRate)cr+=it.stats.critRate;
    if(it.stats.critDmg)cd+=it.stats.critDmg;if(it.stats.atkSpd)sp=Math.max(20,sp-it.stats.atkSpd);
    if(it.stats.lifesteal)lifesteal+=it.stats.lifesteal;
    if(it.stats.thorns)thorns+=it.stats.thorns;
    if(it.stats.magicFind)magicFind+=it.stats.magicFind;
    if(it.stats.expBonus)expBonus+=it.stats.expBonus;
    if(it.stats.goldBonus)goldBonus+=it.stats.goldBonus;
    if(it.stats.block)block+=it.stats.block;
    if(it.stats.dodge)dodge+=it.stats.dodge;
    if(it.stats.hpRegen)hpRegen+=it.stats.hpRegen;
    if(it.stats.doubleAtk)doubleAtk+=it.stats.doubleAtk;
    if(it.stats.armorPierce)armorPierce+=it.stats.armorPierce;
    if(it.stats.siphon)siphon+=it.stats.siphon;
    if(it.stats.critBonus)cd+=it.stats.critBonus;
  }
  // enhancement bonuses (per-slot)
  for(const slot in G.equipped){
    const it=G.equipped[slot];const elv=G.slotEnhance[slot]||0;
    if(!it||elv<=0)continue;
    const eb=ENHANCE_BONUS[slot];if(!eb)continue;
    if(eb.atk)a+=Math.floor(eb.atk*elv);
    if(eb.def)d+=Math.floor(eb.def*elv);
    if(eb.hp)h+=Math.floor(eb.hp*elv);
    if(eb.critRate)cr+=Math.round(eb.critRate*elv*10)/10;
    if(eb.critDmg)cd+=Math.floor(eb.critDmg*elv);
    if(eb.atkSpd)sp=Math.max(20,sp-eb.atkSpd*elv);
    if(eb.block)block+=Math.round(eb.block*elv*10)/10;
    if(eb.dodge)dodge+=Math.round(eb.dodge*elv*10)/10;
  }
  // set bonuses
  const setCounts={};
  for(const k in G.equipped){const it=G.equipped[k];if(it&&it.setId)setCounts[it.setId]=(setCounts[it.setId]||0)+1;}
  G._activeSetBonuses=[]; // 重置套装显示
  for(const s of SETS){
    const cnt=setCounts[s.id]||0;
    for(let need=7;need>=3;need--){
      if(cnt>=need&&s.bonus[need]){
        const bo=s.bonus[need];
        if(bo.atk)a+=bo.atk;if(bo.def)d+=bo.def;if(bo.hp)h+=bo.hp;
        if(bo.critRate)cr+=bo.critRate;if(bo.critDmg)cd+=bo.critDmg;if(bo.atkSpd)sp=Math.max(20,sp-bo.atkSpd);
        G._activeSetBonuses.push({setName:s.name,setId:s.id,pieceCount:cnt,bonusLevel:need,bonus:{...bo}});
        break;
      }
    }
  }
  // class advancement bonuses
  if(G.classStatsAdv){const ba=G.classStatsAdv;if(ba.atk)a+=ba.atk;if(ba.def)d+=ba.def;if(ba.hp)h+=ba.hp;if(ba.critRate)cr+=ba.critRate;}

  G.maxHp=h;G.curAtk=Math.max(1,a);G.curDef=d;G.curCritRate=Math.min(cr,80);G.curCritDmg=cd;G.curAtkSpd=Math.max(20,sp);
  // 存储原始值（含超出上限部分），用于页面显示
  G.rawDodge=dodge;G.rawBlock=block;G.rawLifesteal=lifesteal;
  G.rawThorns=thorns;G.rawMagicFind=magicFind;G.rawExpBonus=expBonus;
  G.rawGoldBonus=goldBonus;G.rawHpRegen=hpRegen;G.rawDoubleAtk=doubleAtk;
  G.rawArmorPierce=armorPierce;G.rawSiphon=siphon;

  // 硬上限裁剪（提高后的值）
  G.curDodge=Math.min(dodge,50);G.curBlock=Math.min(block,45);G.curLifesteal=Math.min(lifesteal,50);
  G.curThorns=Math.min(thorns,45);G.curMagicFind=Math.min(magicFind,100);G.curExpBonus=Math.min(expBonus,300);
  G.curGoldBonus=Math.min(goldBonus,300);G.curHpRegen=hpRegen;G.curDoubleAtk=Math.min(doubleAtk,40);
  G.curArmorPierce=Math.min(armorPierce,60);G.curSiphon=Math.min(siphon,40);
  // store raw stats for display
  G.rawST=ST||0;G.rawVT=VT||0;G.rawAG=AG||0;G.rawDX=DX||0;G.rawIN=IN||0;

  const n=now();
  for(const id in G.buffs){const b=G.buffs[id];if(b.until<n){delete G.buffs[id];continue;}
    if(id==='atk')G.curAtk+=b.val||0;else if(id==='def')G.curDef+=b.val||0;else if(id==='maxhp_cd')G.maxHp+=b.val||0;
    else if(id==='critRate')G.curCritRate+=b.val||0;else if(id==='critDmg')G.curCritDmg+=b.val||0;else if(id==='atkSpd')G.curAtkSpd-=b.val||0;
    else if(id==='dodge'){G.curDodge+=b.val||0;G.rawDodge+=b.val||0;}
    else if(id==='block'){G.curBlock+=b.val||0;G.rawBlock+=b.val||0;}
    else if(id==='lifesteal'){G.curLifesteal+=b.val||0;G.rawLifesteal+=b.val||0;}
    else if(id==='thorns'){G.curThorns+=b.val||0;G.rawThorns+=b.val||0;}
    else if(id==='armorPierce'){G.curArmorPierce+=b.val||0;G.rawArmorPierce+=b.val||0;}
    else if(id==='doubleAtk'){G.curDoubleAtk+=b.val||0;G.rawDoubleAtk+=b.val||0;}
    else if(id==='hpRegen')G.curHpRegen=b.val||0;else if(id==='cdReduce')G.curAtkSpd-=b.val||0;
  }
  // buff叠加后重新裁剪硬上限
  G.curDodge=Math.min(G.curDodge,50);G.curBlock=Math.min(G.curBlock,45);
  G.curLifesteal=Math.min(G.curLifesteal,50);G.curThorns=Math.min(G.curThorns,45);
  G.curDoubleAtk=Math.min(G.curDoubleAtk,40);G.curArmorPierce=Math.min(G.curArmorPierce,60);
  G.curSiphon=Math.min(G.curSiphon,40);
  if(G.hp>G.maxHp)G.hp=G.maxHp;
}

function xpForLevel(lv){return Math.floor(100*Math.pow(lv,2.2)+50*lv);}

function getEnhancePower(slot){
  const elv=G.slotEnhance[slot]||0;if(elv<=0)return 0;
  const eb=ENHANCE_BONUS[slot];if(!eb)return 0;
  let p=0;
  if(eb.atk)p+=eb.atk*elv*5;if(eb.def)p+=eb.def*elv*3;if(eb.hp)p+=eb.hp*elv*0.8;
  if(eb.critRate)p+=eb.critRate*elv*8;if(eb.critDmg)p+=eb.critDmg*elv*0.6;

function itemPower(it){
  let p=0;const s=it.stats;const q=it.quality||0;
  // 基础属性加权（攻击最重要，防御/生命次之，百分比属性按等效值）
  if(s.atk)p+=s.atk*5;
  if(s.def)p+=s.def*3;
  if(s.hp)p+=s.hp*0.8;
  if(s.critRate)p+=s.critRate*8;          // 1%暴击 ≈ 8战力
  if(s.critDmg)p+=Math.max(0,s.critDmg-150)*0.6; // 超出基础150%的部分
  if(s.atkSpd)p+=s.atkSpd*0.5;            // 1点攻速 ≈ 0.5战力
  if(s.block)p+=s.block*6;                // 1%格挡 ≈ 6战力
  if(s.dodge)p+=s.dodge*6;                // 1%闪避 ≈ 6战力
  // 特殊属性按实际效果加权
  if(s.lifesteal)p+=s.lifesteal*8;        // 1%吸血 ≈ 8战力
  if(s.thorns)p+=s.thorns*6;              // 1%荆棘 ≈ 6战力
  if(s.magicFind)p+=s.magicFind*3;        // 1%寻宝 ≈ 3战力
  if(s.expBonus)p+=s.expBonus*2;          // 1%经验 ≈ 2战力
  if(s.goldBonus)p+=s.goldBonus*2;        // 1%金币 ≈ 2战力
  if(s.hpRegen)p+=s.hpRegen*3;            // 1点恢复 ≈ 3战力
  if(s.doubleAtk)p+=s.doubleAtk*10;       // 1%连击 ≈ 10战力（输出翻倍潜力）
  if(s.armorPierce)p+=s.armorPierce*7;    // 1%破甲 ≈ 7战力
  if(s.critBonus)p+=s.critBonus*7;        // 1%额外暴伤 ≈ 7战力
  if(s.siphon)p+=s.siphon*5;              // 1%汲魂 ≈ 5战力
  // 品质系数：高品质装备基础价值更高
  const qMult=1+(q-0)*0.08;               // 白板1.0 → 超神级1.64
  // 等级系数：高等级装备更稀有
  const lvMult=1+((it.reqLv||1)-1)*0.005; // 100级+50%，300级+150%
  p=Math.floor(p*qMult*lvMult);
  return Math.max(1,p);
}

  else if(slot==='ring1'||slot==='ring2'){s.atk=randi(1,4)*mm;statRanges.atk={min:Math.floor(1*mm),max:Math.floor(4*mm)};s.critRate=randf(0.5,2)*mm;statRanges.critRate={min:Math.round(0.5*mm*10)/10,max:Math.round(2*mm*10)/10};}
  else if(slot==='pendant'){s.atk=randi(1,5)*mm;statRanges.atk={min:Math.floor(1*mm),max:Math.floor(5*mm)};s.hp=randi(5,20)*mm;statRanges.hp={min:Math.floor(5*mm),max:Math.floor(20*mm)};s.def=randi(1,3)*mm;statRanges.def={min:Math.floor(1*mm),max:Math.floor(3*mm)};}
  else if(slot==='cloak'){s.hp=randi(3,12)*mm;statRanges.hp={min:Math.floor(3*mm),max:Math.floor(12*mm)};s.dodge=randf(1,4)*mm;statRanges.dodge={min:Math.round(1*mm*10)/10,max:Math.round(4*mm*10)/10};}
  // round all basic stats

// Monster generation — random from map pool, with elite/boss chance
function genMonster(){
  const m=MAPS.find(x=>x.id===G.curMap)||MAPS[0];
  // Roll for monster type: 80% normal, 15% elite, 5% boss
  const roll=Math.random();
  let template,type='normal';
  if(roll<0.05&&m.boss){template=m.boss;type='boss';}
  else if(roll<0.20&&m.elite){template=m.elite;type='elite';}
  else{template=pick(m.monsters);}
  // Monster level: 人物等级 ±3 波动，受地图上下限约束
  const mapMaxLv = m.maxLv || m.lv + 10;
  const mapMinLv = m.lv;
  const minLv = Math.max(mapMinLv, G.level - 3);
  const maxLv = Math.min(mapMaxLv, G.level + 3);
  const monLv = randi(Math.max(minLv, 1), Math.max(maxLv, 1));
  // Monster level actually matters now: 6%/lv stat scaling + 4%/lv reward scaling
  const typeMult=type==='boss'?5:type==='elite'?2.5:1;
  const diffMult=G.level>=10?1.2:1;
  const lvDiff=monLv-m.lv;
  const lvScale=Math.max(0.3, 1+lvDiff*0.06);
  const rewardScale=Math.max(0.5, 1+lvDiff*0.04);
  const STAT_BOOST=type==='boss'?1.56:type==='elite'?1.56:1.2;
  // 新手村以外地图，普通怪×2、精英×1.5、Boss×2
  const mapMult=(m.id==='village')?1:(type==='boss'?4:type==='elite'?2.5:1.5);
  const mName=type==='boss'?template.name:(type==='elite'?'精英·'+template.name:template.name);
  const mIcon=template.icon;
  const hp=Math.floor(template.hp*typeMult*diffMult*lvScale*STAT_BOOST*mapMult);
  const atk=Math.floor(template.atk*typeMult*diffMult*lvScale*STAT_BOOST*mapMult);
  const def=Math.floor(template.def*typeMult*diffMult*lvScale*STAT_BOOST*mapMult);
  const xp=Math.floor(template.xp*typeMult*rewardScale);const gold=Math.floor(template.gold*typeMult*rewardScale);
  const dropQ=[template.dropQ[0],Math.min(8,template.dropQ[1]+(type==='boss'?1:0))];

  const enemy={name:mName,icon:mIcon,type,level:monLv,hp,maxHp:hp,atk,def,xp,gold,dropQ,originalName:template.name,specials:[],skill:null,skillLastUsed:0,dotDmg:0,dotUntil:0};

  // Elite/Boss get special attributes
  if(type==='elite'){
    const sp=pick(ENEMY_SPECIALS);
    enemy.specials.push({...sp});
    if(sp.apply)sp.apply(enemy);
    if(sp.isRegen)enemy._regen=sp.regenPct;
    if(sp.dodge)enemy._dodge=sp.dodge;
    if(sp.thorns)enemy._thorns=sp.thorns;
    if(sp.lifesteal)enemy._lifesteal=sp.lifesteal;
    if(sp.dmgReduce)enemy._dmgReduce=sp.dmgReduce;
    if(sp.critReduce)enemy._critReduce=sp.critReduce;
    if(sp.atkSpdReduce)enemy._atkSpdReduce=sp.atkSpdReduce;
  }
  if(type==='boss'){
    const shuffled=[...ENEMY_SPECIALS].sort(()=>Math.random()-0.5);
    for(let i=0;i<2;i++){
      const sp=shuffled[i];
      enemy.specials.push({...sp});
      if(sp.apply)sp.apply(enemy);
      if(sp.isRegen)enemy._regen=(enemy._regen||0)+sp.regenPct;
      if(sp.dodge)enemy._dodge=(enemy._dodge||0)+sp.dodge;
      if(sp.thorns)enemy._thorns=(enemy._thorns||0)+sp.thorns;
      if(sp.lifesteal)enemy._lifesteal=(enemy._lifesteal||0)+sp.lifesteal;
      if(sp.dmgReduce)enemy._dmgReduce=Math.max(enemy._dmgReduce||0,sp.dmgReduce);
      if(sp.critReduce)enemy._critReduce=Math.max(enemy._critReduce||0,sp.critReduce);
      if(sp.atkSpdReduce)enemy._atkSpdReduce=Math.max(enemy._atkSpdReduce||0,sp.atkSpdReduce);
    }
    // Boss gets one skill
    enemy.skill={...pick(ENEMY_SKILLS)};
  }
  return enemy;
}
function canUseSkill(s){return !s.lastUsed||(now()-s.lastUsed>=s.cdMs);}

function addLog(msg,cls=''){G.logs.unshift({msg,cls,time:new Date().toLocaleTimeString()});if(G.logs.length>G.maxLogs)G.logs.pop();}
function gainXp(amt){
  if(!G.enemy)return;
  // XP penalty if enemy level is lower than player level
  const eLv=G.enemy.level||1;const pLv=G.level;
  let lvMult=1;
  if(eLv<pLv){lvMult=Math.max(0.1,1-(pLv-eLv)*0.15);}
  const bonus=1+G.curExpBonus/100;
  if(G.level<300){G.xp+=Math.floor(amt*bonus*lvMult);while(G.xp>=xpForLevel(G.level)&&G.level<300){G.xp-=xpForLevel(G.level);levelUp();}}
}
function gainGold(amt){const bonus=1+G.curGoldBonus/100;const actualAmt=Math.floor(amt*bonus);G.gold+=actualAmt;
  // 更新收集金币类型任务的累计进度
  for(const q of G.quests){if(!q.submitted&&q.type==='collect_gold')q._goldCollected=(q._goldCollected||0)+actualAmt;}
  checkQuests();}
function levelUp(){
  G.level++;
  // Auto-allocate 5 stat points based on class
  const growth=CLASS_GROWTH[G.classId];
  G.str+=growth.str;G.vit+=growth.vit;G.agi+=growth.agi;G.dex+=growth.dex;G.int+=growth.int;
  if(G.level===10){
    const sk2=SKILLS[G.classId].find(sk=>sk.unlockLv===10);
    if(sk2){
      G.skill2={...sk2,lastUsed:0,gradeIdx:0,grade:'D',xp:0};
      G.skills.push({...sk2,lastUsed:0,gradeIdx:0,grade:'D',xp:0});
      addLog(`📖 学会新技能：${G.skill2.name}`,'sys');refreshSkillBtns();
    }
  }
  const adv=CLASS_ADV.find(a=>a.lv===G.level);
  if(adv){const opts=adv[G.classId];if(opts&&opts.length>0)showAdvModal(opts);}
  addLog(`🎉 升级！达到 Lv.${G.level}，属性自动分配`,'sys');
  computeStats();G.hp=G.maxHp;renderAll();
}
function doAdvance(opt){
  G.classStatsAdv=G.classStatsAdv||{};
  for(const k in opt.bonus){G.classStatsAdv[k]=(G.classStatsAdv[k]||0)+opt.bonus[k];}
  G.className=opt.name;G.classIcon=opt.icon;
  G.classAdvId=opt.id; // 记录转职ID
  if(G.level>=150)G.classTier=2;else G.classTier=1;
  // 解锁转职专属技能
  const advSkills=ADV_SKILLS[opt.id]||[];
  for(const sk of advSkills){
    if(!G.skills.find(s=>s.id===sk.id)){
      G.skills.push({...sk,lastUsed:0,gradeIdx:0,grade:'D',xp:0});
      addLog(`📖 转职解锁：【${sk.name}】！`,'sys');
    }
  }
  addLog(`🌟 转职成功！成为${opt.name}`,'sys');
  closeModal();computeStats();renderAll();
}
function playerAttack(useSkill){
  if(!G.enemy||G.dead)return;
  // 战斗动画：人物攻击
  battleAnimPlayer();
  // enemy dodge check
  const e=G.enemy;
  if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了你的攻击！`,'sys');enemyAttack();renderAll();return;}
  const sk=useSkill?G.skills.find(s=>canUseSkill(s)):null;
  if(useSkill&&!sk){addLog('⏳ 技能冷却中...','sys');return;}
  let dmg,isCrit=false;
  if(sk){
    dmg=Math.floor(G.curAtk*sk.mult);
    let defReduction=0.3;
    if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)defReduction=0.1;
    if(sk.ignoreDef===1)dmg=Math.max(1,dmg); // 完全无视防御
    else if(sk.ignoreDef)dmg=Math.floor(dmg*(1-sk.ignoreDef)); // 部分无视防御
    else dmg=Math.max(1,dmg-Math.floor(G.enemy.def*defReduction));
    if(sk.hits){let td=0;for(let i=0;i<sk.hits;i++){const sub=Math.floor(G.curAtk*sk.mult);td+=Math.max(1,sub-Math.floor(G.enemy.def*defReduction));}dmg=td;}
    sk.lastUsed=now();
    // 技能经验
    if(sk.gradeIdx<4){
      sk.xp=(sk.xp||0)+randi(0,1);
      const nextXp=skillXpForGrade(sk.gradeIdx+1);
      if(sk.xp>=nextXp){
        sk.xp-=nextXp;
        sk.gradeIdx++;
        sk.grade=SKILL_GRADES[sk.gradeIdx];
        addLog(`⭐ ${sk.name} 升级为 <span style="color:${SKILL_GRADE_COLOR[sk.grade]}">${sk.grade}级</span>！`,'skill');
      }
    }
    if(sk.type==='buff'){
      const grade=sk.grade||'D';const gradeMult=SKILL_GRADE_MULT[grade]||1.0;
      // 根据技能id设置对应buff，效果随等级提高
      applySkillBuff(sk,gradeMult);
      addLog(`✨ ${sk.icon} 使用 ${sk.name}（${grade}级·效果×${gradeMult}）！`,'skill');
      computeStats();renderAll();return;
    }
    addLog(`✨ ${sk.icon} ${sk.name}！造成 ${dmg} 点伤害`,'skill');
    // 敌人弱化减伤（技能）
    if(e._dmgReduce){dmg=Math.floor(dmg*(1-e._dmgReduce));addLog(`🔻 ${e.name}的弱化使你伤害降低${Math.round(e._dmgReduce*100)}%`,'sys');}
  }else{
    // 敌人减益效果
    let critChance=G.curCritRate;
    if(e._critReduce)critChance=Math.max(0,critChance-e._critReduce);
    isCrit=Math.random()*100<critChance;
    dmg=Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5));
    if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)dmg=Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.1));
    if(isCrit){dmg=Math.floor(dmg*G.curCritDmg/100);addLog(`💥 暴击！造成 ${dmg} 点伤害`,'crit');}
    else addLog(`⚔️ 普通攻击造成 ${dmg} 点伤害`,'hit');
    // 敌人弱化减伤
    if(e._dmgReduce){dmg=Math.floor(dmg*(1-e._dmgReduce));addLog(`🔻 ${e.name}的弱化使你伤害降低${Math.round(e._dmgReduce*100)}%`,'sys');}
    // double attack
    if(G.curDoubleAtk&&Math.random()*100<G.curDoubleAtk){
      // 连击单独检查敌人闪避
      if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了连击！`,'sys');}
      else{
        const d2=isCrit?Math.floor((Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5)))*G.curCritDmg/100):Math.max(1,G.curAtk-Math.floor(G.enemy.def*0.5));
        G.enemy.hp-=d2;addLog(`🔁 连击！追加 ${d2} 点伤害`,'skill');
        // 连击触发吸血
        if(G.curLifesteal&&d2>0){const heal2=Math.floor(d2*G.curLifesteal/100);if(heal2>0){G.hp=Math.min(G.maxHp,G.hp+heal2);}}
        // 连击触发敌人荆棘
        if(G.enemy&&G.enemy._thorns&&d2>0){const etDmg2=Math.floor(d2*G.enemy._thorns/100);G.hp-=etDmg2;if(G.hp<=0){G.hp=0;playerDie('💀 被荆棘反弹致死！');}}
        if(G.enemy&&G.enemy.hp<=0){onKill();return;}
      }
    }
  }
  // lifesteal
  if(G.curLifesteal&&dmg>0){const heal=Math.floor(dmg*G.curLifesteal/100);if(heal>0){G.hp=Math.min(G.maxHp,G.hp+heal);} }
  G.enemy.hp-=dmg;
  // Enemy thorns (reflect damage back to player)
  if(G.enemy&&G.enemy._thorns&&dmg>0){const etDmg=Math.floor(dmg*G.enemy._thorns/100);G.hp-=etDmg;if(G.hp>0)addLog(`🌵 ${G.enemy.name}的荆棘反弹 ${etDmg} 点伤害`,'hit');if(G.hp<=0){G.hp=0;playerDie('💀 被荆棘反弹致死！5秒后复活...');}}
  if(G.enemy&&G.enemy.hp<=0){onKill();return;}
  enemyAttack();renderAll();
}
// 使用指定技能攻击（skill2专用），复用playerAttack核心逻辑
function playerAttackWithSkill(sk){
  if(!G.enemy||G.dead)return;
  const e=G.enemy;
  if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了你的攻击！`,'sys');enemyAttack();renderAll();return;}
  let dmg=Math.floor(G.curAtk*sk.mult);
  let defReduction=0.3;
  if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)defReduction=0.1;
  if(sk.ignoreDef===1)dmg=Math.max(1,dmg);
  else if(sk.ignoreDef)dmg=Math.floor(dmg*(1-sk.ignoreDef));
  else dmg=Math.max(1,dmg-Math.floor(G.enemy.def*defReduction));
  if(sk.hits){let td=0;for(let i=0;i<sk.hits;i++){const sub=Math.floor(G.curAtk*sk.mult);td+=Math.max(1,sub-Math.floor(G.enemy.def*defReduction));}dmg=td;}
  sk.lastUsed=now();
  // 技能经验（使用一次+1~3，缓慢升级）
  if(sk.gradeIdx<4){
    sk.xp=(sk.xp||0)+randi(0,1);
    const nextXp=skillXpForGrade(sk.gradeIdx+1);
    if(sk.xp>=nextXp){
      sk.xp-=nextXp;
      sk.gradeIdx++;
      sk.grade=SKILL_GRADES[sk.gradeIdx];
      addLog(`⭐ ${sk.name} 升级为 <span style="color:${SKILL_GRADE_COLOR[sk.grade]}">${sk.grade}级</span>！`,'skill');
    }
  }
  if(sk.type==='buff'){
    const grade=sk.grade||'D';const gradeMult=SKILL_GRADE_MULT[grade]||1.0;
    applySkillBuff(sk,gradeMult);
    addLog(`✨ ${sk.icon} 使用 ${sk.name}（${grade}级·效果×${gradeMult}）！`,'skill');
    computeStats();renderAll();return;
  }
  addLog(`📖 ${sk.icon} ${sk.name}！造成 ${dmg} 点伤害`,'skill');
  // 敌人弱化减伤（skill2）
  if(e._dmgReduce){dmg=Math.floor(dmg*(1-e._dmgReduce));addLog(`🔻 ${e.name}的弱化使你伤害降低${Math.round(e._dmgReduce*100)}%`,'sys');}
  // lifesteal
  if(G.curLifesteal&&dmg>0){const heal=Math.floor(dmg*G.curLifesteal/100);if(heal>0){G.hp=Math.min(G.maxHp,G.hp+heal);}}
  G.enemy.hp-=dmg;
  // Enemy thorns
  if(G.enemy&&G.enemy._thorns&&dmg>0){const etDmg=Math.floor(dmg*G.enemy._thorns/100);G.hp-=etDmg;if(G.hp>0)addLog(`🌵 ${G.enemy.name}的荆棘反弹 ${etDmg} 点伤害`,'hit');if(G.hp<=0){G.hp=0;playerDie('💀 被荆棘反弹致死！5秒后复活...');}}
  if(G.enemy&&G.enemy.hp<=0){onKill();return;}
  // double attack
  if(G.curDoubleAtk&&Math.random()*100<G.curDoubleAtk){
    if(e._dodge&&Math.random()*100<e._dodge){addLog(`🌀 ${e.name} 闪避了连击！`,'sys');}
    else{
      // 连击重新计算伤害（考虑防御与破甲）
      let dr=0.3;
      if(G.curArmorPierce&&Math.random()*100<G.curArmorPierce*0.5)dr=0.1;
      let d2=sk.ignoreDef===1?Math.max(1,Math.floor(G.curAtk*sk.mult)):
        sk.ignoreDef?Math.floor(G.curAtk*sk.mult*(1-sk.ignoreDef)):
        Math.max(1,Math.floor(G.curAtk*sk.mult)-Math.floor(G.enemy.def*dr));
      if(sk.hits){let td=0;for(let i=0;i<sk.hits;i++){const sub=Math.floor(G.curAtk*sk.mult);td+=Math.max(1,sub-Math.floor(G.enemy.def*dr));}d2=td;}
      // 连击也能暴击
      if(G.curCritRate&&Math.random()*100<G.curCritRate){d2=Math.floor(d2*G.curCritDmg/100);addLog(`💥 连击暴击！追加 ${d2} 点伤害`,'crit');}
      else{addLog(`🔁 连击！追加 ${d2} 点伤害`,'skill');}
      G.enemy.hp-=d2;
      if(G.curLifesteal&&d2>0){const heal2=Math.floor(d2*G.curLifesteal/100);if(heal2>0){G.hp=Math.min(G.maxHp,G.hp+heal2);}}
      if(G.enemy&&G.enemy._thorns&&d2>0){const etDmg2=Math.floor(d2*G.enemy._thorns/100);G.hp-=etDmg2;if(G.hp<=0){G.hp=0;playerDie('💀 被荆棘反弹致死！');}}
      if(G.enemy&&G.enemy.hp<=0){onKill();return;}
    }
  }
  enemyAttack();renderAll();
}
function enemyAttack(){
  // 战斗动画：敌人攻击
  battleAnimEnemy();
  const e=G.enemy;if(!e)return;
  // Enemy boss skill usage
  let useEnemySkill=false,enemySkillDmg=0,enemySkillName='';
  if(e.skill&&(!e.skillLastUsed||now()-e.skillLastUsed>=e.skill.cdMs)){
    e.skillLastUsed=now();useEnemySkill=true;enemySkillName=e.skill.name;
    enemySkillDmg=Math.floor(e.atk*e.skill.mult);
    if(e.skill.ignoreDef)enemySkillDmg=Math.max(1,enemySkillDmg);
    else enemySkillDmg=Math.max(1,enemySkillDmg-Math.floor(G.curDef*0.3));
    if(e.skill.dotDmg&&e.skill.dotDur){
      G.buffs.dot={dmg:Math.floor(G.maxHp*e.skill.dotDmg),until:now()+e.skill.dotDur*1000,icon:'☠️'};
    }
    if(e.skill.slow&&e.skill.slowDur){
      G.buffs.slow={slow:e.skill.slow,until:now()+e.skill.slowDur*1000,icon:'❄️'};
    }
  }
  // player dodge/block
  if(!useEnemySkill&&G.curDodge&&Math.random()*100<G.curDodge){addLog(`🌀 闪避！躲过了${e.name}的攻击`,'sys');return;}
  if(!useEnemySkill&&G.curBlock&&Math.random()*100<G.curBlock){addLog(`🛡️ 格挡！${e.name}的攻击被格挡`,'sys');return;}
  const dmg=useEnemySkill?enemySkillDmg:Math.max(1,e.atk-Math.floor(G.curDef*0.3));
  // slow debuff
  if(useEnemySkill&&e.skill&&e.skill.slow)G._slowUntil=now()+e.skill.slowDur*1000;
  G.hp-=dmg;
  if(useEnemySkill)addLog(`${e.icon} ${e.name} 使用 ${e.skill.icon}${enemySkillName}！造成 ${dmg} 点伤害`,'boss');
  else addLog(`${e.icon} ${e.name} 对你造成 ${dmg} 点伤害`,'hit');
  // enemy lifesteal
  if(e._lifesteal&&G.enemy){const eh=Math.floor(dmg*e._lifesteal/100);e.hp=Math.min(e.maxHp,e.hp+eh);}
  // thorns
  if(G.curThorns&&G.enemy){const tDmg=Math.floor(dmg*G.curThorns/100);G.enemy.hp-=tDmg;if(G.enemy.hp<=0){addLog(`🛡️ 荆棘反弹！击杀 ${e.name}`,'die');onKill();return;}addLog(`⚡ 荆棘反弹 ${tDmg} 点伤害`,'skill');}

  if(G.hp<=0){
    G.hp=0;playerDie('💀 你被击败了！5秒后复活...');
  }
}
function onKill(){
  const e=G.enemy;addLog(`🎉 击杀 ${e.name}！获得 ${e.xp} 经验、${e.gold} 金币`,'die');
  G.killStreak++;
  G.kills[e.originalName||e.name]=(G.kills[e.originalName||e.name]||0)+1;G.killAnyCount++;
  gainXp(e.xp);gainGold(e.gold);
  if(G.curSiphon)G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*G.curSiphon/100));
  // 装备掉落 — 按怪物类型区分基础概率（已下调）
  const monLv=G.enemy.level||1;
  const typeBase=G.enemy.type==='boss'?0.12:G.enemy.type==='elite'?0.07:0.02;
  const lvBonus=Math.min(G.level/600,0.03);
  const mfBonus=G.enemy.type==='boss'?G.curMagicFind/300:(G.enemy.type==='elite'?G.curMagicFind/300:G.curMagicFind/600);
  const dropRate=Math.min(typeBase+lvBonus+mfBonus,0.35);
  if(Math.random()<dropRate){
    const slot=pick(Object.keys(EQ_NAMES));
    const dropMonLv=e.level||1;
    const it=genEquip(slot,e.dropQ[0],e.dropQ[1],dropMonLv);
    const nonClass=G.decomposeNonClass&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    if(nonClass||(G.autoDecompose&&it.quality<=G.decomposeThreshold)){
      const goldGot=decomposeItem(it);
      G.gold+=goldGot;
      addLog(`⚡ 自动分解：${it.name} → 💰${fmt(goldGot)} 金币`,'drop');
    }else{
      if(G.inventory.length<G.maxInv){G.inventory.push(it);addLog(`🎁 掉落：${it.name}`,'drop');autoEquipCheck(it);}
      else addLog('⚠️ 背包已满，装备丢失！','sys');
    }
  }
  // 技能书掉落：10级后怪物可掉落，普通1%/精英5%/Boss10%，随机种类
  if(monLv>=10){
    const bookRate = G.enemy.type==='boss'?0.05:G.enemy.type==='elite'?0.025:0.005;
    if(Math.random()<bookRate){
      // 随机所有职业的技能书
      const allClasses=['warrior','archer','mage'];
      const allBooks=[];
      for(const cls of allClasses){
        const clsSkills=SKILLS[cls];
        for(const s of clsSkills){
          if(!s.advReq){ // 排除转职专属技能
            allBooks.push({...s,classReq:cls});
          }
        }
      }
      if(allBooks.length>0){
        const sb=pick(allBooks);
        const sbit={type:'skillBook',skillId:sb.id,name:sb.name,icon:sb.icon,desc:sb.desc,classReq:sb.classReq,reqLv:10};
        G.skillBooks.push(sbit);
        addLog(`📖 掉落技能书：【${sb.name}】已放入背包`,'drop');
      }
    }
  }
  // 材料掉落
  for(const[mid,mdef] of Object.entries(MATERIALS)){
    const typeMatch=mdef.dropSources.includes(G.enemy.type);
    if(typeMatch&&Math.random()<mdef.dropRate){
      const dropAmt=randi(1,mid==='dragonScale'?1:3);
      G.materials[mid]=(G.materials[mid]||0)+dropAmt;
      addLog(`📦 掉落材料：${mdef.icon}${mdef.name}×${dropAmt} (共${G.materials[mid]})`,'drop');
    }
  }
  // 怪物死亡后3秒刷新
  G._nextMonsterTime=now()+3000;
  G.enemy=null;
  checkQuests();renderAll();
}
function autoEquipCheck(it){
  if(!G.autoEquip)return;
  if(it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId)return;
  if(it.reqLv&&G.level<it.reqLv)return;
  const cur=G.equipped[it.slot];if(!cur||(it.power||0)>(cur.power||0)){G.equipped[it.slot]=it;G.inventory.splice(G.inventory.indexOf(it),1);addLog(`🔄 自动装备：${it.name}`,'sys');computeStats();}
}
function changeMap(mapId){
  const m=MAPS.find(x=>x.id===mapId);if(!m||m.lv>G.level)return;
  // 地图切换过渡特效
  const flash=document.getElementById('map-flash');
  flash.innerHTML=`<div class="flash-text">${m.icon}</div>`;
  flash.classList.add('show');
  setTimeout(()=>{
    flash.classList.remove('show');
    G.curMap=mapId;G.enemy=genMonster();G.hp=G.maxHp;addLog(`🗺️ 进入：${m.name}`,'sys');
    // 切换地图时刷新任务（不计CD）
    G.quests=[];for(let i=0;i<3;i++){const t=pick(QUEST_TEMPLATES);G.quests.push(t.gen(G));}
    addLog('📋 任务已更新','sys');
    closeModal();
    renderAll();
  },200);
}

// quests
function refreshQuests(){
  G.quests=[];for(let i=0;i<3;i++){const t=pick(QUEST_TEMPLATES);G.quests.push(t.gen(G));}
  G.questRefreshTime=now();addLog('📋 任务已刷新','sys');
}
function checkQuests(){
  // 仅更新任务进度，不自动完成
  for(const q of G.quests){
    if(q.submitted)continue;
    if(q.type==='kill'){q.progress=(G.curMap===q.mapId)?Math.min(Math.max(0,(G.kills[q.monster]||0)-(q._startCount||0)),q.target):q.progress;}
    else if(q.type==='kill_any'){q.progress=Math.min(Math.max(0,(G.killAnyCount||0)-(q._startCount||0)),q.target);}
    else if(q.type==='collect_gold'){q.progress=Math.min(q._goldCollected||0,q.target);}
    else if(q.type==='collect_material'){const delta=Math.max(0,(G.materials[q.materialId]||0)-(q._startMatCount||0));q.progress=Math.max(q.progress,Math.min(delta,q.target));}
    else if(q.type==='use_consumable'){q.progress=Math.min(Math.max(0,(G._consumableUseHistory?.[q.itemId]||0)-(q._startCount||0)),q.target);}
    else if(q.type==='enhance_count'){q.progress=Math.min(Math.max(0,(G.enhanceTotal||0)-(q._startCount||0)),q.target);}
  }
}

function submitQuest(qIndex){
  const q=G.quests[qIndex];if(!q||q.submitted||q.progress<q.target)return;
  // 收集类任务：提交时消耗对应资源
  if(q.type==='collect_material'){
    if((G.materials[q.materialId]||0)>=q.target){
      G.materials[q.materialId]-=q.target;
    }else{addLog('⚠️ 材料不足，无法提交任务','sys');return;}
  }
  if(q.type==='collect_gold'){
    if(G.gold>=q.target){
      G.gold-=q.target;
    }else{addLog(`⚠️ 金币不足（需要${fmt(q.target)}，当前${fmt(G.gold)}），无法提交任务`,'sys');return;}
  }
  q.submitted=true;
  // 发放奖励
  if(q.reward.gold)G.gold+=q.reward.gold;
  if(q.reward.diamond)G.diamond+=q.reward.diamond;
  if(q.reward.xp && G.level<300){G.xp+=q.reward.xp;while(G.xp>=xpForLevel(G.level)&&G.level<300){G.xp-=xpForLevel(G.level);levelUp();}}
  if(q.reward.equipQ!==undefined){const slot=pick(Object.keys(EQ_NAMES));const it=genEquip(slot,q.reward.equipQ,Math.min(8,q.reward.equipQ+2),G.level);if(G.inventory.length<G.maxInv)G.inventory.push(it);else addLog('⚠️ 背包已满，装备奖励丢失','sys');}
  if(q.reward.potion){const key=q.reward.potion;G.consumables[key]=(G.consumables[key]||0)+q.reward.potionCount;}
  if(q.reward.material){const mk=q.reward.material;G.materials[mk]=(G.materials[mk]||0)+q.reward.materialCount;}
  const rewardText=[];
  if(q.reward.gold)rewardText.push('💰'+fmt(q.reward.gold));
  if(q.reward.diamond)rewardText.push('💎'+q.reward.diamond);
  if(q.reward.xp)rewardText.push('✨'+fmt(q.reward.xp)+'XP');
  if(q.reward.equipQ!==undefined)rewardText.push('🎁'+QUALITY[q.reward.equipQ]+'+装备');
  if(q.reward.potion){const pn={hpPotion:'🧪小血瓶',hpLarge:'💉大血瓶',atkScroll:'📜攻击卷轴',defScroll:'🛡️防御卷轴',hpScroll:'❤️生命卷轴'};rewardText.push(pn[q.reward.potion]+'×'+q.reward.potionCount);}
  if(q.reward.material){const md=MATERIALS[q.reward.material];rewardText.push(md.icon+md.name+'×'+q.reward.materialCount);}
  addLog(`✅ 任务完成：【${q.text}】获得 ${rewardText.join(' ')}`,'quest');
  // 替换已完成任务
  replaceQuest(qIndex);
  computeStats();renderAll();
}

function replaceQuest(qIndex){
  G.quests.splice(qIndex,1);
  const t=pick(QUEST_TEMPLATES);G.quests.push(t.gen(G));
}

function renderAll(){

  renderBuffBar();refreshConsumableBtns();
  document.getElementById('cur-map-name').textContent=(MAPS.find(m=>m.id===G.curMap)||MAPS[0]).name;
}
function renderTopBar(){
  const clsNames={warrior:'战士',archer:'射手',mage:'法师'};
  document.getElementById('top-lv').textContent=G.level;
  document.getElementById('top-class').textContent=G.className||clsNames[G.classId]+'学徒';
  // 装备战力合计（含强化）
  let eqPower=0;
  for(const k in G.equipped){
    const it=G.equipped[k];if(!it)continue;
    eqPower+=it.power||0;
    eqPower+=getEnhancePower(k);
  }
  document.getElementById('top-eq-power').textContent='⚡'+fmt(eqPower);
  document.getElementById('top-atk').textContent=fmt(G.curAtk);
  document.getElementById('top-def').textContent=fmt(G.curDef);
  document.getElementById('top-hp').textContent=fmt(G.hp)+'/'+fmt(G.maxHp);
  document.getElementById('top-power').textContent=fmt(getTotalPower());
  document.getElementById('top-gold').textContent=fmt(G.gold);
  document.getElementById('top-diamond').textContent=fmt(G.diamond);
  const need=xpForLevel(G.level);const pct=Math.min(100,Math.floor(G.xp/need*100));
  document.getElementById('xp-text').textContent=fmt(G.xp)+'/'+fmt(need);
  document.getElementById('xp-bar-inner').style.width=pct+'%';
  document.getElementById('char-name').textContent=(G.className||clsNames[G.classId]+'学徒')+(G.switchCount>0?` #${G.switchCount+1}`:'');
  // 转职按钮：到达进阶等级但该阶未选择时显示
  const advBtn=document.getElementById('btn-advance');
  if(advBtn){
    let show=false;
    // 一转：classTier===0 且 >=50级 且未选
    if(G.classTier===0&&G.level>=50&&!G.classAdvId)show=true;
    // 二转：classTier===1 且 >=150级（classAdvId可能还是50级进阶的id，仍可触发150级弹窗）
    if(G.classTier===1&&G.level>=150){
      const adv150=CLASS_ADV.find(a=>a.lv===150);
      const opts150=adv150?adv150[G.classId]:null;
      // 如果150级选项存在且classAdvId不是150级的（说明还没选二转）
      if(opts150&&!opts150.some(o=>o.id===G.classAdvId))show=true;
    }
    advBtn.style.display=show?'inline-block':'none';
  }
  const icons={warrior:'⚔️',archer:'🏹',mage:'🧙'};
  document.getElementById('class-icon').textContent=G.classIcon||icons[G.classId]||'⚔️';
  const di=document.getElementById('death-indicator');if(di)di.style.display=G.dead?'inline':'none';
  document.getElementById('free-pts-badge').textContent='';
}
function getTotalPower(){
  let p=G.curAtk*5+G.curDef*3+G.maxHp*0.8+G.curCritRate*8+G.curDodge*6+G.curBlock*6+G.curLifesteal*8+G.curDoubleAtk*10;
  // 加上装备基础战力
  for(const k in G.equipped){const it=G.equipped[k];if(it)p+=(it.power||0);}
  return Math.floor(p);
}

function decomposeItem(it){
  // 分解装备获得金币（品质越高越多）
  const baseGold={0:3,1:8,2:20,3:50,4:120,5:300,6:800,7:2000,8:5000}[it.quality]||3;
  const extra=Math.floor(it.power*1.5);
  return baseGold+extra;
}
function doDecompose(threshold,nonClassOnly){
  let decomposed=0,totalGold=0;
  for(let i=G.inventory.length-1;i>=0;i--){
    const it=G.inventory[i];
    const matchQuality=it.quality<=threshold;
    const matchNonClass=nonClassOnly&&it.classReq&&it.classReq!=='all'&&it.classReq!==G.classId;
    // 勾选非本职业时：同时检查品质和职业
    // 只勾选品质时：只检查品质
    const shouldDecompose = nonClassOnly ? (matchQuality||matchNonClass) : matchQuality;
    if(shouldDecompose){
      totalGold+=decomposeItem(it);
      G.inventory.splice(i,1);
      decomposed++;
    }
  }
  if(decomposed>0){
    G.gold+=totalGold;
    addLog(`⚡ 一键分解 ${decomposed} 件装备，获得 💰${fmt(totalGold)} 金币`,'sys');
  }else{
    addLog('⚡ 没有符合条件的装备可分解','sys');
  }
  document.getElementById('decompose-panel').style.display='none';
  renderAll();
}
function toggleDecomposePanel(){
  const p=document.getElementById('decompose-panel');
  const isHidden=window.getComputedStyle(p).display==='none';
  p.style.display=isHidden?'flex':'none';
  if(p.style.display==='flex'){
    const dq=document.getElementById('decompose-quality');if(dq)dq.value=G.decomposeThreshold;
    const acb=document.getElementById('auto-decompose');if(acb)acb.checked=G.autoDecompose;
    const dnc=document.getElementById('decompose-nonclass');if(dnc)dnc.checked=G.decomposeNonClass;
  }
}

      const q=rollWeightedQ(md.use.equipMinQ,8);const slot=pick(Object.keys(EQ_NAMES));

function buildSkillItem(sk){
  const cdLeft=sk.lastUsed?Math.max(0,sk.cdMs-(now()-sk.lastUsed)):0;const ready=cdLeft===0;

  const xpPct=gradeIdx<4?Math.min(100,Math.floor((sk.xp||0)/nextXp*100)):100;
  const typeTag=sk.skillType==='passive'?'<span style="font-size:8px;background:#374151;color:#9ca3af;padding:1px 3px;border-radius:3px;margin-left:4px">被动</span>':'<span style="font-size:8px;background:#1e3a5f;color:#60a5fa;padding:1px 3px;border-radius:3px;margin-left:4px">主动</span>';
  const div=document.createElement('div');div.className='skill-item';
  div.innerHTML=`<div class="skill-icon">${sk.icon}</div><div class="skill-info"><div class="skill-name">${sk.name}${typeTag} <span style="font-size:9px;color:${gradeColor};font-weight:bold">${grade}</span></div><div class="skill-desc">${sk.desc}${gradeIdx<4?` · 升级进度 ${sk.xp||0}/${nextXp} (${xpPct}%)`:''}</div></div><div class="skill-cd">${ready?'就绪':(cdLeft/1000).toFixed(1)+'s'}</div>`;
  return div;

function refreshSkillBtns(){
  const container=document.getElementById('skill-btns');
  if(!container)return;
  // 保留攻击按钮
  const attackBtn=document.getElementById('btn-attack');
  // 清除除攻击按钮外的所有技能按钮
  container.querySelectorAll('.skill-dyn-btn').forEach(b=>b.remove());
  // 过滤主动技能
  const activeSkills=G.skills.filter(s=>s.skillType==='active');
  // 同时也添加 skill2
  if(G.skill2&&G.skill2.skillType==='active')activeSkills.push(G.skill2);
  // 按 id 去重
  const seen=new Set();const uniqueSkills=[];
  for(const sk of activeSkills){
    if(!seen.has(sk.id)){seen.add(sk.id);uniqueSkills.push(sk);}
  }
  for(const sk of uniqueSkills){
    const cdLeft=sk.lastUsed?Math.max(0,sk.cdMs-(now()-sk.lastUsed)):0;const ready=cdLeft===0;
    const grade=sk.grade||'D';const gradeMult=SKILL_GRADE_MULT[grade]||1.0;
